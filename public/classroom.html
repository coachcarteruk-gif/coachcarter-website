<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom — CoachCarter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #272727;
      --accent:     #f58321;
      --accent-dk:  #e07518;
      --accent-lt:  #fff4ec;
      --accent-mid: rgba(245,131,33,0.12);
      --muted:      #797879;
      --border:     #e0e0e0;
      --bg:         #ffffff;
      --surface:    #f9f9f9;
      --white:      #ffffff;
      --font-head:  'Bricolage Grotesque', sans-serif;
      --font-body:  'Lato', sans-serif;
      --radius:     14px;
      --header-h: 56px;
      --tabs-h: 48px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body), system-ui, sans-serif;
      background: var(--bg);
      color: var(--primary);
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: linear-gradient(to bottom, var(--white) 0%, rgba(255,255,255,0.95) 100%);
      border-bottom: 1px solid var(--border);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .header-brand img { height: 32px; width: auto; }
    .header-brand-text { font-size: 0.88rem; font-weight: 700; color: var(--primary); font-family: var(--font-head); }
    .header-brand-sub  { font-size: 0.68rem; color: var(--accent); }
    .header-back {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .header-back:hover { color: var(--accent-dk); }

    /* ── TAB BAR ── */
    .tab-bar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--tabs-h);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: linear-gradient(to bottom, var(--surface) 0%, rgba(249,249,249,0.95) 100%);
      border-bottom: 1px solid var(--border);
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn:hover { background: var(--accent-mid); color: var(--accent-dk); border-color: var(--accent-mid); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── REELS CONTAINER ── */
    .reels-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .reels-container::-webkit-scrollbar { display: none; }

    /* ── REEL ITEM ── */
    .reel-item {
      position: relative;
      width: 100%;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }

    /* ── VIDEO ── */
    .reel-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* ── INFO OVERLAY ── */
    .reel-overlay {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 80px 16px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
      pointer-events: none;
    }
    .reel-group-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .reel-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      font-family: var(--font-head);
      color: #fff;
    }
    .reel-desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      font-family: var(--font-body);
    }

    /* ── MUTE BUTTON ── */
    .mute-btn {
      position: absolute;
      bottom: 28px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.15s;
      z-index: 10;
    }
    .mute-btn:hover { background: rgba(0,0,0,0.75); border-color: rgba(255,255,255,0.5); }

    /* ── MUTED BANNER ── */
    .muted-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      white-space: nowrap;
      font-family: var(--font-body);
    }
    .muted-banner.show { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-reels {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 40px;
      text-align: center;
      background: var(--bg);
      font-family: var(--font-body);
    }
    .empty-reels .emoji { font-size: 2.5rem; }
    .empty-reels p { font-size: 0.9rem; line-height: 1.5; }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      transition: opacity 0.3s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(245,131,33,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GROUP COLOURS ── */
    .tag-speed-control  { background: rgba(245,131,33,0.2);  color: rgba(255,255,255,0.95); }
    .tag-looking-around { background: rgba(245,131,33,0.2);  color: rgba(255,255,255,0.95); }
    .tag-junctions      { background: rgba(245,131,33,0.2);  color: rgba(255,255,255,0.95); }
    .tag-reversing      { background: rgba(245,131,33,0.2);  color: rgba(255,255,255,0.95); }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<!-- Header -->
<header>
  <a href="/" class="header-brand">
    <img src="/Logo.png" alt="CoachCarter">
    <div>
      <div class="header-brand-text">CoachCarter</div>
      <div class="header-brand-sub">Classroom</div>
    </div>
  </a>
  <a href="/" class="header-back">← Back to site</a>
</header>

<!-- Tab bar -->
<div class="tab-bar" id="tab-bar"></div>

<!-- Reels -->
<div class="reels-container" id="reels"></div>

<!-- HLS.js for adaptive streaming on non-Safari browsers -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

<script>
const CF_BASE = 'https://customer-qn21p6ogmlqlhcv4.cloudflarestream.com';

const GROUPS = [
  { key: 'all',            label: 'All' },
  { key: 'speed-control',  label: 'Speed & Control' },
  { key: 'looking-around', label: 'Looking Around' },
  { key: 'junctions',      label: 'Junctions & Roundabouts' },
  { key: 'reversing',      label: 'Reversing' }
];

const GROUP_LABELS = {
  'speed-control':  'Speed & Control',
  'looking-around': 'Looking Around',
  'junctions':      'Junctions & Roundabouts',
  'reversing':      'Reversing'
};

let allVideos   = [];
let activeGroup = 'all';
let observer    = null;
let globalMuted = true;       // starts muted; once user taps, stays unmuted
let hlsInstances = {};        // uid → Hls instance (for cleanup)
let activeUid    = null;      // currently visible video uid

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/videos.json');
    allVideos = await res.json();
  } catch (e) {
    allVideos = [];
  }
  buildTabs();
  renderReels('all');
  document.getElementById('loading').classList.add('hidden');
});

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = GROUPS.map(g => `
    <button class="tab-btn${g.key === 'all' ? ' active' : ''}"
            onclick="selectTab('${g.key}')">
      ${g.label}
    </button>`).join('');
}

function selectTab(key) {
  activeGroup = key;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', GROUPS[i].key === key);
  });
  if (observer) observer.disconnect();
  destroyAllHls();
  renderReels(key);
}

// ── Render reels ──────────────────────────────────────────────────────────────
function renderReels(group) {
  const container = document.getElementById('reels');
  const videos = group === 'all'
    ? allVideos
    : allVideos.filter(v => v.group === group);

  if (videos.length === 0) {
    container.innerHTML = `
      <div class="empty-reels">
        <div class="emoji">🎬</div>
        <p>No videos in this section yet.<br>Check back soon!</p>
      </div>`;
    return;
  }

  container.innerHTML = videos.map(v => `
    <div class="reel-item" id="reel-${v.uid}" data-uid="${v.uid}">

      <video
        class="reel-video"
        id="video-${v.uid}"
        playsinline
        webkit-playsinline
        preload="none"
        loop
        muted
      ></video>

      <div class="muted-banner" id="banner-${v.uid}">🔇 Tap to unmute</div>

      <div class="reel-overlay">
        <div class="reel-group-tag tag-${v.group}">${GROUP_LABELS[v.group] || v.group}</div>
        <div class="reel-title">${v.title}</div>
        ${v.description ? `<div class="reel-desc">${v.description}</div>` : ''}
      </div>

      <button class="mute-btn" id="mute-btn-${v.uid}"
              onclick="toggleMute('${v.uid}')" title="Toggle mute">🔇</button>

    </div>`).join('');

  // Tap anywhere on reel (outside mute button) also toggles mute
  videos.forEach(v => {
    document.getElementById(`reel-${v.uid}`)
      .addEventListener('click', e => {
        if (!e.target.closest('.mute-btn')) toggleMute(v.uid);
      });
  });

  container.scrollTop = 0;
  setupObserver(videos);
}

// ── HLS helpers ──────────────────────────────────────────────────────────────
function attachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (!video) return;

  const hlsUrl = `${CF_BASE}/${uid}/manifest/video.m3u8`;

  // Safari supports HLS natively
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl;
    video.muted = globalMuted;
    video.play().catch(() => {});
    return;
  }

  // Everything else uses HLS.js
  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    const hls = new Hls({
      enableWorker: true,
      startLevel: -1 // auto quality
    });
    hls.loadSource(hlsUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.muted = globalMuted;
      video.play().catch(() => {});
    });
    hlsInstances[uid] = hls;
    return;
  }

  // Fallback: try direct (won't work in most browsers for HLS)
  video.src = hlsUrl;
  video.muted = globalMuted;
  video.play().catch(() => {});
}

function detachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (video) {
    video.pause();
    video.removeAttribute('src');
    video.load(); // release the media element
  }
  if (hlsInstances[uid]) {
    hlsInstances[uid].destroy();
    delete hlsInstances[uid];
  }
}

function destroyAllHls() {
  Object.keys(hlsInstances).forEach(uid => detachHls(uid));
  hlsInstances = {};
  activeUid = null;
}

// ── IntersectionObserver ──────────────────────────────────────────────────────
function setupObserver(videos) {
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const uid = entry.target.dataset.uid;

      if (entry.isIntersecting) {
        // Detach previous video if different
        if (activeUid && activeUid !== uid) {
          detachHls(activeUid);
        }
        activeUid = uid;
        attachHls(uid);
        setMuteBtn(uid, globalMuted);
        if (globalMuted) showMutedBanner(uid);
      } else if (uid !== activeUid) {
        // Only detach if it's not the current active one
        // (avoids race conditions during scroll)
        detachHls(uid);
        hideMutedBanner(uid);
      }
    });
  }, {
    root: document.getElementById('reels'),
    threshold: 0.6
  });

  videos.forEach(v => {
    const el = document.getElementById(`reel-${v.uid}`);
    if (el) observer.observe(el);
  });
}

// ── Mute / unmute ─────────────────────────────────────────────────────────────
// Direct property access — no postMessage needed!
function toggleMute(uid) {
  globalMuted = !globalMuted;

  const video = document.getElementById(`video-${uid}`);
  if (video) {
    video.muted = globalMuted;
    // If unmuting and video isn't playing, start it
    if (!globalMuted && video.paused) {
      video.play().catch(() => {});
    }
  }

  // Update all visible mute buttons to reflect global state
  document.querySelectorAll('.mute-btn').forEach(btn => {
    btn.textContent = globalMuted ? '🔇' : '🔊';
  });

  if (!globalMuted) hideMutedBanner(uid);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setMuteBtn(uid, muted) {
  const btn = document.getElementById(`mute-btn-${uid}`);
  if (btn) btn.textContent = muted ? '🔇' : '🔊';
}

function showMutedBanner(uid) {
  const banner = document.getElementById(`banner-${uid}`);
  if (!banner) return;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3000);
}

function hideMutedBanner(uid) {
  const el = document.getElementById(`banner-${uid}`);
  if (el) el.classList.remove('show');
}
</script>
</body>
</html>
