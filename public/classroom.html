  <title>Classroom — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #262626;
      --accent:     #f58321;
      --accent-dk:  #e07518;
      --accent-lt:  #fff4ec;
      --accent-mid: rgba(245,131,33,0.12);
      --muted:      #797879;
      --border:     #e0e0e0;
      --bg:         #ffffff;
      --surface:    #f9f9f9;
      --white:      #ffffff;
      --font-head:  'Bricolage Grotesque', sans-serif;
      --font-body:  'Lato', sans-serif;
      --radius:     14px;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--primary); min-height: 100vh; }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(38,38,38,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .site-nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .site-nav-logo img { width: 34px; height: 34px; object-fit: contain; border-radius: 8px; background: rgba(255,255,255,0.08); padding: 4px; }
    .site-nav-logo span { font-family: var(--font-head); font-size: 1.1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .site-nav-logo span em { font-style: normal; color: var(--accent); }
    .site-nav-links { display: flex; align-items: center; gap: 6px; }
    .site-nav-link {
      color: rgba(255,255,255,0.6); font-family: var(--font-body); font-weight: 500;
      font-size: 0.83rem; padding: 7px 14px; border-radius: 100px;
      border: 1px solid transparent; text-decoration: none; transition: all 0.18s;
      white-space: nowrap; background: transparent; cursor: pointer;
    }
    .site-nav-link:hover { color: #fff; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }
    .site-nav-link.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    .site-nav-link.primary:hover { background: var(--accent-dk); border-color: var(--accent-dk); }
    /* ── Mobile bottom tab bar ── */
    .mobile-tab-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 6px 0; padding-bottom: max(6px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .mobile-tab-bar a {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: var(--muted); font-size: 0.62rem;
      font-weight: 600; gap: 2px; padding: 4px 0; transition: color 0.15s;
    }
    .mobile-tab-bar a:hover { color: var(--primary); }
    .mobile-tab-bar a.active { color: var(--accent); }
    .mobile-tab-bar a.cta { color: var(--accent); }
    .mobile-tab-icon { font-size: 1.2rem; line-height: 1; }
    @media (max-width: 600px) {
      .site-nav { padding: 0 16px; }
      .site-nav-link { display: none; }
      .mobile-tab-bar { display: flex; }
    }

    /* ── Page ────────────────────────────────────────────────────────────── */
    .page { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; margin-top: 64px; }

    /* ── Page header ─────────────────────────────────────────────────────── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .page-title { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ── View mode toggle ────────────────────────────────────────────────── */
    .mode-toggle {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px; gap: 2px;
    }
    .mode-btn {
      padding: 7px 14px; border-radius: 7px; border: none;
      background: transparent; font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .mode-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* ── Category filter pills ───────────────────────────────────────────── */
    .cat-pills {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
      margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; background: transparent; border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--muted); font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 600; padding: 6px 16px;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .cat-pill:hover { background: var(--accent-mid); color: var(--accent-dk); border-color: rgba(245,131,33,0.2); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-pill .count { font-size: 0.68rem; opacity: 0.7; margin-left: 3px; }

    /* ── GRID VIEW ───────────────────────────────────────────────────────── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .video-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: all 0.2s;
    }
    .video-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .video-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #111; overflow: hidden;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-thumb-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s;
    }
    .video-card:hover .video-thumb-play { opacity: 1; }
    .video-thumb-play-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(245,131,33,0.9); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .video-card-body { padding: 14px 16px; }
    .video-card-tag {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .video-card-title { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
    .video-card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
    .video-card-learner-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      background: rgba(154,117,245,0.12); color: #7c3aed;
      padding: 2px 8px; border-radius: 12px; margin-left: 6px;
    }

    /* ── Video player modal ──────────────────────────────────────────────── */
    .player-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .player-overlay.open { opacity: 1; pointer-events: all; }
    .player-wrap {
      width: 100%; max-width: 800px; max-height: 90vh;
      background: #000; border-radius: 12px; overflow: hidden;
      position: relative;
    }
    .player-video {
      width: 100%; aspect-ratio: 16/9; background: #000;
    }
    .player-info {
      background: var(--white); padding: 16px 20px;
    }
    .player-title { font-family: var(--font-head); font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
    .player-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .player-close {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none; color: white;
      font-size: 1.1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s; z-index: 10;
    }
    .player-close:hover { background: rgba(0,0,0,0.8); }

    /* ── REELS VIEW ──────────────────────────────────────────────────────── */
    .reels-fullscreen {
      position: fixed; inset: 0; z-index: 500; background: #000;
      display: none;
    }
    .reels-fullscreen.open { display: block; }
    .reels-container {
      position: absolute; inset: 0;
      overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .reels-container::-webkit-scrollbar { display: none; }
    .reel-item {
      position: relative; width: 100%; height: 100dvh;
      scroll-snap-align: start; scroll-snap-stop: always;
      background: #000; overflow: hidden;
    }
    .reel-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; }
    .reel-overlay {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 100px 16px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      pointer-events: none;
    }
    .reel-group-tag {
      display: inline-flex; font-size: 0.68rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 10px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .reel-title { font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); font-family: var(--font-head); color: #fff; }
    .reel-desc { font-size: 0.85rem; color: rgba(255,255,255,0.8); line-height: 1.4; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .mute-btn {
      position: absolute; bottom: 28px; right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(15,23,42,0.6); border: 1.5px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s; z-index: 10;
    }
    .mute-btn:hover { background: rgba(15,23,42,0.8); }
    .reels-exit-btn {
      position: fixed; top: 16px; left: 16px; z-index: 600;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 8px; padding: 8px 14px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(8px); transition: background 0.15s;
      display: none;
    }
    .reels-fullscreen.open ~ .reels-exit-btn { display: block; }
    .reels-exit-btn:hover { background: rgba(0,0,0,0.8); }

    .muted-banner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(15,23,42,0.75); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px); border-radius: 12px; padding: 12px 20px;
      font-size: 0.82rem; font-weight: 600; color: #fff;
      pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 10;
    }
    .muted-banner.show { opacity: 1; }

    /* ── Empty / Loading ─────────────────────────────────────────────────── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Desktop reels ───────────────────────────────────────────────────── */
    @media (min-width: 768px) {
      .reels-container { display: flex; flex-direction: column; align-items: center; background: #111; }
      .reel-item { height: 100dvh; width: calc(100dvh * 9 / 16); max-width: 100%; flex-shrink: 0; }
    }
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .video-card-body { padding: 10px 12px; }
      .video-card-title { font-size: 0.85rem; }
      .video-card-desc { display: none; }
    }
  </style>
</head>

<div class="page" id="gridPage">
  <div class="page-header">
    <div>
      <div class="page-title">Classroom</div>
      <div class="page-sub">Free driving lesson videos to help you learn</div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnGrid" onclick="setMode('grid')">Grid</button>
      <button class="mode-btn" id="btnReels" onclick="setMode('reels')">Reels</button>

<!-- Player modal (grid mode) -->

      <div class="player-title" id="playerTitle"></div>
      <div class="player-desc" id="playerDesc"></div>
    </div>
  </div>
</div>

<!-- Reels fullscreen mode -->
<div class="reels-fullscreen" id="reelsFS">
  <div class="reels-container" id="reelsContainer"></div>
</div>
<button class="reels-exit-btn" id="reelsExitBtn" onclick="setMode('grid')">← Back to grid</button>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
const CF_BASE = 'https://customer-qn21p6ogmlqlhcv4.cloudflarestream.com';

let allVideos   = [];
let categories  = [];
let activeCategory = 'all';
let currentMode = 'grid';
let playerHls   = null;

// Reels state
let reelsObserver = null;
let globalMuted   = true;
let hlsInstances  = {};
let activeUid     = null;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const [catRes, vidRes] = await Promise.all([
      fetch('/api/videos?action=categories'),
      fetch('/api/videos?action=list')
    ]);
    const catData = await catRes.json();
    const vidData = await vidRes.json();
    categories = catData.categories || [];
    allVideos  = vidData.videos || [];
  } catch (e) {
    // Fallback to static JSON
    try {
      const res = await fetch('/videos.json');
      const json = await res.json();
      allVideos = json.map(v => ({
        cloudflare_uid: v.uid, title: v.title, description: v.description,
        category_slug: v.group, category_label: v.group, category_color: null
      }));
      categories = [...new Set(json.map(v => v.group))].map((g, i) => ({
        slug: g, label: g, sort_order: i, video_count: json.filter(v => v.group === g).length
      }));
    } catch { allVideos = []; categories = []; }
  }

  buildCatPills();
  renderGrid();
});

// ── Mode switching ───────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('btnReels').classList.toggle('active', mode === 'reels');

  if (mode === 'grid') {
    document.getElementById('gridPage').style.display = 'block';
    document.getElementById('reelsFS').classList.remove('open');
    destroyAllHls();
  } else {
    document.getElementById('gridPage').style.display = 'none';
    document.getElementById('reelsFS').classList.add('open');
    renderReels();
  }
}

// ── Category pills ───────────────────────────────────────────────────────────
function buildCatPills() {
  const total = allVideos.length;
  let html = `<button class="cat-pill active" onclick="filterCat('all')">All <span class="count">${total}</span></button>`;
  for (const c of categories) {
    html += `<button class="cat-pill" onclick="filterCat('${c.slug}')">${esc(c.label)} <span class="count">${c.video_count || 0}</span></button>`;
  }
  document.getElementById('catPills').innerHTML = html;
}

function filterCat(slug) {
  activeCategory = slug;
  document.querySelectorAll('.cat-pill').forEach((btn, i) => {
    if (i === 0) btn.classList.toggle('active', slug === 'all');
    else btn.classList.toggle('active', categories[i - 1]?.slug === slug);
  });
  if (currentMode === 'grid') renderGrid();
  else renderReels();
}

// ── Grid view ────────────────────────────────────────────────────────────────
function renderGrid() {
  const filtered = activeCategory === 'all' ? allVideos : allVideos.filter(v => v.category_slug === activeCategory);
  const container = document.getElementById('gridContent');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎬</div><p>No videos in this category yet.</p></div>';
    return;
  }

  container.innerHTML = '<div class="video-grid">' + filtered.map(v => {
    const thumbUrl = v.thumbnail_url || `${CF_BASE}/${v.cloudflare_uid}/thumbnails/thumbnail.jpg?time=2s&width=480`;
    const tagColor = v.category_color || 'rgba(245,131,33,0.2)';

    return `
      <div class="video-card" onclick="openPlayer('${v.cloudflare_uid}', '${esc(v.title)}', '${esc(v.description || '')}')">
        <div class="video-thumb">
          <img src="${thumbUrl}" alt="${esc(v.title)}" loading="lazy" onerror="this.style.display='none'">
          <div class="video-thumb-play"><div class="video-thumb-play-icon">▶</div></div>
        </div>
        <div class="video-card-body">
          <span class="video-card-tag" style="background:${tagColor};color:rgba(255,255,255,0.95)">${esc(v.category_label || v.category_slug)}</span>
          ${v.learner_only ? '<span class="video-card-learner-badge">Learner only</span>' : ''}
          <div class="video-card-title">${esc(v.title)}</div>
          ${v.description ? `<div class="video-card-desc">${esc(v.description)}</div>` : ''}
        </div>
      </div>`;
  }).join('') + '</div>';
}

// ── Player modal ─────────────────────────────────────────────────────────────
function openPlayer(uid, title, desc) {
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerDesc').textContent = desc;

  const video = document.getElementById('playerVideo');
  const hlsUrl = `${CF_BASE}/${uid}/manifest/video.m3u8`;

  if (playerHls) { playerHls.destroy(); playerHls = null; }

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl;
    video.play().catch(() => {});
  } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    playerHls = new Hls({ enableWorker: true, startLevel: -1 });
    playerHls.loadSource(hlsUrl);
    playerHls.attachMedia(video);
    playerHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
  } else {
    video.src = hlsUrl;
    video.play().catch(() => {});
  }

  document.getElementById('playerOverlay').classList.add('open');
}

function closePlayer() {
  const video = document.getElementById('playerVideo');
  video.pause();
  video.removeAttribute('src');
  video.load();
  if (playerHls) { playerHls.destroy(); playerHls = null; }
  document.getElementById('playerOverlay').classList.remove('open');
}

function handlePlayerOverlayClick(e) {
  if (e.target === document.getElementById('playerOverlay')) closePlayer();
}

// ── Reels view ───────────────────────────────────────────────────────────────
function renderReels() {
  const filtered = activeCategory === 'all' ? allVideos : allVideos.filter(v => v.category_slug === activeCategory);
  const container = document.getElementById('reelsContainer');

  if (reelsObserver) reelsObserver.disconnect();
  destroyAllHls();

  if (filtered.length === 0) {
    container.innerHTML = '<div style="height:100dvh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:0.9rem;padding:40px;text-align:center;">No videos in this category yet.</div>';
    return;
  }

  container.innerHTML = filtered.map(v => `
    <div class="reel-item" id="reel-${v.cloudflare_uid}" data-uid="${v.cloudflare_uid}">
      <video class="reel-video" id="video-${v.cloudflare_uid}" playsinline webkit-playsinline preload="none" loop muted></video>
      <div class="muted-banner" id="banner-${v.cloudflare_uid}">Tap to unmute</div>
      <div class="reel-overlay">
        <div class="reel-group-tag" style="background:${v.category_color || 'rgba(245,131,33,0.25)'}; color:rgba(255,255,255,0.95)">${esc(v.category_label || v.category_slug)}</div>
        <div class="reel-title">${esc(v.title)}</div>
        ${v.description ? `<div class="reel-desc">${esc(v.description)}</div>` : ''}
      </div>
      <button class="mute-btn" id="mute-btn-${v.cloudflare_uid}" onclick="toggleMute('${v.cloudflare_uid}')" title="Toggle mute">🔇</button>
    </div>`).join('');

  filtered.forEach(v => {
    document.getElementById(`reel-${v.cloudflare_uid}`)
      .addEventListener('click', e => { if (!e.target.closest('.mute-btn')) toggleMute(v.cloudflare_uid); });
  });

  container.scrollTop = 0;
  setupReelsObserver(filtered);
}

function attachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (!video) return;
  const hlsUrl = `${CF_BASE}/${uid}/manifest/video.m3u8`;
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl; video.muted = globalMuted; video.play().catch(() => {}); return;
  }
  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true, startLevel: -1 });
    hls.loadSource(hlsUrl); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.muted = globalMuted; video.play().catch(() => {}); });
    hlsInstances[uid] = hls; return;
  }
  video.src = hlsUrl; video.muted = globalMuted; video.play().catch(() => {});
}

function detachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
  if (hlsInstances[uid]) { hlsInstances[uid].destroy(); delete hlsInstances[uid]; }
}

function destroyAllHls() {
  Object.keys(hlsInstances).forEach(uid => detachHls(uid));
  hlsInstances = {}; activeUid = null;
}

function setupReelsObserver(videos) {
  reelsObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const uid = entry.target.dataset.uid;
      if (entry.isIntersecting) {
        if (activeUid && activeUid !== uid) detachHls(activeUid);
        activeUid = uid; attachHls(uid);
        setMuteBtn(uid, globalMuted);
        if (globalMuted) showMutedBanner(uid);
      } else if (uid !== activeUid) {
        detachHls(uid); hideMutedBanner(uid);
      }
    });
  }, { root: document.getElementById('reelsContainer'), threshold: 0.6 });

  videos.forEach(v => {
    const el = document.getElementById(`reel-${v.cloudflare_uid}`);
    if (el) reelsObserver.observe(el);
  });
}

function toggleMute(uid) {
  globalMuted = !globalMuted;
  const video = document.getElementById(`video-${uid}`);
  if (video) { video.muted = globalMuted; if (!globalMuted && video.paused) video.play().catch(() => {}); }
  document.querySelectorAll('.mute-btn').forEach(btn => btn.textContent = globalMuted ? '🔇' : '🔊');
  if (!globalMuted) hideMutedBanner(uid);
}

function setMuteBtn(uid, muted) {
  const btn = document.getElementById(`mute-btn-${uid}`);
  if (btn) btn.textContent = muted ? '🔇' : '🔊';
}

function showMutedBanner(uid) {
  const b = document.getElementById(`banner-${uid}`);
  if (!b) return; b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 3000);
}

function hideMutedBanner(uid) {
  const el = document.getElementById(`banner-${uid}`);
  if (el) el.classList.remove('show');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
</script>
