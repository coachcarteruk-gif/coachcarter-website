  <title>Admin Sign In — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #262626;
      --accent: #f58321;
      --accent-dk: #e07518;
      --muted: #797879;
      --border: #e0e0e0;
      --bg: #262626;
      --surface: #2e2e2e;
      --card: #ffffff;
      --white: #ffffff;
      --font-head: 'Bricolage Grotesque', sans-serif;
      --font-body: 'Lato', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; text-decoration: none;
    }
    .brand img { height: 48px; width: auto; }
    .brand-text { font-size: 1.1rem; font-weight: 700; color: var(--white); font-family: var(--font-head); }
    .brand-sub { font-size: 0.75rem; color: var(--accent); margin-top: 1px; font-weight: 600; }
    .card {
      background: var(--card);
      border-radius: 14px;
      width: 100%; max-width: 420px;
      padding: 36px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .card-title {
      font-size: 1.3rem; font-weight: 700;
      margin-bottom: 6px; font-family: var(--font-head); color: var(--primary);
    }
    .card-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 6px;
    }
    input[type="email"], input[type="password"] {
      width: 100%; background: #f9f9f9; border: 1px solid var(--border);
      border-radius: 8px; color: var(--primary); font-family: var(--font-body);
      font-size: 0.95rem; padding: 11px 14px; outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); background: var(--white); }
    .btn-primary {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-family: var(--font-body); font-size: 0.95rem;
      font-weight: 600; padding: 13px; cursor: pointer; margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
      color: #c41e1e; border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .back-link {
      margin-top: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.5);
      text-decoration: none;
    }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <a href="/" class="brand">
    <img src="/Logo.png" alt="CoachCarter">
    <div>
      <div class="brand-text">CoachCarter</div>
      <div class="brand-sub">Admin Portal</div>
    </div>
  </a>

  <div class="card">
    <div class="card-title">Staff Sign In</div>
    <div class="card-sub">Sign in to manage instructors, bookings and availability.</div>
    <div class="error-msg" id="login-error"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@coachcarter.uk" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
    </form>
  </div>

  <a href="/" class="back-link">Back to website</a>

<script>
  // Redirect if already logged in
  const existing = JSON.parse(localStorage.getItem('cc_admin') || 'null');
  if (existing?.token) {
    // Verify token is still valid
    fetch('/api/admin?action=verify', {
      headers: { 'Authorization': 'Bearer ' + existing.token }
    }).then(r => {
      if (r.ok) window.location.href = '/admin/portal.html';
      else localStorage.removeItem('cc_admin');
    }).catch(() => {});
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.classList.add('show');
  }
  function clearError() {
    document.getElementById('login-error').classList.remove('show');
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearError();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/api/admin?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Login failed'); return; }
      localStorage.setItem('cc_admin', JSON.stringify(data));
      window.location.href = '/admin/portal.html';
    } catch {
      showError('Network error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
