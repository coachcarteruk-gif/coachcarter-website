<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>My Learners — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" data-swap-media>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/instructor.css">
  <script src="/shared/dark-mode.js"></script>
  <script src="/shared/font-swap.js"></script>
  <style>
    /* ── Page Shell ── */
    .page { max-width: 800px; margin: 0 auto; padding: 24px 16px 24px; }

    /* ── Header Row ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }

    /* ── Search ── */
    .search-input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem; color: var(--primary);
      margin-bottom: 20px; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); outline: none; }

    /* ── Learner Cards ── */
    .learner-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; transition: all 0.18s;
    }
    .learner-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(245,131,33,0.08); }

    .learner-card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .learner-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; }
    .tier-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .tier-1 { background: var(--green-lt); color: var(--green); }
    .tier-2 { background: var(--amber-lt); color: var(--amber); }
    .tier-3 { background: var(--blue-lt); color: var(--blue); }

    .learner-stats {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px;
      font-size: 0.82rem; color: var(--muted);
    }
    .learner-stats strong { color: var(--primary); font-weight: 700; }

    .learner-contact {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--muted);
    }
    .learner-contact a { color: var(--accent); text-decoration: none; }
    .learner-contact a:hover { text-decoration: underline; }

    .contact-pref-badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      background: var(--accent-lt); color: var(--accent);
      margin-left: 4px; vertical-align: middle;
    }

    /* ── Detail View ── */
    .detail-view { display: none; }
    .detail-view.show { display: block; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.83rem; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 0;
      margin-bottom: 16px; font-family: var(--font-body);
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-header { margin-bottom: 20px; }
    .detail-name { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .detail-info { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; }
    .detail-info a { color: var(--accent); text-decoration: none; }
    .detail-info a:hover { text-decoration: underline; }
    .detail-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .detail-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; text-align: center;
    }
    .detail-stat-value { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .detail-stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.03em; margin-top: 2px; }

    .section-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 12px; }

    .booking-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .booking-card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
    .booking-date { font-weight: 700; font-size: 0.88rem; }
    .booking-time { font-size: 0.82rem; color: var(--muted); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .status-confirmed { background: var(--blue-lt); color: var(--blue); }
    .status-completed { background: var(--green-lt); color: var(--green); }
    .status-cancelled { background: var(--red-lt); color: var(--red); }
    .booking-notes { font-size: 0.82rem; color: var(--muted); margin-top: 6px; font-style: italic; }
    .skill-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .skill-pill {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    }
    .skill-nailed { background: var(--green-lt); color: var(--green); }
    .skill-ok { background: var(--amber-lt); color: var(--amber); }
    .skill-struggled { background: var(--red-lt); color: var(--red); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); max-width: 360px; margin: 0 auto; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(120px);
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 400; max-width: calc(100vw - 32px); word-wrap: break-word; text-align: center;
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }


    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.35s ease; }

    /* ── Sort controls ── */
    .sort-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .sort-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
    .sort-btn {
      padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--white); font-family: var(--font-body); font-size: 0.78rem;
      font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Test date badge ── */
    .test-date-badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      background: #ede9fe; color: #7c3aed; margin-left: 6px; vertical-align: middle;
    }

    /* ── Learner notes preview ── */
    .learner-notes-preview { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 4px; }

    /* ── Detail notes section ── */
    .detail-notes-section { margin-top: 20px; }
    .detail-notes-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .detail-notes-form { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .detail-notes-form label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px; }
    .detail-notes-form textarea {
      width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-family: var(--font-body); font-size: 0.85rem;
      color: var(--primary); resize: vertical; background: var(--surface);
    }
    .detail-notes-form textarea:focus { border-color: var(--accent); outline: none; background: var(--white); }
    .detail-notes-form input[type="date"] {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font-body); font-size: 0.85rem; color: var(--primary);
      background: var(--surface); margin-top: 0;
    }
    .detail-notes-form input[type="date"]:focus { border-color: var(--accent); outline: none; background: var(--white); }
    .detail-form-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; align-items: flex-end; }
    .detail-form-group { flex: 1; min-width: 140px; }
    .btn-save-notes {
      padding: 8px 20px; border-radius: 8px; border: none; background: var(--accent);
      color: white; font-family: var(--font-head); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-top: 12px;
    }
    .btn-save-notes:hover { background: var(--accent-dk); }
    .btn-save-notes:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
<script src="/shared/instructor-auth.js"></script>
</head>
<body>


<div class="page">
  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <h1>My Learners</h1>
      <span id="learner-count" style="font-size:0.85rem;color:var(--muted);"></span>
    </div>

    <div class="sort-row">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" id="sort-recent" data-sort="recent">Recent</button>
      <button class="sort-btn" id="sort-lessons" data-sort="lessons">Most lessons</button>
      <button class="sort-btn" id="sort-name" data-sort="name">A–Z</button>
    </div>

    <input type="text" class="search-input" id="learner-search" placeholder="Search by name, email, or phone...">

    <div id="learners-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="detail-view" id="detail-view">
    <button class="detail-back" id="btn-detail-back">&#8249; Back to learners</button>
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script src="/instructor/learners.js"></script>
<script src="/sidebar.js"></script>
</body>
</html>
