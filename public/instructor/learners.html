<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>My Learners — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/instructor.css">
  <script src="/shared/dark-mode.js"></script>
  <style>
    /* ── Page Shell ── */
    .page { max-width: 800px; margin: 0 auto; padding: 24px 16px 24px; }

    /* ── Header Row ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }

    /* ── Search ── */
    .search-input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem; color: var(--primary);
      margin-bottom: 20px; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); outline: none; }

    /* ── Learner Cards ── */
    .learner-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; transition: all 0.18s;
    }
    .learner-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(245,131,33,0.08); }

    .learner-card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .learner-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; }
    .tier-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .tier-1 { background: var(--green-lt); color: var(--green); }
    .tier-2 { background: var(--amber-lt); color: var(--amber); }
    .tier-3 { background: var(--blue-lt); color: var(--blue); }

    .learner-stats {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px;
      font-size: 0.82rem; color: var(--muted);
    }
    .learner-stats strong { color: var(--primary); font-weight: 700; }

    .learner-contact {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--muted);
    }
    .learner-contact a { color: var(--accent); text-decoration: none; }
    .learner-contact a:hover { text-decoration: underline; }

    .contact-pref-badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      background: var(--accent-lt); color: var(--accent);
      margin-left: 4px; vertical-align: middle;
    }

    /* ── Detail View ── */
    .detail-view { display: none; }
    .detail-view.show { display: block; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.83rem; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 0;
      margin-bottom: 16px; font-family: var(--font-body);
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-header { margin-bottom: 20px; }
    .detail-name { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .detail-info { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; }
    .detail-info a { color: var(--accent); text-decoration: none; }
    .detail-info a:hover { text-decoration: underline; }
    .detail-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .detail-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; text-align: center;
    }
    .detail-stat-value { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .detail-stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.03em; margin-top: 2px; }

    .section-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 12px; }

    .booking-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .booking-card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
    .booking-date { font-weight: 700; font-size: 0.88rem; }
    .booking-time { font-size: 0.82rem; color: var(--muted); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .status-confirmed { background: var(--blue-lt); color: var(--blue); }
    .status-completed { background: var(--green-lt); color: var(--green); }
    .status-cancelled { background: var(--red-lt); color: var(--red); }
    .booking-notes { font-size: 0.82rem; color: var(--muted); margin-top: 6px; font-style: italic; }
    .skill-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .skill-pill {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    }
    .skill-nailed { background: var(--green-lt); color: var(--green); }
    .skill-ok { background: var(--amber-lt); color: var(--amber); }
    .skill-struggled { background: var(--red-lt); color: var(--red); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); max-width: 360px; margin: 0 auto; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 400; max-width: calc(100vw - 32px); word-wrap: break-word; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }


    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.35s ease; }

    /* ── Sort controls ── */
    .sort-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .sort-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
    .sort-btn {
      padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--white); font-family: var(--font-body); font-size: 0.78rem;
      font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Test date badge ── */
    .test-date-badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      background: #ede9fe; color: #7c3aed; margin-left: 6px; vertical-align: middle;
    }

    /* ── Learner notes preview ── */
    .learner-notes-preview { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 4px; }

    /* ── Detail notes section ── */
    .detail-notes-section { margin-top: 20px; }
    .detail-notes-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .detail-notes-form { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .detail-notes-form label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px; }
    .detail-notes-form textarea {
      width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-family: var(--font-body); font-size: 0.85rem;
      color: var(--primary); resize: vertical; background: var(--surface);
    }
    .detail-notes-form textarea:focus { border-color: var(--accent); outline: none; background: var(--white); }
    .detail-notes-form input[type="date"] {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font-body); font-size: 0.85rem; color: var(--primary);
      background: var(--surface); margin-top: 0;
    }
    .detail-notes-form input[type="date"]:focus { border-color: var(--accent); outline: none; background: var(--white); }
    .detail-form-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; align-items: flex-end; }
    .detail-form-group { flex: 1; min-width: 140px; }
    .btn-save-notes {
      padding: 8px 20px; border-radius: 8px; border: none; background: var(--accent);
      color: white; font-family: var(--font-head); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-top: 12px;
    }
    .btn-save-notes:hover { background: var(--accent-dk); }
    .btn-save-notes:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
<script src="/shared/instructor-auth.js"></script>
</head>
<body>


<div class="page">
  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <h1>My Learners</h1>
      <span id="learner-count" style="font-size:0.85rem;color:var(--muted);"></span>
    </div>

    <div class="sort-row">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" id="sort-recent" onclick="setSort('recent')">Recent</button>
      <button class="sort-btn" id="sort-lessons" onclick="setSort('lessons')">Most lessons</button>
      <button class="sort-btn" id="sort-name" onclick="setSort('name')">A–Z</button>
    </div>

    <input type="text" class="search-input" id="learner-search" placeholder="Search by name, email, or phone..." oninput="renderLearners()">

    <div id="learners-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="detail-view" id="detail-view">
    <button class="detail-back" onclick="showList()">&#8249; Back to learners</button>
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
let token, instructor;
let allLearners = [];
let currentSort = 'recent';
let currentDetailLearnerId = null;

// ── Init ──
function init() {
  const session = ccAuth.getAuth();
  token = session?.token || null;
  instructor = session?.instructor || null;
  if (!token) { window.location.href = '/instructor/login.html'; return; }
  if (instructor?.is_admin) {
    const adminTab = document.getElementById('admin-tab');
    if (adminTab) adminTab.style.display = '';
  }

  loadLearners();
}

function signOut() {
  ccAuth.logout();
}

// ── Sort ──
function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  renderLearners();
}

function sortLearners(list) {
  const sorted = [...list];
  if (currentSort === 'lessons') {
    sorted.sort((a, b) => (b.total_lessons || 0) - (a.total_lessons || 0));
  } else if (currentSort === 'name') {
    sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  } else {
    sorted.sort((a, b) => (b.last_lesson_date || '').localeCompare(a.last_lesson_date || ''));
  }
  return sorted;
}

// ── Load learners ──
async function loadLearners() {
  try {
    const res = await fetch('/api/instructor?action=my-learners', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await res.json();
    if (res.status === 401) { signOut(); return; }
    if (!res.ok) throw new Error(data.error);
    allLearners = data.learners || [];
    renderLearners();
  } catch (err) {
    document.getElementById('learners-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:24px">Failed to load learners.<br><button onclick="loadLearners()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:0.85rem;font-weight:600;cursor:pointer;font-family:var(--font-body)">Try again</button></div>';
  }
}

function renderLearners() {
  const container = document.getElementById('learners-list');
  const search = (document.getElementById('learner-search')?.value || '').toLowerCase();

  let filtered = allLearners;
  if (search) {
    filtered = filtered.filter(l =>
      (l.name || '').toLowerCase().includes(search) ||
      (l.email || '').toLowerCase().includes(search) ||
      (l.phone || '').toLowerCase().includes(search)
    );
  }

  filtered = sortLearners(filtered);

  document.getElementById('learner-count').textContent =
    filtered.length + (filtered.length === 1 ? ' learner' : ' learners');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state fade-in">
        <div class="empty-state-icon">&#x1F465;</div>
        <h2>${search ? 'No matching learners' : 'No learners yet'}</h2>
        <p>${search ? 'Try a different search term.' : 'Learners who book lessons with you will appear here.'}</p>
      </div>`;
    return;
  }

  const tierLabels = { 1: 'Tier 1', 2: 'Tier 2', 3: 'Tier 3' };

  container.innerHTML = filtered.map(l => {
    const tier = l.current_tier || 1;
    const stats = [];
    stats.push('<strong>' + l.total_lessons + '</strong> ' + (l.total_lessons === 1 ? 'lesson' : 'lessons'));
    if (l.completed_lessons) stats.push('<strong>' + l.completed_lessons + '</strong> completed');
    if (l.upcoming_lessons) stats.push('<strong>' + l.upcoming_lessons + '</strong> upcoming');

    const contact = [];
    if (l.phone) contact.push('<a href="tel:' + esc(l.phone) + '">' + esc(l.phone) + '</a>');
    if (l.email) contact.push('<a href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a>');
    if (l.pickup_address) contact.push('<span>Pickup: ' + esc(l.pickup_address) + '</span>');

    // Test date badge
    let testBadge = '';
    if (l.test_date) {
      const td = new Date(l.test_date + 'T00:00:00Z');
      const testLabel = td.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', timeZone: 'UTC' });
      testBadge = '<span class="test-date-badge">Test: ' + testLabel + '</span>';
    }

    // Notes preview
    let notesPreview = '';
    if (l.instructor_notes) {
      const preview = l.instructor_notes.length > 60 ? l.instructor_notes.slice(0, 60) + '…' : l.instructor_notes;
      notesPreview = '<div class="learner-notes-preview">' + esc(preview) + '</div>';
    }

    return `
      <div class="learner-card fade-in" style="cursor:pointer" onclick="openLearner(${l.id})">
        <div class="learner-card-top">
          <span class="learner-name">${esc(l.name || 'Unnamed')}${l.prefer_contact_before ? '<span class="contact-pref-badge">Contact first</span>' : ''}${testBadge}</span>
          <span class="tier-badge tier-${tier}">${tierLabels[tier] || 'Tier ' + tier}</span>
        </div>
        <div class="learner-stats">
          ${stats.join(' &middot; ')}
          ${l.last_lesson_date ? ' &middot; Last: ' + formatDate(l.last_lesson_date) : ''}
        </div>
        <div class="learner-contact">
          ${contact.join(' &middot; ')}
        </div>
        ${notesPreview}
      </div>`;
  }).join('');
}

// ── Detail view ──
async function openLearner(id) {
  currentDetailLearnerId = id;
  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('show');
  dv.querySelector('#detail-content').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px">Loading...</div>';
  window.scrollTo(0, 0);

  try {
    // Fetch history, notes, and mock tests in parallel
    const [historyRes, notesRes, mockRes] = await Promise.all([
      fetch('/api/instructor?action=learner-history&learner_id=' + id, {
        headers: { Authorization: 'Bearer ' + token }
      }),
      fetch('/api/instructor?action=learner-notes&learner_id=' + id, {
        headers: { Authorization: 'Bearer ' + token }
      }),
      fetch('/api/instructor?action=learner-mock-tests&learner_id=' + id, {
        headers: { Authorization: 'Bearer ' + token }
      })
    ]);
    const historyData = await historyRes.json();
    if (historyRes.status === 401) { signOut(); return; }
    if (!historyRes.ok) throw new Error(historyData.error);

    let notesData = { notes: '', test_date: null };
    if (notesRes.ok) notesData = await notesRes.json();

    let mockData = { mock_tests: [] };
    if (mockRes.ok) mockData = await mockRes.json();

    renderDetail(historyData, notesData, mockData);
  } catch (err) {
    dv.querySelector('#detail-content').innerHTML = '<div style="color:var(--red);padding:24px;text-align:center">Failed to load learner details.<br><button onclick="openLearner(' + id + ')" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:0.85rem;font-weight:600;cursor:pointer;font-family:var(--font-body)">Try again</button></div>';
  }
}

function renderDetail(data, notesData, mockData) {
  const l = data.learner;
  const tierLabels = { 1: 'Tier 1', 2: 'Tier 2', 3: 'Tier 3' };
  const tier = l.current_tier || 1;

  // Contact info
  const info = [];
  if (l.phone) info.push('<a href="tel:' + esc(l.phone) + '">' + esc(l.phone) + '</a>');
  if (l.email) info.push('<a href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a>');
  if (l.pickup_address) info.push('Pickup: ' + esc(l.pickup_address));
  if (l.prefer_contact_before) info.push('<span class="contact-pref-badge">Contact first</span>');

  // Stats
  const firstDate = data.bookings.length ? data.bookings[data.bookings.length - 1].scheduled_date : null;
  const lastDate = data.bookings.length ? data.bookings[0].scheduled_date : null;

  let html = '<div class="fade-in">';

  // Header
  html += '<div class="detail-header">';
  html += '<div class="detail-name">' + esc(l.name || 'Unnamed') + ' <span class="tier-badge tier-' + tier + '">' + (tierLabels[tier] || 'Tier ' + tier) + '</span></div>';
  if (info.length) html += '<div class="detail-info">' + info.join(' &middot; ') + '</div>';
  if (l.email) {
    html += '<div style="margin-top:10px"><button onclick="offerLessonToLearner(\'' + esc(l.email) + '\')" style="padding:8px 16px;border:1.5px solid var(--accent);background:var(--accent-lt);color:var(--accent);border-radius:8px;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.15s">📧 Offer a lesson</button></div>';
  }
  html += '</div>';

  // Stats cards
  html += '<div class="detail-stats">';
  html += '<div class="detail-stat"><div class="detail-stat-value">' + data.totalLessons + '</div><div class="detail-stat-label">Completed</div></div>';
  html += '<div class="detail-stat"><div class="detail-stat-value">' + data.bookings.length + '</div><div class="detail-stat-label">Total Bookings</div></div>';
  if (firstDate) html += '<div class="detail-stat"><div class="detail-stat-value">' + formatDate(firstDate) + '</div><div class="detail-stat-label">First Lesson</div></div>';
  if (lastDate) html += '<div class="detail-stat"><div class="detail-stat-value">' + formatDate(lastDate) + '</div><div class="detail-stat-label">Last Lesson</div></div>';
  html += '</div>';

  // Your notes section
  html += `
    <div class="detail-notes-section">
      <div class="detail-notes-title">Your Notes</div>
      <div class="detail-notes-form">
        <div class="detail-form-group">
          <label for="detail-notes-text">Notes about this learner</label>
          <textarea id="detail-notes-text" placeholder="e.g. Nervous driver, needs roundabout practice, prefers quiet routes…">${esc(notesData.notes || '')}</textarea>
        </div>
        <div class="detail-form-row">
          <div class="detail-form-group">
            <label for="detail-test-date">Test date</label>
            <input type="date" id="detail-test-date" value="${notesData.test_date || ''}">
          </div>
        </div>
        <button class="btn-save-notes" id="save-notes-btn" onclick="saveLearnerNotes()">Save notes</button>
      </div>
    </div>`;

  // Booking history
  html += '<div class="section-title" style="margin-top:24px">Lesson History</div>';
  if (data.bookings.length === 0) {
    html += '<div class="empty-state"><p>No lessons yet.</p></div>';
  } else {
    html += data.bookings.map(b => {
      let card = '<div class="booking-card">';
      card += '<div class="booking-card-top">';
      card += '<div><span class="booking-date">' + formatDate(b.scheduled_date) + '</span> <span class="booking-time">' + (b.start_time || '').slice(0, 5) + ' \u2013 ' + (b.end_time || '').slice(0, 5) + '</span></div>';
      card += '<span class="status-badge status-' + b.status + '">' + b.status + '</span>';
      card += '</div>';
      if (b.session_notes) {
        card += '<div class="booking-notes">' + esc(b.session_notes) + '</div>';
      }
      if (b.learner_ratings && b.learner_ratings.length > 0) {
        card += '<div class="skill-pills">';
        card += b.learner_ratings.map(r =>
          '<span class="skill-pill skill-' + r.rating + '">' + esc(r.skill_key.replace(/_/g, ' ')) + '</span>'
        ).join('');
        card += '</div>';
      }
      card += '</div>';
      return card;
    }).join('');
  }

  html += '</div>';

  // ── Mock Test History ──
  var mocks = (mockData && mockData.mock_tests) || [];
  if (mocks.length > 0) {
    html += '<div class="section-title" style="margin-top:24px">Mock Test History</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;">';
    mocks.forEach(function(mt) {
      var date = mt.completed_at ? new Date(mt.completed_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'In progress';
      var modeLabel = mt.mode === 'supervisor' ? 'Supervisor' : mt.mode === 'instructor' ? 'Instructor' : 'Legacy';
      var modeBg = mt.mode === 'supervisor' ? '#ede9fe' : '#dbeafe';
      var modeColor = mt.mode === 'supervisor' ? '#7c3aed' : '#2563eb';

      var resultHtml = '';
      if (mt.mode === 'supervisor') {
        // Count supervisor ratings from faults
        var good = 0, nw = 0, con = 0;
        var seen = {};
        if (mt.faults) {
          mt.faults.forEach(function(f) {
            var k = f.skill_key + '_' + f.part;
            if (seen[k]) return;
            seen[k] = true;
            if (f.supervisor_rating === 'good') good++;
            else if (f.supervisor_rating === 'needs_work') nw++;
            else if (f.supervisor_rating === 'concern') con++;
          });
        }
        resultHtml = '<span style="color:#166534;font-weight:700;">' + good + ' \u2713</span> &nbsp;';
        resultHtml += '<span style="color:#b45309;font-weight:700;">' + nw + ' \u26A0</span> &nbsp;';
        resultHtml += '<span style="color:#dc2626;font-weight:700;">' + con + ' \u2716</span>';
      } else {
        var resultColor = mt.result === 'pass' ? '#166534' : '#dc2626';
        var resultBg = mt.result === 'pass' ? '#dcfce7' : '#fee2e2';
        var resultText = mt.result ? mt.result.toUpperCase() : '\u2014';
        resultHtml = '<span style="background:' + resultBg + ';color:' + resultColor + ';padding:2px 10px;border-radius:100px;font-weight:700;font-size:0.78rem;">' + resultText + '</span>';
        if (mt.total_driving_faults != null) {
          resultHtml += ' <span style="font-size:0.8rem;color:var(--muted);">' + mt.total_driving_faults + 'D ' + mt.total_serious_faults + 'S ' + mt.total_dangerous_faults + '\u2716</span>';
        }
      }

      html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      html += '<span style="font-weight:600;font-size:0.88rem;">' + date + '</span>';
      html += '<span style="background:' + modeBg + ';color:' + modeColor + ';padding:2px 8px;border-radius:100px;font-size:0.72rem;font-weight:700;">' + modeLabel + '</span>';
      html += '</div>';
      html += '<div style="font-size:0.85rem;">' + resultHtml + '</div>';
      if (mt.notes) html += '<div style="font-size:0.82rem;color:var(--muted);margin-top:4px;font-style:italic;">' + esc(mt.notes) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('detail-content').innerHTML = html;
}

async function saveLearnerNotes() {
  if (!currentDetailLearnerId) return;
  const btn = document.getElementById('save-notes-btn');
  const notes = document.getElementById('detail-notes-text').value.trim();
  const testDate = document.getElementById('detail-test-date').value || null;

  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/instructor?action=update-learner-notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ learner_id: currentDetailLearnerId, notes: notes || null, test_date: testDate })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    // Update the cached learner in allLearners so the list view reflects changes
    const cached = allLearners.find(l => l.id === currentDetailLearnerId);
    if (cached) {
      cached.instructor_notes = notes || null;
      cached.test_date = testDate;
    }

    showToast('Notes saved');
  } catch (err) {
    showToast(err.message || 'Failed to save notes', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Save notes';
  }
}

function showList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('list-view').style.display = 'block';
  renderLearners(); // re-render to pick up any notes/test date changes
}

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00Z');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'UTC' });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Offer Lesson (redirect to schedule page with offer modal open) ──
function offerLessonToLearner(email) {
  // Navigate to the schedule page with a query param to open the offer modal
  window.location.href = '/instructor/?offer=' + encodeURIComponent(email);
}

window.addEventListener('DOMContentLoaded', init);
</script>
