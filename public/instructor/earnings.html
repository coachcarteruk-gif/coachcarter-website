<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>Earnings — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" data-swap-media>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/instructor.css">
  <script src="/shared/dark-mode.js"></script>
  <script src="/shared/font-swap.js"></script>
  <style>
    .page { max-width: 600px; margin: 0 auto; padding: 28px 16px 24px; }
    h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 4px; margin-bottom: 28px; }

    /* Summary cards */
    .summary-cards {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px;
    }
    .summary-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px; text-align: center;
    }
    .summary-value {
      font-family: var(--font-head); font-size: 1.4rem; font-weight: 800;
      color: var(--primary); line-height: 1.2;
    }
    .summary-value.accent { color: var(--accent); }
    .summary-label {
      font-size: 0.72rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;
    }

    @media (max-width: 420px) {
      .summary-cards { grid-template-columns: 1fr; }
    }

    /* Section card */
    .section-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .section-title {
      font-family: var(--font-head); font-size: 1rem; font-weight: 700;
    }
    .section-total {
      font-family: var(--font-head); font-size: 1.1rem; font-weight: 800;
      color: var(--accent);
    }

    /* Week navigation */
    .week-nav {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .week-nav-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      color: var(--primary); transition: background 0.15s;
    }
    .week-nav-btn:hover { background: var(--border); }
    .week-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .week-date-range {
      font-size: 0.85rem; font-weight: 600; color: var(--primary); flex: 1; text-align: center;
    }

    /* Lesson rows */
    .lesson-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-info { flex: 1; min-width: 0; }
    .lesson-date {
      font-size: 0.78rem; font-weight: 700; color: var(--primary);
    }
    .lesson-learner {
      font-size: 0.82rem; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lesson-time {
      font-size: 0.75rem; color: var(--muted); margin-top: 2px;
    }
    .lesson-pay {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
      color: var(--primary); white-space: nowrap;
    }
    .status-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-completed { background: var(--green-lt, #dcfce7); color: #166534; }
    .status-confirmed { background: #dbeafe; color: #1e40af; }

    .empty-state {
      text-align: center; padding: 32px 16px; color: var(--muted); font-size: 0.9rem;
    }

    /* History table */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      text-align: left; font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 6px;
      border-bottom: 2px solid var(--border);
    }
    .history-table td {
      font-size: 0.85rem; padding: 10px 6px; border-bottom: 1px solid var(--border);
      color: var(--primary);
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table .col-pay {
      font-family: var(--font-head); font-weight: 700; text-align: right;
    }
    .history-table .col-right { text-align: right; }

    .btn-load-more {
      display: block; width: 100%; padding: 10px; margin-top: 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font-head); font-size: 0.85rem; font-weight: 600;
      color: var(--primary); cursor: pointer; transition: background 0.15s;
    }
    .btn-load-more:hover { background: var(--border); }
    .btn-load-more:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--primary); color: white;
      padding: 12px 22px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600;
      transition: transform 0.3s, opacity 0.3s; z-index: 9999; max-width: calc(100vw - 32px); word-wrap: break-word; text-align: center;
      opacity: 0; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .toast.success { background: #16a34a; }
    .toast.error { background: var(--red); }

    /* ── Confirm modal ── */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--card); border-radius: var(--radius); padding: 24px;
      max-width: 360px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .confirm-box p { font-size: 0.9rem; color: var(--primary); margin: 0 0 20px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions button {
      flex: 1; padding: 11px; border-radius: 8px; font-weight: 600; font-size: 0.85rem;
      cursor: pointer; border: none; transition: background 0.15s;
    }
    .btn-confirm-no { background: var(--border); color: var(--primary); }
    .btn-confirm-yes { background: var(--accent); color: white; }

    .commission-note {
      text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 20px;
    }

    /* Connect onboarding banner */
    .connect-banner {
      border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .connect-banner.not-started {
      background: #fff7ed; border: 1px solid #fed7aa;
    }
    .connect-banner.pending {
      background: #fffbeb; border: 1px solid #fde68a;
    }
    .connect-banner.active {
      background: var(--green-lt); border: 1px solid #bbf7d0;
    }
    .connect-banner-text { flex: 1; min-width: 200px; }
    .connect-banner-title {
      font-family: var(--font-head); font-weight: 700; font-size: 0.95rem;
    }
    .connect-banner-desc {
      font-size: 0.8rem; color: var(--muted); margin-top: 4px;
    }
    .connect-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 10px 20px; font-family: var(--font-head); font-weight: 700;
      font-size: 0.85rem; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .connect-btn:hover { opacity: 0.9; }
    .connect-btn.secondary {
      background: var(--bg); color: var(--primary); border: 1px solid var(--border);
    }

    /* Next payout card */
    .next-payout-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .next-payout-label {
      font-size: 0.82rem; color: var(--muted); font-weight: 600;
    }
    .next-payout-amount {
      font-family: var(--font-head); font-size: 1.3rem; font-weight: 800;
      color: var(--accent);
    }
    .next-payout-detail {
      font-size: 0.78rem; color: var(--muted);
    }

    /* Payout history */
    .payout-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
    }
    .payout-row:last-child { border-bottom: none; }
    .payout-status {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
    }
    .payout-status.completed { background: #dcfce7; color: #166534; }
    .payout-status.failed { background: #fee2e2; color: #991b1b; }
    .payout-status.processing { background: #dbeafe; color: #1e40af; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
<script src="/sidebar.js"></script>
<script src="/shared/instructor-auth.js"></script>
</head>
<body>


<div class="page">
  <h1>Earnings</h1>
  <p class="subtitle">Track your weekly pay and lesson history.</p>

  <div id="earningsContent">
    <div class="loading"><div class="spinner"></div><p>Loading earnings...</p></div>
  </div>
</div>


<script src="/instructor/earnings.js"></script>

<div id="toast" class="toast"></div>

<div class="confirm-overlay" id="dismissConfirmModal">
  <div class="confirm-box">
    <p>This will hide the payout setup banner. You can re-enable it from the admin portal later.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-no" id="btn-dismiss-cancel">Cancel</button>
      <button class="btn-confirm-yes" id="btn-dismiss-confirm">Yes, hide it</button>
    </div>
  </div>
</div>

</body>
</html>
