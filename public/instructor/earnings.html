<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>Earnings — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/instructor.css">
  <script src="/shared/dark-mode.js"></script>
  <style>
    .page { max-width: 600px; margin: 0 auto; padding: 28px 16px 24px; }
    h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 4px; margin-bottom: 28px; }

    /* Summary cards */
    .summary-cards {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px;
    }
    .summary-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px; text-align: center;
    }
    .summary-value {
      font-family: var(--font-head); font-size: 1.4rem; font-weight: 800;
      color: var(--primary); line-height: 1.2;
    }
    .summary-value.accent { color: var(--accent); }
    .summary-label {
      font-size: 0.72rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;
    }

    @media (max-width: 420px) {
      .summary-cards { grid-template-columns: 1fr; }
    }

    /* Section card */
    .section-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .section-title {
      font-family: var(--font-head); font-size: 1rem; font-weight: 700;
    }
    .section-total {
      font-family: var(--font-head); font-size: 1.1rem; font-weight: 800;
      color: var(--accent);
    }

    /* Week navigation */
    .week-nav {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .week-nav-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      color: var(--primary); transition: background 0.15s;
    }
    .week-nav-btn:hover { background: var(--border); }
    .week-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .week-date-range {
      font-size: 0.85rem; font-weight: 600; color: var(--primary); flex: 1; text-align: center;
    }

    /* Lesson rows */
    .lesson-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-info { flex: 1; min-width: 0; }
    .lesson-date {
      font-size: 0.78rem; font-weight: 700; color: var(--primary);
    }
    .lesson-learner {
      font-size: 0.82rem; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lesson-time {
      font-size: 0.75rem; color: var(--muted); margin-top: 2px;
    }
    .lesson-pay {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
      color: var(--primary); white-space: nowrap;
    }
    .status-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-completed { background: var(--green-lt, #dcfce7); color: #166534; }
    .status-confirmed { background: #dbeafe; color: #1e40af; }

    .empty-state {
      text-align: center; padding: 32px 16px; color: var(--muted); font-size: 0.9rem;
    }

    /* History table */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      text-align: left; font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 6px;
      border-bottom: 2px solid var(--border);
    }
    .history-table td {
      font-size: 0.85rem; padding: 10px 6px; border-bottom: 1px solid var(--border);
      color: var(--primary);
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table .col-pay {
      font-family: var(--font-head); font-weight: 700; text-align: right;
    }
    .history-table .col-right { text-align: right; }

    .btn-load-more {
      display: block; width: 100%; padding: 10px; margin-top: 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font-head); font-size: 0.85rem; font-weight: 600;
      color: var(--primary); cursor: pointer; transition: background 0.15s;
    }
    .btn-load-more:hover { background: var(--border); }
    .btn-load-more:disabled { opacity: 0.4; cursor: not-allowed; }

    .commission-note {
      text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 20px;
    }

    /* Connect onboarding banner */
    .connect-banner {
      border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .connect-banner.not-started {
      background: #fff7ed; border: 1px solid #fed7aa;
    }
    .connect-banner.pending {
      background: #fffbeb; border: 1px solid #fde68a;
    }
    .connect-banner.active {
      background: var(--green-lt); border: 1px solid #bbf7d0;
    }
    .connect-banner-text { flex: 1; min-width: 200px; }
    .connect-banner-title {
      font-family: var(--font-head); font-weight: 700; font-size: 0.95rem;
    }
    .connect-banner-desc {
      font-size: 0.8rem; color: var(--muted); margin-top: 4px;
    }
    .connect-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 10px 20px; font-family: var(--font-head); font-weight: 700;
      font-size: 0.85rem; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .connect-btn:hover { opacity: 0.9; }
    .connect-btn.secondary {
      background: var(--bg); color: var(--primary); border: 1px solid var(--border);
    }

    /* Next payout card */
    .next-payout-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .next-payout-label {
      font-size: 0.82rem; color: var(--muted); font-weight: 600;
    }
    .next-payout-amount {
      font-family: var(--font-head); font-size: 1.3rem; font-weight: 800;
      color: var(--accent);
    }
    .next-payout-detail {
      font-size: 0.78rem; color: var(--muted);
    }

    /* Payout history */
    .payout-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
    }
    .payout-row:last-child { border-bottom: none; }
    .payout-status {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
    }
    .payout-status.completed { background: #dcfce7; color: #166534; }
    .payout-status.failed { background: #fee2e2; color: #991b1b; }
    .payout-status.processing { background: #dbeafe; color: #1e40af; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
<script src="/sidebar.js"></script>
<script src="/shared/instructor-auth.js"></script>
</head>
<body>


<div class="page">
  <h1>Earnings</h1>
  <p class="subtitle">Track your weekly pay and lesson history.</p>

  <div id="earningsContent">
    <div class="loading"><div class="spinner"></div><p>Loading earnings...</p></div>
  </div>
</div>


<script>
  let token = null;
  let currentWeekStart = null; // ISO date string of current week's Monday
  let historyOffset = 0;
  const HISTORY_LIMIT = 12;

  function formatPence(pence) {
    return '\u00A3' + (pence / 100).toFixed(2);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function formatDateShort(dateStr) {
    // Handle both ISO strings "2026-04-01" and full date strings from API
    var s = typeof dateStr === 'string' ? dateStr.slice(0, 10) : new Date(dateStr).toISOString().slice(0, 10);
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function formatTime(timeStr) {
    // timeStr like "09:00:00" or "09:00"
    const parts = timeStr.split(':');
    const h = parseInt(parts[0]);
    const m = parts[1];
    const ampm = h >= 12 ? 'pm' : 'am';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return h12 + ':' + m + ampm;
  }

  // Get Monday of a given week offset (0 = this week, -1 = last week, etc)
  function getMondayISO(offsetWeeks) {
    const d = new Date();
    const day = d.getDay(); // 0=Sun
    const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
    d.setDate(diff + (offsetWeeks * 7));
    return d.toISOString().slice(0, 10);
  }

  function shiftWeek(direction) {
    const d = new Date(currentWeekStart + 'T00:00:00');
    d.setDate(d.getDate() + (direction * 7));
    currentWeekStart = d.toISOString().slice(0, 10);
    loadWeek();
  }

  async function apiFetch(action, params = '') {
    const res = await fetch(`/api/instructor?action=${action}${params}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
  }

  // ── Render functions ─────────────────────────────────────────────────────────

  function renderSummary(data) {
    return `
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-value accent">${formatPence(data.this_month.earnings_pence)}</div>
          <div class="summary-label">This Month</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${formatPence(data.avg_per_week_pence)}</div>
          <div class="summary-label">Avg / Week</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${data.all_time.lesson_count}</div>
          <div class="summary-label">Total Lessons</div>
        </div>
      </div>
    `;
  }

  function toDateStr(v) {
    return typeof v === 'string' ? v.slice(0, 10) : new Date(v).toISOString().slice(0, 10);
  }

  function renderWeek(data) {
    var ws = toDateStr(data.week_start), we = toDateStr(data.week_end);
    const weekLabel = formatDateShort(ws) + ' \u2013 ' + formatDateShort(we);
    const isCurrentWeek = ws === getMondayISO(0);
    const isFuture = new Date(we + 'T23:59:59') > new Date();

    let lessonsHTML = '';
    if (data.lessons.length === 0) {
      lessonsHTML = '<div class="empty-state">No lessons this week</div>';
    } else {
      lessonsHTML = data.lessons.map(l => `
        <div class="lesson-row">
          <div class="lesson-info">
            <div class="lesson-date">
              ${formatDate(l.date)}
              <span class="status-badge status-${l.status}">${l.status}</span>
            </div>
            <div class="lesson-learner">${l.learner_name} &middot; ${l.lesson_type_name}</div>
            <div class="lesson-time">${formatTime(l.start_time)} \u2013 ${formatTime(l.end_time)} (${l.duration_minutes} min)</div>
          </div>
          <div class="lesson-pay">${formatPence(l.instructor_pay_pence)}</div>
        </div>
      `).join('');
    }

    return `
      <div class="section-card" id="week-section">
        <div class="section-header">
          <div class="section-title">This Week's Pay</div>
          <div class="section-total">${formatPence(data.total_pence)}</div>
        </div>
        <div class="week-nav">
          <button class="week-nav-btn" onclick="shiftWeek(-1)">&larr; Prev</button>
          <div class="week-date-range">${weekLabel}</div>
          <button class="week-nav-btn" onclick="shiftWeek(1)" ${isCurrentWeek ? 'disabled' : ''}>${isCurrentWeek ? 'This week' : 'Next &rarr;'}</button>
        </div>
        <div>
          ${data.completed_count + data.confirmed_count > 0
            ? `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:8px;">
                ${data.completed_count} completed &middot; ${data.confirmed_count} upcoming
              </div>`
            : ''}
          ${lessonsHTML}
          ${data.fee_model === 'franchise' && data.gross_pence > 0 ? `
            <div style="border-top:2px solid var(--border);margin-top:12px;padding-top:12px;font-size:0.85rem;">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="color:var(--muted);">Gross earnings</span>
                <span>${formatPence(data.gross_pence)}</span>
              </div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="color:var(--muted);">Franchise fee</span>
                <span style="color:#991b1b;">&minus;${formatPence(data.franchise_fee_applied_pence)}</span>
              </div>
              <div style="display:flex;justify-content:space-between;font-weight:700;">
                <span>Your pay</span>
                <span style="color:var(--accent);">${formatPence(data.total_pence)}</span>
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  function renderHistory(weeks, append) {
    if (!append) {
      if (weeks.length === 0) {
        return `
          <div class="section-card">
            <div class="section-title" style="margin-bottom:0;">Past Weeks</div>
            <div class="empty-state">No completed lessons yet</div>
          </div>
        `;
      }
      return `
        <div class="section-card" id="history-section">
          <div class="section-title" style="margin-bottom:16px;">Past Weeks</div>
          <table class="history-table">
            <thead>
              <tr>
                <th>Week</th>
                <th>Lessons</th>
                <th>Hours</th>
                <th class="col-right">Pay</th>
              </tr>
            </thead>
            <tbody id="history-body">
              ${renderHistoryRows(weeks)}
            </tbody>
          </table>
          <button class="btn-load-more" id="btn-load-more" onclick="loadMoreHistory()">Load more weeks</button>
        </div>
      `;
    }
    // Append mode
    const tbody = document.getElementById('history-body');
    if (tbody) tbody.insertAdjacentHTML('beforeend', renderHistoryRows(weeks));
    if (weeks.length < HISTORY_LIMIT) {
      const btn = document.getElementById('btn-load-more');
      if (btn) { btn.textContent = 'No more weeks'; btn.disabled = true; }
    }
    return null;
  }

  function renderHistoryRows(weeks) {
    return weeks.map(w => `
      <tr>
        <td>${formatDateShort(w.week_start)} \u2013 ${formatDateShort(w.week_end)}</td>
        <td>${w.lesson_count}</td>
        <td>${w.total_hours}h</td>
        <td class="col-pay">${formatPence(w.instructor_pay_pence)}</td>
      </tr>
    `).join('');
  }

  // ── Connect & Payout renders ──────────────────────────────────────────────────

  function renderConnectBanner(status) {
    // Dismissed: no account + payouts paused = platform owner, hide banner entirely
    if (!status.has_account && status.payouts_paused) {
      return '';
    }
    if (!status.has_account) {
      return `
        <div class="connect-banner not-started">
          <div class="connect-banner-text">
            <div class="connect-banner-title">Set Up Direct Payouts</div>
            <div class="connect-banner-desc">Get paid automatically every Friday. Connect your bank account to start receiving payouts.</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="connect-btn" onclick="startConnectOnboarding()">Set Up Payouts</button>
            <button class="connect-btn secondary" onclick="dismissConnect()" style="font-size:0.78rem;">Not needed</button>
          </div>
        </div>
      `;
    }
    if (!status.onboarding_complete) {
      return `
        <div class="connect-banner pending">
          <div class="connect-banner-text">
            <div class="connect-banner-title">Finish Setting Up Payouts</div>
            <div class="connect-banner-desc">You've started the process — just a few more steps to connect your bank account.</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="connect-btn" onclick="continueConnectOnboarding()">Continue Setup</button>
            <button class="connect-btn secondary" onclick="dismissConnect()" style="font-size:0.78rem;">Not needed</button>
          </div>
        </div>
      `;
    }
    if (status.payouts_paused) {
      return `
        <div class="connect-banner pending">
          <div class="connect-banner-text">
            <div class="connect-banner-title">Payouts Paused</div>
            <div class="connect-banner-desc">Your payouts are currently paused by admin. Contact your manager for details.</div>
          </div>
          <button class="connect-btn secondary" onclick="openStripeDashboard()">View Stripe Dashboard</button>
        </div>
      `;
    }
    return `
      <div class="connect-banner active">
        <div class="connect-banner-text">
          <div class="connect-banner-title" style="color:#166534;">&#x2705; Payouts Active</div>
          <div class="connect-banner-desc">You're set up to receive automatic payouts every Friday.</div>
        </div>
        <button class="connect-btn secondary" onclick="openStripeDashboard()">Stripe Dashboard</button>
      </div>
    `;
  }

  function renderNextPayout(preview) {
    if (!preview.onboarding_complete || preview.eligible_lessons === 0) return '';
    return `
      <div class="next-payout-card">
        <div>
          <div class="next-payout-label">Next Payout &middot; Friday ${formatDateShort(preview.next_payout_date)}</div>
          <div class="next-payout-detail">${preview.eligible_lessons} lesson${preview.eligible_lessons === 1 ? '' : 's'} ready${preview.payouts_paused ? ' (paused)' : ''}</div>
        </div>
        <div class="next-payout-amount">${formatPence(preview.estimated_pence)}</div>
      </div>
    `;
  }

  function renderPayoutHistory(data) {
    if (!data.payouts || data.payouts.length === 0) return '';
    const rows = data.payouts.map(p => `
      <div class="payout-row">
        <div>
          <div style="font-size:0.82rem;font-weight:600;">${formatDateShort(p.period_start)} &ndash; ${formatDateShort(p.period_end)}</div>
          <div style="font-size:0.75rem;color:var(--muted);">${p.lesson_count} lesson${p.lesson_count == 1 ? '' : 's'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="payout-status ${p.status}">${p.status}</span>
          <span style="font-family:var(--font-head);font-weight:700;">${formatPence(p.amount_pence)}</span>
        </div>
      </div>
    `).join('');

    return `
      <div class="section-card">
        <div class="section-title" style="margin-bottom:16px;">Payout History</div>
        ${rows}
      </div>
    `;
  }

  async function startConnectOnboarding() {
    try {
      const res = await fetch('/api/connect?action=create-account', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      if (data.ok && data.onboarding_url) {
        window.location.href = data.onboarding_url;
      } else {
        alert(data.message || 'Failed to start setup. Please try again.');
      }
    } catch (err) {
      alert('Something went wrong. Please try again.');
    }
  }

  async function continueConnectOnboarding() {
    try {
      const res = await fetch('/api/connect?action=onboarding-link', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (data.ok && data.onboarding_url) {
        window.location.href = data.onboarding_url;
      } else {
        alert(data.message || 'Failed to get onboarding link. Please try again.');
      }
    } catch (err) {
      alert('Something went wrong. Please try again.');
    }
  }

  async function dismissConnect() {
    if (!confirm('This will hide the payout setup banner. You can re-enable it from the admin portal later.')) return;
    try {
      const res = await fetch('/api/connect?action=dismiss-connect', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      if (data.ok) {
        // Remove the banner from the page
        document.querySelector('.connect-banner')?.remove();
      } else {
        alert(data.message || 'Failed to dismiss.');
      }
    } catch (err) {
      alert('Something went wrong. Please try again.');
    }
  }

  async function openStripeDashboard() {
    try {
      const res = await fetch('/api/connect?action=dashboard-link', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (data.ok && data.dashboard_url) {
        window.open(data.dashboard_url, '_blank');
      } else {
        alert(data.message || 'Failed to open dashboard.');
      }
    } catch (err) {
      alert('Something went wrong. Please try again.');
    }
  }

  // ── Data loading ──────────────────────────────────────────────────────────────

  async function loadWeek() {
    try {
      const data = await apiFetch('earnings-week', `&week_start=${currentWeekStart}`);
      const weekSection = document.getElementById('week-section');
      if (weekSection) {
        weekSection.outerHTML = renderWeek(data);
      }
    } catch (err) {
      console.error('Failed to load week:', err);
    }
  }

  async function loadMoreHistory() {
    const btn = document.getElementById('btn-load-more');
    if (btn) { btn.textContent = 'Loading...'; btn.disabled = true; }
    try {
      historyOffset += HISTORY_LIMIT;
      const data = await apiFetch('earnings-history', `&limit=${HISTORY_LIMIT}&offset=${historyOffset}`);
      renderHistory(data.weeks, true);
      if (data.weeks.length === HISTORY_LIMIT && btn) {
        btn.textContent = 'Load more weeks';
        btn.disabled = false;
      }
    } catch (err) {
      console.error('Failed to load more history:', err);
      if (btn) { btn.textContent = 'Failed to load'; btn.disabled = false; }
    }
  }

  async function init() {
    const auth = ccAuth.requireAuth();
    if (!auth) return;
    token = auth.token;

    currentWeekStart = getMondayISO(0);

    // Handle return from Stripe Connect onboarding
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('connect') === 'return') {
      // Clean URL
      window.history.replaceState({}, '', '/instructor/earnings.html');
    }

    try {
      // Fetch all data in parallel
      const [summary, week, history, connectStatus, payoutPreview, payoutHistory] = await Promise.all([
        apiFetch('earnings-summary'),
        apiFetch('earnings-week', `&week_start=${currentWeekStart}`),
        apiFetch('earnings-history', `&limit=${HISTORY_LIMIT}&offset=0`),
        fetch('/api/connect?action=connect-status', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json()).catch(() => ({ has_account: false, onboarding_complete: false })),
        apiFetch('next-payout-preview').catch(() => null),
        apiFetch('payout-history', '&limit=10').catch(() => ({ payouts: [] }))
      ]);

      const container = document.getElementById('earningsContent');
      container.innerHTML =
        renderConnectBanner(connectStatus) +
        renderSummary(summary) +
        (payoutPreview ? renderNextPayout(payoutPreview) : '') +
        renderWeek(week) +
        renderHistory(history.weeks, false) +
        renderPayoutHistory(payoutHistory) +
        (summary.fee_model === 'franchise'
          ? `<p class="commission-note">Franchise fee: ${formatPence(summary.weekly_franchise_fee_pence)}/week. You keep all lesson revenue minus this fee.</p>`
          : `<p class="commission-note">Your commission rate: ${Math.round(summary.commission_rate * 100)}%. Contact admin for queries.</p>`);

      // Hide load more if less than a full page
      if (history.weeks.length < HISTORY_LIMIT) {
        const btn = document.getElementById('btn-load-more');
        if (btn) { btn.textContent = 'No more weeks'; btn.disabled = true; }
      }

    } catch (err) {
      console.error('Failed to load earnings:', err);
      document.getElementById('earningsContent').innerHTML =
        '<div class="empty-state">Failed to load earnings data. Please try again.</div>';
    }
  }

  init();
</script>
</body>
</html>
