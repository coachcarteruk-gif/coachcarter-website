<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>Q&A — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/instructor.css">
  <script src="/shared/dark-mode.js"></script>
  <style>
    /* ── Page Shell ── */
    .page { max-width: 800px; margin: 0 auto; padding: 24px 16px 24px; }

    /* ── Header Row ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }

    /* ── Filter Tabs ── */
    .filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .filter-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .filter-tab:hover { color: var(--primary); }
    .filter-tab.active { color: var(--accent); }
    .filter-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 1px;
    }
    .filter-count {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.6rem; font-weight: 700; padding: 1px 6px; border-radius: 100px;
      margin-left: 4px; vertical-align: middle;
    }

    /* ── Question Cards ── */
    .q-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.18s;
    }
    .q-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(245,131,33,0.08); }
    .q-card.needs-answer { border-left: 3px solid var(--accent); }
    .q-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .q-card-title { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
    .q-card-status {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-open { background: var(--accent-lt); color: var(--accent); }
    .status-answered { background: var(--green-lt); color: var(--green); }
    .status-closed { background: var(--surface); color: var(--muted); }
    .q-card-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); max-width: 360px; margin: 0 auto; }

    /* ── Detail View ── */
    .detail-view { display: none; }
    .detail-view.show { display: block; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.83rem; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 0;
      margin-bottom: 16px; font-family: var(--font-body);
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-title { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .detail-body { font-size: 0.9rem; line-height: 1.6; color: var(--primary); margin-bottom: 24px; white-space: pre-wrap; }
    .answers-title { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
    .answer-card {
      padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .answer-card.instructor {
      background: var(--accent-lt); border-color: rgba(245,131,33,0.2);
      border-left: 3px solid var(--accent);
    }
    .answer-author { font-size: 0.78rem; font-weight: 700; margin-bottom: 4px; }
    .answer-author .badge {
      display: inline-block; padding: 1px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-left: 6px;
    }
    .badge-instructor { background: var(--accent); color: #fff; }
    .badge-learner { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .answer-body { font-size: 0.88rem; line-height: 1.5; color: var(--primary); white-space: pre-wrap; }
    .answer-time { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .reply-box { margin-top: 20px; }
    .reply-box textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem; color: var(--primary);
      resize: vertical; min-height: 80px; margin-bottom: 10px;
    }
    .reply-box textarea:focus { border-color: var(--accent); outline: none; }
    .btn-answer {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none; border-radius: 100px;
      padding: 10px 24px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      font-family: var(--font-body); transition: all 0.18s;
    }
    .btn-answer:hover { background: var(--accent-dk); }
    .btn-answer:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 400; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }


    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.35s ease; }
  </style>
<script src="/sidebar.js"></script>
<script src="/shared/instructor-auth.js"></script>
</head>
<body>


<div class="page">
  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <h1>Learner Questions</h1>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterQuestions('all', this)">All</button>
      <button class="filter-tab" id="tab-open" onclick="filterQuestions('open', this)">Open <span class="filter-count" id="open-count" style="display:none">0</span></button>
      <button class="filter-tab" onclick="filterQuestions('answered', this)">Answered</button>
      <button class="filter-tab" onclick="filterQuestions('closed', this)">Closed</button>
    </div>

    <div id="questions-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="detail-view" id="detail-view">
    <button class="detail-back" onclick="showList()">&#8249; Back to questions</button>
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
let token, instructor;
let allQuestions = [];
let currentFilter = 'all';

// ── Init ──
function init() {
  const session = ccAuth.getAuth();
  token = session?.token || null;
  instructor = session?.instructor || null;
  if (!token) { window.location.href = '/instructor/login.html'; return; }
  if (instructor?.is_admin) {
    const adminTab = document.getElementById('admin-tab');
    if (adminTab) adminTab.style.display = '';
  }

  loadQuestions();
}

function signOut() {
  ccAuth.logout();
}

// ── Load questions ──
async function loadQuestions() {
  try {
    const res = await fetch('/api/instructor?action=qa-list', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await res.json();
    if (res.status === 401) { signOut(); return; }
    if (!res.ok) throw new Error(data.error);
    allQuestions = data.questions || [];
    updateOpenCount();
    renderQuestions();
  } catch (err) {
    document.getElementById('questions-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:24px">Failed to load questions.</div>';
  }
}

function updateOpenCount() {
  const openCount = allQuestions.filter(q => q.status === 'open').length;
  const badge = document.getElementById('open-count');
  if (openCount > 0) {
    badge.textContent = openCount;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function filterQuestions(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderQuestions();
}

function renderQuestions() {
  const container = document.getElementById('questions-list');
  let filtered = allQuestions;
  if (currentFilter !== 'all') {
    filtered = allQuestions.filter(q => q.status === currentFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state fade-in">
        <div class="empty-state-icon">&#x1F4AC;</div>
        <h2>${currentFilter === 'all' ? 'No questions yet' : 'No ' + currentFilter + ' questions'}</h2>
        <p>When learners ask questions, they'll appear here for you to answer.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(q => `
    <div class="q-card fade-in ${q.status === 'open' ? 'needs-answer' : ''}" onclick="openQuestion(${q.id})">
      <div class="q-card-top">
        <div class="q-card-title">${esc(q.title)}</div>
        <span class="q-card-status status-${q.status}">${q.status}</span>
      </div>
      <div class="q-card-meta">
        <span>From ${esc(q.learner_name || 'Learner')}</span>
        <span>${timeAgo(q.created_at)}</span>
        <span>${q.answer_count} ${q.answer_count === 1 ? 'reply' : 'replies'}</span>
      </div>
    </div>
  `).join('');
}

// ── Question detail ──
async function openQuestion(id) {
  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('show');
  dv.querySelector('#detail-content').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px">Loading...</div>';

  try {
    const res = await fetch(`/api/instructor?action=qa-detail&question_id=${id}`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    renderDetail(data.question, data.answers);
  } catch (err) {
    dv.querySelector('#detail-content').innerHTML = '<div style="color:var(--red);padding:24px">Failed to load question.</div>';
  }
}

function renderDetail(q, answers) {
  document.getElementById('detail-content').innerHTML = `
    <div class="fade-in">
      <div class="detail-title">${esc(q.title)}</div>
      <div class="detail-meta">
        <span>Asked by ${esc(q.learner_name || 'Learner')}</span>
        <span>${timeAgo(q.created_at)}</span>
        <span class="q-card-status status-${q.status}">${q.status}</span>
      </div>
      ${q.body ? `<div class="detail-body">${esc(q.body)}</div>` : ''}

      <div class="answers-title">${answers.length} ${answers.length === 1 ? 'Reply' : 'Replies'}</div>
      ${answers.length === 0 ? '<div style="color:var(--muted);font-size:0.85rem;margin-bottom:20px">No replies yet. Be the first to answer!</div>' : ''}
      ${answers.map(a => `
        <div class="answer-card ${a.author_type === 'instructor' ? 'instructor' : ''}">
          <div class="answer-author">
            ${esc(a.author_name)}
            <span class="badge ${a.author_type === 'instructor' ? 'badge-instructor' : 'badge-learner'}">${a.author_type}</span>
          </div>
          <div class="answer-body">${esc(a.body)}</div>
          <div class="answer-time">${timeAgo(a.created_at)}</div>
        </div>
      `).join('')}

      <div class="reply-box">
        <textarea id="reply-body" placeholder="Write your answer..."></textarea>
        <button class="btn-answer" onclick="submitReply(${q.id})">Post Answer</button>
      </div>
    </div>
  `;
}

function showList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('list-view').style.display = 'block';
  loadQuestions();
}

async function submitReply(questionId) {
  const textarea = document.getElementById('reply-body');
  const body = textarea.value.trim();
  if (!body) { showToast('Please enter your answer', 'error'); return; }

  const btn = textarea.nextElementSibling;
  btn.disabled = true;
  btn.textContent = 'Posting...';

  try {
    const res = await fetch('/api/instructor?action=qa-reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ question_id: questionId, body })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    showToast('Answer posted!');
    openQuestion(questionId);
  } catch (err) {
    showToast(err.message || 'Failed to post answer', 'error');
    btn.disabled = false;
    btn.textContent = 'Post Answer';
  }
}

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
