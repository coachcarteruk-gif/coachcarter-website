  <title>My Profile — CoachCarter Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/instructor.css">
  <style>
    header {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center;
      justify-content: space-between; height: 60px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      margin-top: 64px;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .header-brand img { height: 36px; }
    .header-brand-text { font-size: 0.9rem; font-weight: 700; color: var(--primary); }
    .header-brand-sub  { font-size: 0.7rem; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-name { font-size: 0.85rem; font-weight: 700; }
    .btn-signout {
      font-size: 0.8rem; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: background 0.15s;
    }
    .btn-signout:hover { background: var(--bg); color: var(--primary); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px; text-decoration: none; color: var(--muted);
      font-size: 0.68rem; font-weight: 600; transition: color 0.15s; gap: 3px;
    }
    .bottom-nav-item:hover  { color: var(--primary); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { font-size: 1.25rem; line-height: 1; }

    .page { max-width: 600px; margin: 0 auto; padding: 28px 16px 80px; margin-top: 124px; }
    h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 4px; margin-bottom: 28px; }

    /* Avatar */
    .avatar-row {
      display: flex; align-items: center; gap: 20px; margin-bottom: 28px;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-lt); display: flex; align-items: center;
      justify-content: center; font-family: var(--font-head);
      font-size: 1.6rem; font-weight: 800; color: var(--accent);
      flex-shrink: 0; overflow: hidden; border: 2px solid var(--border);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-info { flex: 1; }
    .avatar-name  { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; }
    .avatar-email { font-size: 0.85rem; color: var(--muted); margin-top: 3px; }
    .avatar-note  { font-size: 0.78rem; color: var(--muted); margin-top: 8px; line-height: 1.4; }

    /* Form card */
    .form-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px; margin-bottom: 16px;
    }
    .form-card-title {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--primary); font-family: var(--font-body);
      font-size: 0.9rem; padding: 10px 13px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); background: var(--white); }
    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .field-hint { font-size: 0.78rem; color: var(--muted); margin-top: 5px; }

    /* Read-only email field */
    .email-field {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-family: var(--font-body);
      font-size: 0.9rem; padding: 10px 13px;
    }

    .btn-save {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: 8px; font-family: var(--font-head); font-size: 1rem;
      font-weight: 700; padding: 13px; cursor: pointer; margin-top: 4px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-save:hover    { background: var(--accent-dk); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    .success-banner {
      background: var(--green-lt); border: 1.5px solid var(--green);
      border-radius: 10px; padding: 12px 16px; font-size: 0.875rem;
      color: #166534; margin-bottom: 16px; display: none;
    }
    .success-banner.show { display: block; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
<script src="/sidebar.js"></script>
</head>
<body>

<nav class="site-nav">
  <a class="site-nav-logo" href="/">
    <img src="/Logo.png" alt="CoachCarter">
    <span>Coach<em>Carter</em></span>
  </a>
  <div class="site-nav-links">
    <a class="site-nav-link" href="/learner-journey.html">Pricing</a>
    <a class="site-nav-link" href="/classroom.html">Free Videos</a>
    <a class="site-nav-link" href="/learner/login.html">Learner Login</a>
    <a class="site-nav-link" href="/instructor/login.html">Instructor Login</a>
    <a class="site-nav-link primary" href="/learner/login.html?redirect=/learner/book.html">Book Free Trial</a>
  </div>
</nav>

<header>
  <a class="header-brand" href="/instructor/">
    <img src="/Logo.png" alt="CoachCarter">
    <div>
      <div class="header-brand-text">CoachCarter</div>
      <div class="header-brand-sub">Instructor Portal</div>
    </div>
  </a>
  <div class="header-right">
    <span class="header-name" id="headerName">—</span>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="page">
  <h1>My Profile</h1>
  <p class="subtitle">Update your details as they appear to learners.</p>

  <div id="profileContent">
    <div class="loading"><div class="spinner"></div><p>Loading…</p></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/instructor/" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x1F4C5;</span>
    <span>Schedule</span>
  </a>
  <a href="/instructor/availability.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x1F550;</span>
    <span>Availability</span>
  </a>
  <a href="/instructor/learners.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x1F465;</span>
    <span>Learners</span>
  </a>
  <a href="/instructor/qa.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x1F4AC;</span>
    <span>Q&A</span>
  </a>
  <a href="/instructor/profile.html" class="bottom-nav-item active">
    <span class="bottom-nav-icon">&#x1F464;</span>
    <span>Profile</span>
  </a>
  <a href="/admin/portal.html" class="bottom-nav-item" id="admin-tab" style="display:none">
    <span class="bottom-nav-icon">&#x2699;&#xFE0F;</span>
    <span>Admin</span>
  </a>
</nav>

<script>
  let token = null;

  function init() {
    const session = JSON.parse(localStorage.getItem('cc_instructor') || 'null');
    token = session?.token || null;
    if (!token) { window.location.href = '/instructor/login.html'; return; }
    document.getElementById('headerName').textContent = session?.instructor?.name || '—';
    // Show admin tab if instructor has admin access
    if (session?.instructor?.is_admin) {
      const adminTab = document.getElementById('admin-tab');
      if (adminTab) adminTab.style.display = '';
    }
    loadProfile();
  }

  async function loadProfile() {
    try {
      const res  = await fetch('/api/instructor?action=profile', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (res.status === 401) { signOut(); return; }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      renderProfile(data.instructor);
    } catch (err) {
      document.getElementById('profileContent').innerHTML =
        `<p style="color:var(--red);padding:20px">${err.message}</p>`;
    }
  }

  function renderProfile(p) {
    const initials = p.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    const avatarHtml = p.photo_url
      ? `<img src="${esc(p.photo_url)}" alt="${esc(p.name)}" onerror="this.style.display='none';this.parentNode.textContent='${initials}'">`
      : initials;

    document.getElementById('profileContent').innerHTML = `
      <div class="avatar-row">
        <div class="avatar" id="avatarEl">${avatarHtml}</div>
        <div class="avatar-info">
          <div class="avatar-name" id="displayName">${esc(p.name)}</div>
          <div class="avatar-email">${esc(p.email)}</div>
          <p class="avatar-note">Your email is managed by admin and cannot be changed here.</p>
        </div>
      </div>

      <div class="success-banner" id="successBanner">✓ Profile updated successfully</div>

      <div class="form-card">
        <div class="form-card-title">Personal details</div>

        <div class="form-group">
          <label for="inputName">Full name</label>
          <input type="text" id="inputName" value="${esc(p.name)}" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label>Email address</label>
          <div class="email-field">${esc(p.email)}</div>
        </div>

        <div class="form-group">
          <label for="inputPhone">Phone number</label>
          <input type="text" id="inputPhone" value="${esc(p.phone || '')}" placeholder="e.g. 07700 900000">
          <p class="field-hint">Shared with learners for lesson day contact.</p>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title">Public profile</div>

        <div class="form-group">
          <label for="inputBio">Bio</label>
          <textarea id="inputBio" placeholder="Tell learners a bit about yourself — your experience, teaching style, areas covered…">${esc(p.bio || '')}</textarea>
          <p class="field-hint">Shown to learners when choosing an instructor.</p>
        </div>

        <div class="form-group">
          <label>Profile photo</label>
          <input type="file" id="inputPhotoFile" accept="image/jpeg,image/png,image/webp" onchange="handlePhotoUpload(this)" style="display:none">
          <input type="hidden" id="inputPhoto" value="${esc(p.photo_url || '')}">
          <button type="button" onclick="document.getElementById('inputPhotoFile').click()" style="background:var(--accent-lt);color:var(--accent);border:1.5px dashed var(--accent);border-radius:8px;padding:12px;width:100%;font-family:var(--font-body);font-size:0.85rem;font-weight:600;cursor:pointer;transition:background 0.15s;">
            ${p.photo_url ? 'Change photo' : 'Upload a photo'}
          </button>
          <div id="uploadStatus" style="font-size:0.78rem;color:var(--muted);margin-top:6px;display:none"></div>
          <p class="field-hint">JPG, PNG or WebP, max 2MB.</p>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title">Scheduling</div>

        <div class="form-group">
          <label for="inputBuffer">Buffer time between lessons</label>
          <select id="inputBuffer" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--primary);font-family:var(--font-body);font-size:0.9rem;padding:10px 13px;outline:none;">
            <option value="0" ${p.buffer_minutes === 0 ? 'selected' : ''}>No buffer</option>
            <option value="15" ${p.buffer_minutes === 15 ? 'selected' : ''}>15 minutes</option>
            <option value="30" ${p.buffer_minutes === 30 || !p.buffer_minutes ? 'selected' : ''}>30 minutes (default)</option>
            <option value="45" ${p.buffer_minutes === 45 ? 'selected' : ''}>45 minutes</option>
            <option value="60" ${p.buffer_minutes === 60 ? 'selected' : ''}>60 minutes</option>
            <option value="90" ${p.buffer_minutes === 90 ? 'selected' : ''}>90 minutes</option>
            <option value="120" ${p.buffer_minutes === 120 ? 'selected' : ''}>120 minutes</option>
          </select>
          <p class="field-hint">Rest or travel time blocked after each booked lesson. Learners won't be able to book within this window.</p>
        </div>
      </div>

      <button class="btn-save" id="saveBtn" onclick="saveProfile()">Save changes</button>
    `;
  }

  function previewPhoto(url) {
    if (!url) return;
    const avatarEl = document.getElementById('avatarEl');
    if (!avatarEl) return;
    avatarEl.innerHTML = `<img src="${url}" alt="preview" onerror="this.style.display='none'">`;
  }

  async function handlePhotoUpload(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      alert('Image too large — max 2MB'); return;
    }
    const status = document.getElementById('uploadStatus');
    status.style.display = ''; status.textContent = 'Uploading…';

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const res = await fetch('/api/instructor?action=upload-photo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify({ image: e.target.result })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('inputPhoto').value = data.photo_url;
        previewPhoto(data.photo_url);
        status.textContent = '✓ Photo uploaded';
        status.style.color = 'var(--green)';

        // Update local session
        const session = JSON.parse(localStorage.getItem('cc_instructor') || '{}');
        if (session.instructor) {
          session.instructor.photo_url = data.photo_url;
          localStorage.setItem('cc_instructor', JSON.stringify(session));
        }
      } catch (err) {
        status.textContent = 'Upload failed: ' + (err.message || 'Unknown error');
        status.style.color = 'var(--red)';
      }
    };
    reader.readAsDataURL(file);
  }

  async function saveProfile() {
    const name           = document.getElementById('inputName').value.trim();
    const phone          = document.getElementById('inputPhone').value.trim();
    const bio            = document.getElementById('inputBio').value.trim();
    const photo_url      = document.getElementById('inputPhoto').value.trim();
    const buffer_minutes = parseInt(document.getElementById('inputBuffer').value);

    if (!name) {
      alert('Name cannot be empty');
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res  = await fetch('/api/instructor?action=update-profile', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body:    JSON.stringify({ name, phone: phone || null, bio: bio || null, photo_url: photo_url || null, buffer_minutes })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Update displayed name
      const nameEl = document.getElementById('displayName');
      if (nameEl) nameEl.textContent = data.instructor.name;
      document.getElementById('headerName').textContent = data.instructor.name;

      // Update local session name
      const session = JSON.parse(localStorage.getItem('cc_instructor') || '{}');
      if (session.instructor) {
        session.instructor.name      = data.instructor.name;
        session.instructor.photo_url = data.instructor.photo_url;
        localStorage.setItem('cc_instructor', JSON.stringify(session));
      }

      // Show success banner
      const banner = document.getElementById('successBanner');
      if (banner) {
        banner.classList.add('show');
        setTimeout(() => banner.classList.remove('show'), 4000);
      }

    } catch (err) {
      alert(err.message || 'Failed to save profile');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save changes';
    }
  }

  function signOut() {
    localStorage.removeItem('cc_instructor');
    window.location.href = '/instructor/login.html';
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
