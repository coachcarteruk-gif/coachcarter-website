<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachCarter — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1208;
  color: #fff;
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.container {
  max-width: 500px;
}

.logo {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.logo span { color: #f47c20; }

.tagline {
  color: #9a8570;
  margin-bottom: 48px;
  font-size: 1.1rem;
}

.icon {
  font-size: 4rem;
  margin-bottom: 24px;
}

h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.75rem;
  margin-bottom: 16px;
}

p {
  color: #9a8570;
  line-height: 1.6;
  margin-bottom: 32px;
}

.email {
  display: inline-block;
  background: #f47c20;
  color: #1a1208;
  padding: 16px 32px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 700;
  transition: background 0.2s;
}

.email:hover {
  background: #d96710;
}

@media (max-width: 480px) {
  .logo { font-size: 1.5rem; }
  h1 { font-size: 1.25rem; }
}
</style>
</head>
<body>
  <div class="container">
    <div class="logo">Coach<span>Carter</span></div>
    <div class="tagline">Driving School</div>
    
    <div class="icon">🔧</div>
    
    <h1>Site Under Maintenance</h1>
    <p>We're currently making some improvements to serve you better. We'll be back online shortly.</p>
    
    <a href="mailto:fraser@coachcarter.uk" class="email">fraser@coachcarter.uk</a>
  </div>
</body>
</html>
