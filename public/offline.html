<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>Offline — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Lato:wght@400;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Lato:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Lato:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <script src="/shared/dark-mode.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif; background: var(--white); color: var(--primary);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .offline {
      text-align: center; max-width: 400px;
    }
    .offline-icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: #fff4ec; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    .offline h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem; font-weight: 800; margin-bottom: 12px;
    }
    .offline h1 em { font-style: normal; color: #f58321; }
    .offline p {
      color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;
    }
    .offline button {
      background: #f58321; color: #fff; border: none; border-radius: 100px;
      padding: 14px 32px; font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: all 0.18s;
    }
    .offline button:hover { background: #e07518; }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline-icon">📡</div>
    <h1>You're <em>offline</em></h1>
    <p>It looks like you've lost your internet connection. Reconnect and try again — your progress is saved.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
