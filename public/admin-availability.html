<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachCarter — Availability Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #f47c20;
  --orange-dk: #d96710;
  --orange-lt: #fff4ec;
  --black: #1a1208;
  --ink: #2d2010;
  --text: #4a3820;
  --muted: #9a8570;
  --rule: #e8ddd0;
  --bg: #faf8f5;
  --white: #ffffff;
  --green: #1a9e5c;
  --red: #dc2626;
  --font-head: 'Bricolage Grotesque', sans-serif;
  --font-body: 'Lato', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
}

header {
  background: var(--black);
  color: white;
  padding: 24px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.logo span { color: var(--orange); }

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 48px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 24px;
}

.stat-value {
  font-family: var(--font-head);
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--orange);
}

.stat-label {
  font-size: 0.9rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.submissions-list {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 16px;
  overflow: hidden;
}

.submission-row {
  display: grid;
  grid-template-columns: 150px 1fr 200px 120px 100px;
  gap: 16px;
  padding: 20px 24px;
  border-top: 1px solid var(--rule);
  align-items: center;
}

.submission-row:hover {
  background: var(--bg);
}

.ref {
  font-family: var(--font-head);
  font-weight: 700;
  color: var(--black);
}

.customer {
  display: flex;
  flex-direction: column;
}

.customer-email {
  font-weight: 700;
  color: var(--black);
}

.customer-date {
  font-size: 0.85rem;
  color: var(--muted);
}

.slots {
  font-size: 0.9rem;
}

.status {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.status.pending { background: #fef3c7; color: #92400e; }
.status.scheduled { background: #d1fae5; color: #065f46; }
.status.completed { background: #e5e7eb; color: #374151; }

.empty-state {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
}

.loading {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
}

.error {
  background: #fee;
  color: #c53030;
  padding: 16px;
  margin: 24px;
  border-radius: 8px;
}

@media (max-width: 1024px) {
  .submission-row {
    grid-template-columns: 120px 1fr 150px;
  }
  .submission-row > *:nth-child(4),
  .submission-row > *:nth-child(5) {
    display: none;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">Coach<span>Carter</span> <span style="font-size:0.9rem;font-weight:400;color:var(--muted)">Availability Dashboard</span></div>
  <a href="/admin.html" style="color:var(--orange);text-decoration:none;">← Back to Bookings</a>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="total-submissions">0</div>
      <div class="stat-label">Total Submissions</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="pending-count">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="this-week-count">0</div>
      <div class="stat-label">This Week</div>
    </div>
  </div>

  <div class="submissions-list" id="submissions-container">
    <div class="loading">Loading availability submissions...</div>
  </div>
</div>

<script>
async function loadSubmissions() {
  const container = document.getElementById('submissions-container');
  
  try {
    const response = await fetch('/api/get-availability');
    const data = await response.json();
    
    if (!data.submissions) {
      throw new Error('Invalid response');
    }

    updateStats(data.submissions);
    renderSubmissions(data.submissions);
    
  } catch (error) {
    console.error('Error loading submissions:', error);
    container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
  }
}

function updateStats(submissions) {
  document.getElementById('total-submissions').textContent = submissions.length;
  
  const pending = submissions.filter(s => s.status === 'pending').length;
  document.getElementById('pending-count').textContent = pending;

  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
  const thisWeek = submissions.filter(s => new Date(s.submitted_at) > oneWeekAgo).length;
  document.getElementById('this-week-count').textContent = thisWeek;
}

function renderSubmissions(submissions) {
  const container = document.getElementById('submissions-container');
  
  if (submissions.length === 0) {
    container.innerHTML = '<div class="empty-state">No availability submissions yet</div>';
    return;
  }

  container.innerHTML = submissions.map(sub => {
    const preferredCount = sub.preferred_days?.length || 0;
    const availableCount = sub.available_days?.length || 0;
    
    return `
    <div class="submission-row">
      <div class="ref">${sub.booking_reference || 'N/A'}</div>
      <div class="customer">
        <span class="customer-email">${sub.customer_email}</span>
        <span class="customer-date">${new Date(sub.submitted_at).toLocaleString()}</span>
      </div>
      <div class="slots">
        ${preferredCount} preferred, ${availableCount} available
        ${sub.frequency_preference ? `<br><small>${sub.frequency_preference}</small>` : ''}
      </div>
      <div><span class="status ${sub.status}">${sub.status}</span></div>
      <div>
        <button onclick="viewDetails(${sub.id})" style="padding:6px 12px;border:1px solid var(--rule);background:white;border-radius:6px;cursor:pointer;">View</button>
      </div>
    </div>
  `}).join('');
}

function viewDetails(id) {
  // Fetch individual details or show modal
  alert('View details for submission #' + id);
}

// Load on page load
document.addEventListener('DOMContentLoaded', loadSubmissions);

// Auto-refresh every 30 seconds
setInterval(loadSubmissions, 30000);
</script>

</body>
</html>
