<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #262626;
      --accent:     #f58321;
      --accent-dk:  #e07518;
      --accent-lt:  #fff7ed;
      --accent-mid: rgba(245,131,33,0.12);
      --muted:      #64748b;
      --border:     #e2e8f0;
      --bg:         #f8fafc;
      --surface:    #f1f5f9;
      --white:      #ffffff;
      --font-head:  'Space Grotesk', sans-serif;
      --font-body:  'Outfit', sans-serif;
      --radius:     14px;
      --header-h:   60px;
      --bottom-h:   64px;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--primary); min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 0 20px; height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .header-brand img { width: 30px; height: 30px; border-radius: 8px; }
    .header-brand span { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--primary); }
    .header-brand em { font-style: normal; color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-name { font-size: 0.82rem; font-weight: 500; color: var(--muted); }
    .header-logout {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 0.78rem; font-weight: 600; color: var(--muted);
      cursor: pointer; font-family: var(--font-body); transition: all 0.2s;
    }
    .header-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Page ────────────────────────────────────────────────────────────── */
    .page { max-width: 1000px; margin: 0 auto; padding: 24px 16px 80px; margin-top: var(--header-h); }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .page-title { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .mode-toggle {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px; gap: 2px;
    }
    .mode-btn {
      padding: 7px 14px; border-radius: 7px; border: none;
      background: transparent; font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-pills {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
      margin-bottom: 20px; scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; background: transparent; border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--muted); font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 600; padding: 6px 16px;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .cat-pill:hover { background: var(--accent-mid); color: var(--accent-dk); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-pill .count { font-size: 0.68rem; opacity: 0.7; margin-left: 3px; }

    /* Grid */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .video-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .video-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .video-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-thumb-play {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s;
    }
    .video-card:hover .video-thumb-play { opacity: 1; }
    .video-thumb-play-icon {
      width: 44px; height: 44px; border-radius: 50%; background: rgba(245,131,33,0.9);
      color: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .video-card-body { padding: 12px 14px; }
    .video-card-tag {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .video-card-title { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    .video-card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
    .video-duration {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.78); color: #fff;
      font-size: 0.72rem; font-weight: 600;
      padding: 2px 6px; border-radius: 4px; line-height: 1.3;
    }

    /* Player modal */
    .player-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .player-overlay.open { opacity: 1; pointer-events: all; }
    .player-wrap { width: 100%; max-width: 800px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    .player-video { width: 100%; aspect-ratio: 16/9; background: #000; }
    .player-info { background: var(--white); padding: 16px 20px; }
    .player-title { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
    .player-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .player-close {
      position: absolute; top: 12px; right: 12px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: white;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
    }

    /* Reels fullscreen */
    .reels-fullscreen { position: fixed; inset: 0; z-index: 500; background: #000; display: none; }
    .reels-fullscreen.open { display: block; }
    .reels-container {
      position: absolute; inset: 0; overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .reels-container::-webkit-scrollbar { display: none; }
    .reel-item { position: relative; width: 100%; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; background: #000; overflow: hidden; }
    .reel-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .reel-overlay {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 100px 16px 80px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      pointer-events: none;
    }
    .reel-group-tag { display: inline-flex; font-size: 0.68rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
    .reel-title { font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); font-family: var(--font-head); color: #fff; }
    .reel-desc { font-size: 0.85rem; color: rgba(255,255,255,0.8); line-height: 1.4; }
    .mute-btn {
      position: absolute; bottom: 80px; right: 16px; width: 44px; height: 44px; border-radius: 50%;
      background: rgba(15,23,42,0.6); border: 1.5px solid rgba(255,255,255,0.2); color: #fff;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); z-index: 10;
    }
    .muted-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(15,23,42,0.75); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px); border-radius: 12px; padding: 12px 20px;
      font-size: 0.82rem; font-weight: 600; color: #fff; pointer-events: none;
      opacity: 0; transition: opacity 0.3s; z-index: 10;
    }
    .muted-banner.show { opacity: 1; }
    .reels-exit-btn {
      position: fixed; top: 16px; left: 16px; z-index: 600;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 8px; padding: 8px 14px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; display: none;
    }
    .reels-fullscreen.open ~ .reels-exit-btn { display: block; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    @media (min-width: 768px) {
      .reels-container { display: flex; flex-direction: column; align-items: center; }
      .reel-item { width: calc(100dvh * 9/16); max-width: 100%; flex-shrink: 0; }
    }
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .video-card-body { padding: 10px 12px; }
      .video-card-desc { display: none; }
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-h);
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center; z-index: 300;
    }
    .bottom-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; font-size: 0.68rem; font-weight: 600; color: var(--muted); transition: color 0.2s;
    }
    .bottom-nav-item:hover { color: var(--primary); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { font-size: 1.25rem; line-height: 1; }
  </style>
</head>
<body>

<header>
  <a class="header-brand" href="/learner/">
    <img src="/Logo.png" alt="CoachCarter">
    <span>Coach<em>Carter</em></span>
  </a>
  <div class="header-right">
    <span class="header-name" id="user-name"></span>
    <button class="header-logout" onclick="logout()">Sign out</button>
  </div>
</header>

<div class="page" id="gridPage">
  <div class="page-header">
    <div>
      <div class="page-title">Videos</div>
      <div class="page-sub">Lessons and tips to help you on the road</div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnGrid" onclick="setMode('grid')">Grid</button>
      <button class="mode-btn" id="btnReels" onclick="setMode('reels')">Reels</button>
    </div>
  </div>
  <div class="cat-pills" id="catPills"></div>
  <div id="gridContent"><div class="loading"><div class="spinner"></div><p>Loading videos…</p></div></div>
</div>

<!-- Player modal -->
<div class="player-overlay" id="playerOverlay" onclick="if(event.target===this)closePlayer()">
  <div class="player-wrap">
    <button class="player-close" onclick="closePlayer()">✕</button>
    <video class="player-video" id="playerVideo" controls playsinline webkit-playsinline></video>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-desc" id="playerDesc"></div>
    </div>
  </div>
</div>

<!-- Reels -->
<div class="reels-fullscreen" id="reelsFS">
  <div class="reels-container" id="reelsContainer"></div>
</div>
<button class="reels-exit-btn" id="reelsExitBtn" onclick="setMode('grid')">← Back to grid</button>

<nav class="bottom-nav">
  <a href="/learner/" class="bottom-nav-item"><span class="bottom-nav-icon">📊</span><span>Dashboard</span></a>
  <a href="/learner/book.html" class="bottom-nav-item"><span class="bottom-nav-icon">📅</span><span>Book</span></a>
  <a href="/learner/videos.html" class="bottom-nav-item active"><span class="bottom-nav-icon">🎬</span><span>Videos</span></a>
  <a href="/learner/buy-credits.html" class="bottom-nav-item"><span class="bottom-nav-icon">💳</span><span>Lessons</span></a>
  <a href="/learner/log-session.html" class="bottom-nav-item"><span class="bottom-nav-icon">📝</span><span>Log Session</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
// Auth
const session = JSON.parse(localStorage.getItem('cc_learner') || 'null');
if (!session?.token) { window.location.href = '/learner/login.html?redirect=/learner/videos.html'; }
if (session?.user?.name) document.getElementById('user-name').textContent = session.user.name;
function logout() { localStorage.removeItem('cc_learner'); window.location.href = '/learner/login.html'; }

const CF_BASE = 'https://customer-qn21p6ogmlqlhcv4.cloudflarestream.com';
let allVideos = [], categories = [], activeCategory = 'all', currentMode = 'grid', playerHls = null;
let reelsObserver = null, globalMuted = true, hlsInstances = {}, activeUid = null;

window.addEventListener('DOMContentLoaded', async () => {
  try {
    const [catRes, vidRes] = await Promise.all([
      fetch('/api/videos?action=categories'),
      fetch('/api/videos?action=list&learner_only=true')
    ]);
    categories = (await catRes.json()).categories || [];
    allVideos  = (await vidRes.json()).videos || [];
  } catch {
    try {
      const json = await (await fetch('/videos.json')).json();
      allVideos = json.map(v => ({ cloudflare_uid: v.uid, title: v.title, description: v.description, category_slug: v.group, category_label: v.group }));
      categories = [...new Set(json.map(v => v.group))].map((g,i) => ({ slug: g, label: g, sort_order: i, video_count: json.filter(v => v.group === g).length }));
    } catch { allVideos = []; categories = []; }
  }
  buildCatPills(); renderGrid();
});

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('btnReels').classList.toggle('active', mode === 'reels');
  if (mode === 'grid') {
    document.getElementById('gridPage').style.display = 'block';
    document.getElementById('reelsFS').classList.remove('open'); destroyAllHls();
  } else {
    document.getElementById('gridPage').style.display = 'none';
    document.getElementById('reelsFS').classList.add('open'); renderReels();
  }
}

function buildCatPills() {
  let html = `<button class="cat-pill active" onclick="filterCat('all')">All <span class="count">${allVideos.length}</span></button>`;
  categories.forEach(c => { html += `<button class="cat-pill" onclick="filterCat('${c.slug}')">${esc(c.label)} <span class="count">${c.video_count||0}</span></button>`; });
  document.getElementById('catPills').innerHTML = html;
}

function filterCat(slug) {
  activeCategory = slug;
  document.querySelectorAll('.cat-pill').forEach((b,i) => { b.classList.toggle('active', i === 0 ? slug === 'all' : categories[i-1]?.slug === slug); });
  currentMode === 'grid' ? renderGrid() : renderReels();
}

function renderGrid() {
  const f = activeCategory === 'all' ? allVideos : allVideos.filter(v => v.category_slug === activeCategory);
  const c = document.getElementById('gridContent');
  if (!f.length) { c.innerHTML = '<div class="empty-state"><div class="empty-icon">🎬</div><p>No videos in this category yet.</p></div>'; return; }
  c.innerHTML = '<div class="video-grid">' + f.map(v => {
    const thumb = v.thumbnail_url || `${CF_BASE}/${v.cloudflare_uid}/thumbnails/thumbnail.jpg?time=2s&width=480`;
    return `<div class="video-card" onclick="openPlayer('${v.cloudflare_uid}','${esc(v.title)}','${esc(v.description||'')}')">
      <div class="video-thumb"><img src="${thumb}" alt="${esc(v.title)}" loading="lazy" onerror="this.style.display='none'"><div class="video-thumb-play"><div class="video-thumb-play-icon">▶</div></div>${v.duration_seconds ? `<span class="video-duration">${formatDuration(v.duration_seconds)}</span>` : ''}</div>
      <div class="video-card-body"><span class="video-card-tag" style="background:${v.category_color||'rgba(245,131,33,0.2)'};color:rgba(255,255,255,0.95)">${esc(v.category_label||v.category_slug)}</span>
      <div class="video-card-title">${esc(v.title)}</div>${v.description ? `<div class="video-card-desc">${esc(v.description)}</div>` : ''}</div></div>`;
  }).join('') + '</div>';
}

function openPlayer(uid, title, desc) {
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerDesc').textContent = desc;
  const video = document.getElementById('playerVideo');
  const url = `${CF_BASE}/${uid}/manifest/video.m3u8`;
  if (playerHls) { playerHls.destroy(); playerHls = null; }
  if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; video.play().catch(()=>{}); }
  else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    playerHls = new Hls({ enableWorker: true, startLevel: -1 });
    playerHls.loadSource(url); playerHls.attachMedia(video);
    playerHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
  } else { video.src = url; video.play().catch(()=>{}); }
  document.getElementById('playerOverlay').classList.add('open');
}

function closePlayer() {
  const v = document.getElementById('playerVideo'); v.pause(); v.removeAttribute('src'); v.load();
  if (playerHls) { playerHls.destroy(); playerHls = null; }
  document.getElementById('playerOverlay').classList.remove('open');
}

function renderReels() {
  const f = activeCategory === 'all' ? allVideos : allVideos.filter(v => v.category_slug === activeCategory);
  const c = document.getElementById('reelsContainer');
  if (reelsObserver) reelsObserver.disconnect(); destroyAllHls();
  if (!f.length) { c.innerHTML = '<div style="height:100dvh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5)">No videos yet.</div>'; return; }
  c.innerHTML = f.map(v => `<div class="reel-item" id="reel-${v.cloudflare_uid}" data-uid="${v.cloudflare_uid}">
    <video class="reel-video" id="video-${v.cloudflare_uid}" playsinline webkit-playsinline preload="none" loop muted></video>
    <div class="muted-banner" id="banner-${v.cloudflare_uid}">Tap to unmute</div>
    <div class="reel-overlay"><div class="reel-group-tag" style="background:${v.category_color||'rgba(245,131,33,0.25)'};color:rgba(255,255,255,0.95)">${esc(v.category_label||v.category_slug)}</div>
    <div class="reel-title">${esc(v.title)}</div>${v.description?`<div class="reel-desc">${esc(v.description)}</div>`:''}</div>
    <button class="mute-btn" id="mute-btn-${v.cloudflare_uid}" onclick="toggleMute('${v.cloudflare_uid}')">🔇</button></div>`).join('');
  f.forEach(v => { document.getElementById(`reel-${v.cloudflare_uid}`).addEventListener('click', e => { if (!e.target.closest('.mute-btn')) toggleMute(v.cloudflare_uid); }); });
  c.scrollTop = 0; setupObs(f);
}

function attachHls(uid) {
  const v = document.getElementById(`video-${uid}`); if (!v) return;
  const url = `${CF_BASE}/${uid}/manifest/video.m3u8`;
  if (v.canPlayType('application/vnd.apple.mpegurl')) { v.src = url; v.muted = globalMuted; v.play().catch(()=>{}); return; }
  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    const h = new Hls({ enableWorker: true, startLevel: -1 }); h.loadSource(url); h.attachMedia(v);
    h.on(Hls.Events.MANIFEST_PARSED, () => { v.muted = globalMuted; v.play().catch(()=>{}); }); hlsInstances[uid] = h; return;
  }
  v.src = url; v.muted = globalMuted; v.play().catch(()=>{});
}
function detachHls(uid) {
  const v = document.getElementById(`video-${uid}`); if (v) { v.pause(); v.removeAttribute('src'); v.load(); }
  if (hlsInstances[uid]) { hlsInstances[uid].destroy(); delete hlsInstances[uid]; }
}
function destroyAllHls() { Object.keys(hlsInstances).forEach(uid => detachHls(uid)); hlsInstances = {}; activeUid = null; }

function setupObs(videos) {
  reelsObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const uid = e.target.dataset.uid;
      if (e.isIntersecting) { if (activeUid && activeUid !== uid) detachHls(activeUid); activeUid = uid; attachHls(uid); if (globalMuted) showBanner(uid); }
      else if (uid !== activeUid) { detachHls(uid); }
    });
  }, { root: document.getElementById('reelsContainer'), threshold: 0.6 });
  videos.forEach(v => { const el = document.getElementById(`reel-${v.cloudflare_uid}`); if (el) reelsObserver.observe(el); });
}

function toggleMute(uid) {
  globalMuted = !globalMuted;
  const v = document.getElementById(`video-${uid}`);
  if (v) { v.muted = globalMuted; if (!globalMuted && v.paused) v.play().catch(()=>{}); }
  document.querySelectorAll('.mute-btn').forEach(b => b.textContent = globalMuted ? '🔇' : '🔊');
  if (!globalMuted) hideBanner(uid);
}
function showBanner(uid) { const b = document.getElementById(`banner-${uid}`); if (b) { b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 3000); } }
function hideBanner(uid) { const b = document.getElementById(`banner-${uid}`); if (b) b.classList.remove('show'); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function formatDuration(sec) {
  if (!sec && sec !== 0) return '';
  const s = Math.round(sec), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return h > 0 ? h + ':' + String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0') : m + ':' + String(ss).padStart(2,'0');
}
</script>
