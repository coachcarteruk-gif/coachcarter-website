<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #262626;
      --accent:     #f58321;
      --accent-dk:  #e07518;
      --accent-lt:  #fff7ed;
      --accent-mid: rgba(245,131,33,0.12);
      --muted:      #64748b;
      --border:     #e2e8f0;
      --bg:         #f8fafc;
      --surface:    #f1f5f9;
      --white:      #ffffff;
      --font-head:  'Space Grotesk', sans-serif;
      --font-body:  'Outfit', sans-serif;
      --radius:     14px;
      --header-h:   60px;
      --tabs-h:     48px;
      --bottom-h:   64px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      background: #000;
      color: var(--primary);
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-brand img {
      width: 30px; height: 30px;
      border-radius: 8px;
    }
    .header-brand span {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .header-brand em { font-style: normal; color: var(--accent); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
    }
    .header-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.2s;
    }
    .header-logout:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── TAB BAR ── */
    .tab-bar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--tabs-h);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: rgba(248,250,252,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.76rem;
      font-weight: 600;
      padding: 6px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .tab-btn:hover {
      background: var(--accent-mid);
      color: var(--accent-dk);
      border-color: rgba(245,131,33,0.2);
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(245,131,33,0.25);
    }

    /* ── REELS CONTAINER ── */
    .reels-container {
      position: fixed;
      top: calc(var(--header-h) + var(--tabs-h));
      left: 0; right: 0;
      bottom: var(--bottom-h);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: #000;
    }
    .reels-container::-webkit-scrollbar { display: none; }

    /* ── REEL ITEM ── */
    .reel-item {
      position: relative;
      width: 100%;
      height: calc(100dvh - var(--header-h) - var(--tabs-h) - var(--bottom-h));
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }

    .reel-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* ── INFO OVERLAY ── */
    .reel-overlay {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 80px 16px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
      pointer-events: none;
    }
    .reel-group-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: var(--font-body);
    }
    .reel-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      font-family: var(--font-head);
      color: #fff;
    }
    .reel-desc {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      font-family: var(--font-body);
    }

    /* ── MUTE BUTTON ── */
    .mute-btn {
      position: absolute;
      bottom: 20px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(15,23,42,0.6);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s;
      z-index: 10;
    }
    .mute-btn:hover {
      background: rgba(15,23,42,0.8);
      border-color: rgba(245,131,33,0.5);
      transform: scale(1.08);
    }

    .muted-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15,23,42,0.75);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      white-space: nowrap;
      font-family: var(--font-body);
    }
    .muted-banner.show { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-reels {
      height: calc(100dvh - var(--header-h) - var(--tabs-h) - var(--bottom-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 40px;
      text-align: center;
      background: var(--bg);
    }
    .empty-reels .emoji { font-size: 2.5rem; }
    .empty-reels p { font-size: 0.9rem; line-height: 1.5; }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      transition: opacity 0.3s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(245,131,33,0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GROUP TAG COLOURS ── */
    .tag-roundabouts    { background: rgba(245,131,33,0.25); color: rgba(255,255,255,0.95); }
    .tag-manoeuvres     { background: rgba(99,179,237,0.25); color: rgba(255,255,255,0.95); }
    .tag-lesson-vibes   { background: rgba(154,117,245,0.25); color: rgba(255,255,255,0.95); }
    .tag-course         { background: rgba(52,211,153,0.25); color: rgba(255,255,255,0.95); }

    /* ── DESKTOP: 9:16 ratio ── */
    @media (min-width: 768px) {
      .reels-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .reel-item {
        width: calc((100dvh - var(--header-h) - var(--tabs-h) - var(--bottom-h)) * 9 / 16);
        max-width: 100%;
        flex-shrink: 0;
      }
      .empty-reels {
        width: calc((100dvh - var(--header-h) - var(--tabs-h) - var(--bottom-h)) * 9 / 16);
        max-width: 100%;
      }
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bottom-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 300;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s;
    }
    .bottom-nav-item:hover { color: var(--primary); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { font-size: 1.25rem; line-height: 1; }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<!-- Header -->
<header>
  <a class="header-brand" href="/learner/">
    <img src="/Logo.png" alt="CoachCarter">
    <span>Coach<em>Carter</em></span>
  </a>
  <div class="header-right">
    <span class="header-name" id="user-name"></span>
    <button class="header-logout" onclick="logout()">Sign out</button>
  </div>
</header>

<!-- Tab bar for video groups -->
<div class="tab-bar" id="tab-bar"></div>

<!-- Reels -->
<div class="reels-container" id="reels"></div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="/learner/" class="bottom-nav-item">
    <span class="bottom-nav-icon">📊</span>
    <span>Dashboard</span>
  </a>
  <a href="/learner/book.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">📅</span>
    <span>Book</span>
  </a>
  <a href="/learner/videos.html" class="bottom-nav-item active">
    <span class="bottom-nav-icon">🎬</span>
    <span>Videos</span>
  </a>
  <a href="/learner/buy-credits.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">💳</span>
    <span>Lessons</span>
  </a>
  <a href="/learner/log-session.html" class="bottom-nav-item">
    <span class="bottom-nav-icon">📝</span>
    <span>Log Session</span>
  </a>
</nav>

<!-- HLS.js for adaptive streaming on non-Safari browsers -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

<script>
// ── Auth gate ──
const session = JSON.parse(localStorage.getItem('cc_learner') || 'null');
if (!session?.token) { window.location.href = '/learner/login.html?redirect=/learner/videos.html'; }

const userNameEl = document.getElementById('user-name');
if (session?.user?.name) userNameEl.textContent = session.user.name;

function logout() {
  localStorage.removeItem('cc_learner');
  localStorage.removeItem('cc_welcome');
  window.location.href = '/learner/login.html';
}

// ── Video player ──
const CF_BASE = 'https://customer-qn21p6ogmlqlhcv4.cloudflarestream.com';

const GROUPS = [
  { key: 'all',          label: 'All' },
  { key: 'roundabouts',  label: 'Roundabouts' },
  { key: 'manoeuvres',   label: 'Manoeuvres' },
  { key: 'lesson-vibes', label: 'Lesson Vibes' },
  { key: 'course',       label: 'Learn to Drive Course' }
];

const GROUP_LABELS = {
  'roundabouts':  'Roundabouts',
  'manoeuvres':   'Manoeuvres',
  'lesson-vibes': 'Lesson Vibes',
  'course':       'Learn to Drive Course'
};

let allVideos   = [];
let activeGroup = 'all';
let observer    = null;
let globalMuted = true;
let hlsInstances = {};
let activeUid    = null;

window.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/videos.json');
    allVideos = await res.json();
  } catch (e) {
    allVideos = [];
  }
  buildTabs();
  renderReels('all');
  document.getElementById('loading').classList.add('hidden');
});

function buildTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = GROUPS.map(g => `
    <button class="tab-btn${g.key === 'all' ? ' active' : ''}"
            onclick="selectTab('${g.key}')">
      ${g.label}
    </button>`).join('');
}

function selectTab(key) {
  activeGroup = key;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', GROUPS[i].key === key);
  });
  if (observer) observer.disconnect();
  destroyAllHls();
  renderReels(key);
}

function renderReels(group) {
  const container = document.getElementById('reels');
  const videos = group === 'all'
    ? allVideos
    : allVideos.filter(v => v.group === group);

  if (videos.length === 0) {
    container.innerHTML = `
      <div class="empty-reels">
        <div class="emoji">🎬</div>
        <p>No videos in this section yet.<br>Check back soon!</p>
      </div>`;
    return;
  }

  container.innerHTML = videos.map(v => `
    <div class="reel-item" id="reel-${v.uid}" data-uid="${v.uid}">
      <video
        class="reel-video"
        id="video-${v.uid}"
        playsinline
        webkit-playsinline
        preload="none"
        loop
        muted
      ></video>
      <div class="muted-banner" id="banner-${v.uid}">Tap to unmute</div>
      <div class="reel-overlay">
        <div class="reel-group-tag tag-${v.group}">${GROUP_LABELS[v.group] || v.group}</div>
        <div class="reel-title">${v.title}</div>
        ${v.description ? `<div class="reel-desc">${v.description}</div>` : ''}
      </div>
      <button class="mute-btn" id="mute-btn-${v.uid}"
              onclick="toggleMute('${v.uid}')" title="Toggle mute">🔇</button>
    </div>`).join('');

  videos.forEach(v => {
    document.getElementById(`reel-${v.uid}`)
      .addEventListener('click', e => {
        if (!e.target.closest('.mute-btn')) toggleMute(v.uid);
      });
  });

  container.scrollTop = 0;
  setupObserver(videos);
}

function attachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (!video) return;
  const hlsUrl = `${CF_BASE}/${uid}/manifest/video.m3u8`;

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl;
    video.muted = globalMuted;
    video.play().catch(() => {});
    return;
  }

  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true, startLevel: -1 });
    hls.loadSource(hlsUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.muted = globalMuted;
      video.play().catch(() => {});
    });
    hlsInstances[uid] = hls;
    return;
  }

  video.src = hlsUrl;
  video.muted = globalMuted;
  video.play().catch(() => {});
}

function detachHls(uid) {
  const video = document.getElementById(`video-${uid}`);
  if (video) {
    video.pause();
    video.removeAttribute('src');
    video.load();
  }
  if (hlsInstances[uid]) {
    hlsInstances[uid].destroy();
    delete hlsInstances[uid];
  }
}

function destroyAllHls() {
  Object.keys(hlsInstances).forEach(uid => detachHls(uid));
  hlsInstances = {};
  activeUid = null;
}

function setupObserver(videos) {
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const uid = entry.target.dataset.uid;
      if (entry.isIntersecting) {
        if (activeUid && activeUid !== uid) detachHls(activeUid);
        activeUid = uid;
        attachHls(uid);
        setMuteBtn(uid, globalMuted);
        if (globalMuted) showMutedBanner(uid);
      } else if (uid !== activeUid) {
        detachHls(uid);
        hideMutedBanner(uid);
      }
    });
  }, {
    root: document.getElementById('reels'),
    threshold: 0.6
  });

  videos.forEach(v => {
    const el = document.getElementById(`reel-${v.uid}`);
    if (el) observer.observe(el);
  });
}

function toggleMute(uid) {
  globalMuted = !globalMuted;
  const video = document.getElementById(`video-${uid}`);
  if (video) {
    video.muted = globalMuted;
    if (!globalMuted && video.paused) video.play().catch(() => {});
  }
  document.querySelectorAll('.mute-btn').forEach(btn => {
    btn.textContent = globalMuted ? '🔇' : '🔊';
  });
  if (!globalMuted) hideMutedBanner(uid);
}

function setMuteBtn(uid, muted) {
  const btn = document.getElementById(`mute-btn-${uid}`);
  if (btn) btn.textContent = muted ? '🔇' : '🔊';
}

function showMutedBanner(uid) {
  const banner = document.getElementById(`banner-${uid}`);
  if (!banner) return;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3000);
}

function hideMutedBanner(uid) {
  const el = document.getElementById(`banner-${uid}`);
  if (el) el.classList.remove('show');
}
</script>
</body>
</html>
