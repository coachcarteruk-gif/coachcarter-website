  <style>
    :root {
      --header-h:   64px;
      --bottom-h:   64px;
    }
    .site-nav { z-index: 300; height: var(--header-h); }

    /* â”€â”€ Page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .page { max-width: 1000px; margin: 0 auto; padding: 24px 16px 80px; margin-top: var(--header-h); }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .page-title { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .mode-toggle {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px; gap: 2px;
    }
    .mode-btn {
      padding: 7px 14px; border-radius: 7px; border: none;
      background: transparent; font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-pills {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
      margin-bottom: 20px; scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; background: transparent; border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--muted); font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 600; padding: 6px 16px;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .cat-pill:hover { background: var(--accent-mid); color: var(--accent-dk); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-pill .count { font-size: 0.68rem; opacity: 0.7; margin-left: 3px; }

    /* Grid */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .video-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .video-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .video-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-thumb-play {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s;
    }
    .video-card:hover .video-thumb-play { opacity: 1; }
    .video-thumb-play-icon {
      width: 44px; height: 44px; border-radius: 50%; background: rgba(245,131,33,0.9);
      color: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .video-card-body { padding: 12px 14px; }
    .video-card-tag {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .video-card-title { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    .video-card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
    .video-duration {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.78); color: #fff;
      font-size: 0.72rem; font-weight: 600;
      padding: 2px 6px; border-radius: 4px; line-height: 1.3;
    }

    /* Player modal */
    .player-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .player-overlay.open { opacity: 1; pointer-events: all; }
    .player-wrap { width: 100%; max-width: 800px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    .player-video { width: 100%; aspect-ratio: 16/9; background: #000; }
    .player-info { background: var(--white); padding: 16px 20px; }
    .player-title { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
    .player-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .player-close {
      position: absolute; top: 12px; right: 12px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: white;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
    }

    /* Reels fullscreen */
    .reels-fullscreen { position: fixed; inset: 0; z-index: 500; background: #000; display: none; }
    .reels-fullscreen.open { display: block; }
    .reels-container {
      position: absolute; inset: 0; overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .reels-container::-webkit-scrollbar { display: none; }
    .reel-item { position: relative; width: 100%; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; background: #000; overflow: hidden; }
    .reel-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .reel-overlay {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 100px 16px 80px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      pointer-events: none;
    }
    .reel-group-tag { display: inline-flex; font-size: 0.68rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
    .reel-title { font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); font-family: var(--font-head); color: #fff; }
    .reel-desc { font-size: 0.85rem; color: rgba(255,255,255,0.8); line-height: 1.4; }
    .mute-btn {
      position: absolute; bottom: 80px; right: 16px; width: 44px; height: 44px; border-radius: 50%;
      background: rgba(15,23,42,0.6); border: 1.5px solid rgba(255,255,255,0.2); color: #fff;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); z-index: 10;
    }
    .muted-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(15,23,42,0.75); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px); border-radius: 12px; padding: 12px 20px;
      font-size: 0.82rem; font-weight: 600; color: #fff; pointer-events: none;
      opacity: 0; transition: opacity 0.3s; z-index: 10;
    }
    .muted-banner.show { opacity: 1; }
    .reels-exit-btn {
      position: fixed; top: 16px; left: 16px; z-index: 600;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 8px; padding: 8px 14px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; display: none;
    }
    .reels-fullscreen.open ~ .reels-exit-btn { display: block; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    @media (min-width: 768px) {
      .reels-container { display: flex; flex-direction: column; align-items: center; }
      .reel-item { width: calc(100dvh * 9/16); max-width: 100%; flex-shrink: 0; }
    }
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .video-card-body { padding: 10px 12px; }
      .video-card-desc { display: none; }
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 24px rgba(245,131,33,0.04);
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 8px 6px; text-decoration: none; color: var(--muted);
      font-size: 0.68rem; font-weight: 600; transition: color 0.2s, transform 0.2s; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item:hover { color: var(--primary); }
    .bottom-nav-item:active { transform: scale(0.92); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .bottom-nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  </style>
