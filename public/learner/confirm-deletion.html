<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="/cookie-consent.js"></script>
  <script src="/posthog-loader.js"></script>
  <title>Confirm Deletion — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared-auth.css">
  <script src="/shared/dark-mode.js"></script>
  <style>
    .deletion-card { background: var(--white); border-radius: 16px; padding: 32px 24px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .deletion-card h2 { font-family: 'Bricolage Grotesque', sans-serif; margin-bottom: 12px; }
    .deletion-card p { color: var(--muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    .deletion-card .status { padding: 16px; border-radius: 10px; font-weight: 600; }
    .status-processing { background: #fff4ec; color: #e07518; }
    .status-success { background: var(--green-lt); color: #22c55e; }
    .status-error { background: var(--red-lt); color: #ef4444; }
    .home-link { display: inline-block; margin-top: 20px; color: #f58321; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<div class="deletion-card">
  <h2>Account Deletion</h2>
  <p id="msg">Processing your request...</p>
  <div id="status" class="status status-processing">Please wait...</div>
  <a href="/" class="home-link" id="home-link" style="display:none">Return to CoachCarter</a>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var msgEl = document.getElementById('msg');
  var statusEl = document.getElementById('status');
  var homeLink = document.getElementById('home-link');

  if (!token) {
    msgEl.textContent = 'No deletion token found.';
    statusEl.textContent = 'Invalid link';
    statusEl.className = 'status status-error';
    homeLink.style.display = 'inline-block';
    return;
  }

  fetch('/api/learner?action=confirm-deletion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(result) {
    if (result.ok && result.data.ok) {
      msgEl.textContent = 'Your account and all personal data have been permanently deleted.';
      statusEl.textContent = 'Account deleted successfully';
      statusEl.className = 'status status-success';
      // Clear auth tokens
      try {
        localStorage.removeItem('cc_learner');
        localStorage.removeItem('cc_cookie_consent');
        localStorage.removeItem('cc_consent_visitor');
      } catch(e) {}
    } else {
      msgEl.textContent = result.data.error || 'Something went wrong.';
      statusEl.textContent = 'Deletion failed';
      statusEl.className = 'status status-error';
    }
    homeLink.style.display = 'inline-block';
  })
  .catch(function() {
    msgEl.textContent = 'Network error. Please try again.';
    statusEl.textContent = 'Connection failed';
    statusEl.className = 'status status-error';
    homeLink.style.display = 'inline-block';
  });
})();
</script>

</body>
</html>
