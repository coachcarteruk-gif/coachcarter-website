<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log a Session — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #13161f;
      --surface2: #191c27;
      --border: #1e2230;
      --text: #e8eaf2;
      --muted: #6b7280;
      --blue: #4f6ef7;
      --green: #22c55e;
      --lime: #86efac;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .page-title { font-size: 0.95rem; font-weight: 700; }

    main { max-width: 600px; margin: 0 auto; padding: 28px 16px 80px; }

    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }
    .form-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    input[type="date"],
    input[type="number"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 72px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .type-btn.selected-instructor { background: rgba(79,110,247,0.12); border-color: var(--blue); color: var(--blue); font-weight: 600; }
    .type-btn.selected-private { background: rgba(139,92,246,0.12); border-color: #8b5cf6; color: #a78bfa; font-weight: 600; }

    /* QUESTION GROUPS */
    .q-group-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 4px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .question-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .question-item:last-child { border-bottom: none; padding-bottom: 4px; }

    .question-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .question-text {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .rating-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .rating-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 9px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.2;
    }
    .rating-btn:hover { border-color: var(--muted); color: var(--text); }

    .rating-btn.sel-never    { background: rgba(239,68,68,0.15);  border-color: var(--red);   color: #fca5a5; font-weight: 700; }
    .rating-btn.sel-sometimes{ background: rgba(245,158,11,0.15); border-color: var(--amber); color: #fcd34d; font-weight: 700; }
    .rating-btn.sel-usually  { background: rgba(134,239,172,0.15);border-color: var(--lime);  color: var(--lime); font-weight: 700; }
    .rating-btn.sel-always   { background: rgba(34,197,94,0.15);  border-color: var(--green); color: #86efac; font-weight: 700; }

    .save-btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }
    .save-btn:hover { background: #3b5ce6; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="/learner/dashboard.html" class="back-btn">← Dashboard</a>
  <span class="page-title">Log a Session</span>
  <div style="width:80px"></div>
</header>

<main>
  <div class="error-msg" id="error-msg"></div>

  <!-- SESSION DETAILS -->
  <div class="form-section">
    <div class="form-section-title">Session Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="session-date">
      </div>
      <div class="form-group">
        <label>Duration (minutes)</label>
        <input type="number" id="duration" placeholder="e.g. 90" min="1" max="360">
      </div>
    </div>
    <div class="form-group">
      <label>Session Type</label>
      <div class="type-toggle">
        <button class="type-btn selected-instructor" id="btn-instructor" onclick="setType('instructor')">🧑‍🏫 With Instructor</button>
        <button class="type-btn" id="btn-private" onclick="setType('private')">🚗 Private Practice</button>
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="notes" placeholder="How did it go? Anything to remember for next time…"></textarea>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div class="form-section">
    <div class="form-section-title">How did this session go?</div>

    <div class="q-group-title">Speed &amp; Control</div>
    <div id="q-speed-control"></div>

    <div class="q-group-title" style="margin-top:16px;">Looking Around</div>
    <div id="q-looking-around"></div>

    <div class="q-group-title" style="margin-top:16px;">Junctions &amp; Roundabouts</div>
    <div id="q-junctions"></div>

    <div class="q-group-title" style="margin-top:16px;">Reversing</div>
    <div id="q-reversing"></div>
  </div>

  <button class="save-btn" id="save-btn" onclick="saveSession()">Save Session →</button>
</main>

<script>
const QUESTIONS = [
  { key: 'q1_speed_react',    group: 'speed-control',   num: 1,  text: 'I drove at a safe speed and had enough time to react' },
  { key: 'q2_speed_lane',     group: 'speed-control',   num: 2,  text: 'I slowed down in time to choose the right lane before roundabouts and junctions' },
  { key: 'q3_mirrors_routine',group: 'speed-control',   num: 3,  text: 'I checked my mirrors every time before moving, stopping, slowing down or turning' },
  { key: 'q4_mirrors_unexp',  group: 'looking-around',  num: 4,  text: 'When something unexpected came up, I still checked my mirrors first' },
  { key: 'q5_awareness',      group: 'looking-around',  num: 5,  text: 'I always knew what was going on around me — not just what was straight ahead' },
  { key: 'q6_mice_order',     group: 'junctions',       num: 6,  text: 'I checked mirrors, signalled, got in position and adjusted my speed — in the right order' },
  { key: 'q7_lane_choice',    group: 'junctions',       num: 7,  text: 'I got in the right lane before roundabouts and junctions' },
  { key: 'q8_safe_to_go',     group: 'junctions',       num: 8,  text: 'I decided early enough whether it was safe to go — so I didn\'t feel rushed' },
  { key: 'q9_roundabout_space',group:'junctions',        num: 9,  text: 'I kept enough space and stayed in my lane all the way around roundabouts' },
  { key: 'q10_reversing',     group: 'reversing',       num: 10, text: 'I reversed slowly, accurately and kept looking all around me' }
];

const RATINGS = [
  { value: 'never',     label: 'Never' },
  { value: 'sometimes', label: 'Sometimes' },
  { value: 'usually',   label: 'Usually' },
  { value: 'always',    label: 'Always' }
];

let AUTH, currentType = 'instructor';
const ratings = {};

window.addEventListener('DOMContentLoaded', () => {
  AUTH = JSON.parse(localStorage.getItem('cc_learner') || 'null');
  if (!AUTH?.token) { window.location.href = '/learner/'; return; }

  document.getElementById('session-date').value = new Date().toISOString().split('T')[0];

  // Render questions into their groups
  const groups = { 'speed-control': [], 'looking-around': [], 'junctions': [], 'reversing': [] };
  QUESTIONS.forEach(q => groups[q.group].push(q));

  Object.entries(groups).forEach(([groupKey, qs]) => {
    const container = document.getElementById(`q-${groupKey}`);
    if (!container) return;
    container.innerHTML = qs.map(q => `
      <div class="question-item">
        <div class="question-num">Q${q.num}</div>
        <div class="question-text">${q.text}</div>
        <div class="rating-group" id="group-${q.key}">
          ${RATINGS.map(r => `
            <button class="rating-btn" onclick="setRating('${q.key}', '${r.value}', this)">
              ${r.label}
            </button>`).join('')}
        </div>
      </div>`).join('');
  });
});

function setType(type) {
  currentType = type;
  document.getElementById('btn-instructor').className = type === 'instructor' ? 'type-btn selected-instructor' : 'type-btn';
  document.getElementById('btn-private').className   = type === 'private'    ? 'type-btn selected-private'    : 'type-btn';
}

function setRating(key, value, btn) {
  ratings[key] = value;
  const group = document.getElementById(`group-${key}`);
  group.querySelectorAll('.rating-btn').forEach(b => b.className = 'rating-btn');
  btn.classList.add(`sel-${value}`);
}

async function saveSession() {
  const date = document.getElementById('session-date').value;
  if (!date) { showError('Please enter a session date.'); return; }

  const ratingsList = Object.entries(ratings).map(([skill_key, rating]) => ({
    tier: 0, skill_key, rating
  }));

  const payload = {
    session_date: date,
    duration_minutes: parseInt(document.getElementById('duration').value) || null,
    session_type: currentType,
    notes: document.getElementById('notes').value.trim() || null,
    ratings: ratingsList
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/learner?action=sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH.token}` },
      body: JSON.stringify(payload)
    });
    if (res.status === 401) { window.location.href = '/learner/'; return; }
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Failed to save. Please try again.'); return; }
    window.location.href = '/learner/dashboard.html';
  } catch {
    showError('Network error. Please check your connection and try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Session →';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
