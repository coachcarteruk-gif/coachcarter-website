<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>

  <title>Q&A — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" data-swap-media>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/learner.css">
  <script src="/shared/dark-mode.js"></script>
  <script src="/shared/font-swap.js"></script>
  <style>
    /* ── MAIN ── */
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 100px; margin-top: 64px; }

    /* ── HEADER ROW ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .btn-ask {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none; border-radius: 100px;
      padding: 10px 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      font-family: var(--font-body); transition: all 0.18s;
    }
    .btn-ask:hover { background: var(--accent-dk); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,131,33,0.35); }

    /* ── FILTER TABS ── */
    .filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .filter-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .filter-tab:hover { color: var(--primary); }
    .filter-tab.active { color: var(--accent); }
    .filter-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 1px;
    }

    /* ── QUESTION CARDS ── */
    .q-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.18s;
    }
    .q-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(245,131,33,0.08); }
    .q-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .q-card-title { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
    .q-card-status {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-open { background: var(--accent-lt); color: var(--accent); }
    .status-answered { background: var(--green-lt); color: var(--green); }
    .status-closed { background: var(--surface); color: var(--muted); }
    .q-card-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); max-width: 320px; margin: 0 auto 20px; }

    /* ── ASK FORM OVERLAY ── */
    .ask-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
    }
    .ask-overlay.show { display: flex; align-items: flex-end; justify-content: center; }
    .ask-panel {
      background: var(--white); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 600px; padding: 28px 24px 32px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .ask-panel h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
    .ask-field { margin-bottom: 16px; }
    .ask-field label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
    .ask-field input, .ask-field textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--primary);
      transition: border-color 0.2s;
    }
    .ask-field input:focus, .ask-field textarea:focus { border-color: var(--accent); outline: none; }
    .ask-field textarea { resize: vertical; min-height: 80px; }
    .ask-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--white); color: var(--muted); font-weight: 600; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; transition: all 0.18s;
    }
    .btn-cancel:hover { border-color: var(--primary); color: var(--primary); }
    .btn-submit-q {
      padding: 10px 24px; border-radius: 100px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; transition: all 0.18s;
    }
    .btn-submit-q:hover { background: var(--accent-dk); }
    .btn-submit-q:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── DETAIL VIEW ── */
    .detail-view { display: none; }
    .detail-view.show { display: block; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.83rem; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 0;
      margin-bottom: 16px; font-family: var(--font-body);
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-title { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .detail-body { font-size: 0.9rem; line-height: 1.6; color: var(--primary); margin-bottom: 24px; white-space: pre-wrap; }
    .answers-title { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
    .answer-card {
      padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .answer-card.instructor {
      background: var(--accent-lt); border-color: rgba(245,131,33,0.2);
      border-left: 3px solid var(--accent);
    }
    .answer-author { font-size: 0.78rem; font-weight: 700; margin-bottom: 4px; }
    .answer-author .badge {
      display: inline-block; padding: 1px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-left: 6px;
    }
    .badge-instructor { background: var(--accent); color: #fff; }
    .badge-learner { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .answer-body { font-size: 0.88rem; line-height: 1.5; color: var(--primary); white-space: pre-wrap; }
    .answer-time { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .reply-box { margin-top: 20px; }
    .reply-box textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem; color: var(--primary);
      resize: vertical; min-height: 70px; margin-bottom: 10px;
    }
    .reply-box textarea:focus { border-color: var(--accent); outline: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(120px);
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 400; max-width: calc(100vw - 32px); word-wrap: break-word; text-align: center;
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 24px rgba(245,131,33,0.04);
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 8px 6px; text-decoration: none; color: var(--muted);
      font-size: 0.68rem; font-weight: 600; transition: color 0.2s, transform 0.2s; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item:hover { color: var(--primary); }
    .bottom-nav-item:active { transform: scale(0.92); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .bottom-nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.35s ease; }
  </style>
<script src="/sidebar.js"></script>
<script src="/shared/learner-auth.js"></script>
<script src="/auth-gate.js"></script>
</head>
<body>

<nav class="site-nav">
  <a class="site-nav-logo" href="/learner/">
    <img src="/Logo.png" alt="CoachCarter">
    <span>Coach<em>Carter</em></span>
  </a>
  <div class="site-nav-links">
    <span class="site-nav-link site-nav-name" id="header-name"></span>
    <button class="site-nav-link logout" id="btn-signout-nav">Sign out</button>
  </div>
</nav>

<main>
  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <h1>Questions & Answers</h1>
      <button class="btn-ask" data-action="open-ask-form">+ Ask a Question</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="open">Open</button>
      <button class="filter-tab" data-filter="answered">Answered</button>
      <button class="filter-tab" data-filter="closed">Closed</button>
    </div>

    <div id="questions-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="detail-view" id="detail-view">
    <button class="detail-back" id="btn-detail-back">&#8249; Back to questions</button>
    <div id="detail-content"></div>
  </div>
</main>

<!-- ASK FORM OVERLAY -->
<div class="ask-overlay" id="ask-overlay">
  <div class="ask-panel">
    <h2>Ask a Question</h2>
    <div class="ask-field">
      <label for="ask-title">Your question</label>
      <input type="text" id="ask-title" placeholder="e.g. How do I approach mini roundabouts?" maxlength="200">
    </div>
    <div class="ask-field">
      <label for="ask-body">More details (optional)</label>
      <textarea id="ask-body" placeholder="Add any extra context that might help your instructor answer..."></textarea>
    </div>
    <div class="ask-actions">
      <button class="btn-cancel" id="btn-ask-cancel">Cancel</button>
      <button class="btn-submit-q" id="btn-submit-q">Submit Question</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
