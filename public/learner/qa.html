  <title>Q&A — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/learner.css">
  <style>
    /* ── MAIN ── */
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 100px; margin-top: 64px; }

    /* ── HEADER ROW ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .btn-ask {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none; border-radius: 100px;
      padding: 10px 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      font-family: var(--font-body); transition: all 0.18s;
    }
    .btn-ask:hover { background: var(--accent-dk); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,131,33,0.35); }

    /* ── FILTER TABS ── */
    .filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .filter-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .filter-tab:hover { color: var(--primary); }
    .filter-tab.active { color: var(--accent); }
    .filter-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 1px;
    }

    /* ── QUESTION CARDS ── */
    .q-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.18s;
    }
    .q-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(245,131,33,0.08); }
    .q-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .q-card-title { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
    .q-card-status {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-open { background: var(--accent-lt); color: var(--accent); }
    .status-answered { background: var(--green-lt); color: var(--green); }
    .status-closed { background: var(--surface); color: var(--muted); }
    .q-card-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); max-width: 320px; margin: 0 auto 20px; }

    /* ── ASK FORM OVERLAY ── */
    .ask-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
    }
    .ask-overlay.show { display: flex; align-items: flex-end; justify-content: center; }
    .ask-panel {
      background: var(--white); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 600px; padding: 28px 24px 32px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .ask-panel h2 { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
    .ask-field { margin-bottom: 16px; }
    .ask-field label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
    .ask-field input, .ask-field textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--primary);
      transition: border-color 0.2s;
    }
    .ask-field input:focus, .ask-field textarea:focus { border-color: var(--accent); outline: none; }
    .ask-field textarea { resize: vertical; min-height: 80px; }
    .ask-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--white); color: var(--muted); font-weight: 600; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; transition: all 0.18s;
    }
    .btn-cancel:hover { border-color: var(--primary); color: var(--primary); }
    .btn-submit-q {
      padding: 10px 24px; border-radius: 100px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; transition: all 0.18s;
    }
    .btn-submit-q:hover { background: var(--accent-dk); }
    .btn-submit-q:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── DETAIL VIEW ── */
    .detail-view { display: none; }
    .detail-view.show { display: block; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.83rem; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 0;
      margin-bottom: 16px; font-family: var(--font-body);
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-title { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .detail-body { font-size: 0.9rem; line-height: 1.6; color: var(--primary); margin-bottom: 24px; white-space: pre-wrap; }
    .answers-title { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
    .answer-card {
      padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .answer-card.instructor {
      background: var(--accent-lt); border-color: rgba(245,131,33,0.2);
      border-left: 3px solid var(--accent);
    }
    .answer-author { font-size: 0.78rem; font-weight: 700; margin-bottom: 4px; }
    .answer-author .badge {
      display: inline-block; padding: 1px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-left: 6px;
    }
    .badge-instructor { background: var(--accent); color: #fff; }
    .badge-learner { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .answer-body { font-size: 0.88rem; line-height: 1.5; color: var(--primary); white-space: pre-wrap; }
    .answer-time { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .reply-box { margin-top: 20px; }
    .reply-box textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem; color: var(--primary);
      resize: vertical; min-height: 70px; margin-bottom: 10px;
    }
    .reply-box textarea:focus { border-color: var(--accent); outline: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 400; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 24px rgba(245,131,33,0.04);
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 8px 6px; text-decoration: none; color: var(--muted);
      font-size: 0.68rem; font-weight: 600; transition: color 0.2s, transform 0.2s; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item:hover { color: var(--primary); }
    .bottom-nav-item:active { transform: scale(0.92); }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .bottom-nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.35s ease; }
  </style>

<main>

  <div id="list-view">

      <h1>Questions & Answers</h1>
      <button class="btn-ask" onclick="openAskForm()">+ Ask a Question</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterQuestions('all', this)">All</button>
      <button class="filter-tab" onclick="filterQuestions('open', this)">Open</button>
      <button class="filter-tab" onclick="filterQuestions('answered', this)">Answered</button>

<script>
let AUTH;
let allQuestions = [];
let currentFilter = 'all';
let askSessionId = null;
let askBookingId = null;

// ── Auth (optional — browsing is allowed without login) ──
window.addEventListener('DOMContentLoaded', () => {
  AUTH = ccAuth.getAuth();
  if (AUTH?.user?.name) document.getElementById('header-name').textContent = AUTH.user.name;

  // Check URL params
  const params = new URLSearchParams(window.location.search);
  askSessionId = params.get('session_id');
  askBookingId = params.get('booking_id');
  if (params.get('ask') === '1') {
    setTimeout(() => openAskForm(), 300);
  }

  loadQuestions();
});

function logout() { ccAuth.logout(); }

// ── Load questions ──
async function loadQuestions() {
  try {
    const res = await fetch('/api/learner?action=qa-list', {
      headers: { Authorization: 'Bearer ' + AUTH.token }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    allQuestions = data.questions || [];
    renderQuestions();
  } catch (err) {
    document.getElementById('questions-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:24px">Failed to load questions.</div>';
  }
}

function filterQuestions(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderQuestions();
}

function renderQuestions() {
  const container = document.getElementById('questions-list');
  let filtered = allQuestions;
  if (currentFilter !== 'all') {
    filtered = allQuestions.filter(q => q.status === currentFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state fade-in">
        <div class="empty-state-icon">&#x1F4AC;</div>
        <h2>${currentFilter === 'all' ? 'No questions yet' : 'No ' + currentFilter + ' questions'}</h2>
        <p>${currentFilter === 'all' ? 'Be the first to ask! Your instructor will answer here.' : 'Check the other tabs or ask a new question.'}</p>
        ${currentFilter === 'all' ? '<button class="btn-ask" onclick="openAskForm()">+ Ask a Question</button>' : ''}
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(q => `
    <div class="q-card fade-in" onclick="openQuestion(${q.id})">
      <div class="q-card-top">
        <div class="q-card-title">${esc(q.title)}</div>
        <span class="q-card-status status-${q.status}">${q.status}</span>
      </div>
      <div class="q-card-meta">
        <span>Asked by ${esc(q.learner_name || 'Learner')}</span>
        <span>${timeAgo(q.created_at)}</span>
        <span>${q.answer_count} ${q.answer_count === 1 ? 'reply' : 'replies'}</span>
      </div>
    </div>
  `).join('');
}

// ── Open question detail ──
async function openQuestion(id) {
  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('show');
  dv.querySelector('#detail-content').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px">Loading...</div>';

  try {
    const res = await fetch(`/api/learner?action=qa-detail&question_id=${id}`, {
      headers: { Authorization: 'Bearer ' + AUTH.token }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    renderDetail(data.question, data.answers);
  } catch (err) {
    dv.querySelector('#detail-content').innerHTML = '<div style="color:var(--red);padding:24px">Failed to load question.</div>';
  }
}

function renderDetail(q, answers) {
  const isOwner = q.learner_id === AUTH.user?.id;
  document.getElementById('detail-content').innerHTML = `
    <div class="fade-in">
      <div class="detail-title">${esc(q.title)}</div>
      <div class="detail-meta">
        <span>Asked by ${esc(q.learner_name || 'Learner')}</span>
        <span>${timeAgo(q.created_at)}</span>
        <span class="q-card-status status-${q.status}">${q.status}</span>
      </div>
      ${q.body ? `<div class="detail-body">${esc(q.body)}</div>` : ''}

      <div class="answers-title">${answers.length} ${answers.length === 1 ? 'Reply' : 'Replies'}</div>
      ${answers.length === 0 ? '<div style="color:var(--muted);font-size:0.85rem;margin-bottom:20px">No replies yet. Your instructor will respond soon!</div>' : ''}
      ${answers.map(a => `
        <div class="answer-card ${a.author_type === 'instructor' ? 'instructor' : ''}">
          <div class="answer-author">
            ${esc(a.author_name)}
            <span class="badge ${a.author_type === 'instructor' ? 'badge-instructor' : 'badge-learner'}">${a.author_type}</span>
          </div>
          <div class="answer-body">${esc(a.body)}</div>
          <div class="answer-time">${timeAgo(a.created_at)}</div>
        </div>
      `).join('')}

      <div class="reply-box">
        <textarea id="reply-body" placeholder="Add a follow-up..."></textarea>
        <button class="btn-submit-q" onclick="submitReply(${q.id})">Reply</button>
      </div>
    </div>
  `;
}

function showList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('list-view').style.display = 'block';
  loadQuestions();
}

// ── Ask form ──
function openAskForm() {
  if (window.ccAuth && !window.ccAuth.requireAuth()) return;
  document.getElementById('ask-overlay').classList.add('show');
  document.getElementById('ask-title').focus();
}

function closeAskForm() {
  document.getElementById('ask-overlay').classList.remove('show');
  document.getElementById('ask-title').value = '';
  document.getElementById('ask-body').value = '';
}

async function submitQuestion() {
  const title = document.getElementById('ask-title').value.trim();
  const body = document.getElementById('ask-body').value.trim();
  if (!title) { showToast('Please enter your question', 'error'); return; }

  const btn = document.getElementById('btn-submit-q');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const payload = { title, body: body || null };
    if (askSessionId) payload.session_id = parseInt(askSessionId);
    if (askBookingId) payload.booking_id = parseInt(askBookingId);

    const res = await fetch('/api/learner?action=qa-ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + AUTH.token },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    closeAskForm();
    showToast('Question submitted!');
    askSessionId = null;
    askBookingId = null;
    loadQuestions();
  } catch (err) {
    showToast(err.message || 'Failed to submit', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Question';
  }
}

async function submitReply(questionId) {
  const textarea = document.getElementById('reply-body');
  const body = textarea.value.trim();
  if (!body) { showToast('Please enter a reply', 'error'); return; }

  try {
    const res = await fetch('/api/learner?action=qa-reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + AUTH.token },
      body: JSON.stringify({ question_id: questionId, body })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    showToast('Reply posted!');
    openQuestion(questionId);
  } catch (err) {
    showToast(err.message || 'Failed to post reply', 'error');
  }
}

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
