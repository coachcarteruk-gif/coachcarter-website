<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="/cookie-consent.js"></script>
  <script src="/posthog-loader.js"></script>
  <title>My Data — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared-auth.css">
  <script src="/shared/learner-auth.js"></script>
  <script src="/sidebar.js"></script>
  <style>
    body { padding-top: 88px; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px 24px 96px; }
    h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #797879; font-size: 0.9rem; margin-bottom: 40px; }
    h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.1rem; font-weight: 700; margin: 32px 0 8px; color: #262626; }
    .data-section { margin-bottom: 24px; }
    .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; color: #444; line-height: 1.5; }
    .data-row:last-child { border-bottom: none; }
    .data-label { color: #797879; min-width: 140px; flex-shrink: 0; }
    .data-value { text-align: right; word-break: break-word; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #444; margin-top: 8px; }
    .data-table th { text-align: left; font-weight: 600; color: #797879; padding: 6px 8px; border-bottom: 1px solid #e0e0e0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .data-table td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; }
    .data-empty { color: #b0b0b0; font-style: italic; font-size: 0.85rem; padding: 8px 0; }
    .loading { text-align: center; padding: 60px 0; color: #797879; }
    .error-msg { text-align: center; padding: 60px 0; color: #ef4444; }
    .back-link { display: inline-block; margin-bottom: 16px; color: #f58321; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
    @media (max-width: 600px) {
      .wrap { padding: 16px 16px 80px; }
      h1 { font-size: 1.6rem; }
      .data-row { flex-direction: column; gap: 2px; }
      .data-value { text-align: left; }
      .data-table { font-size: 0.7rem; }
      .data-table th, .data-table td { padding: 4px 4px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <a href="/learner/profile.html" class="back-link">&larr; Back to Profile</a>
  <h1>My Data</h1>
  <p class="subtitle">All personal data we hold about you, as required under UK GDPR Article 15.</p>

  <div id="content">
    <div class="loading">Loading your data...</div>
  </div>
</div>

<script>
(function() {
  var auth = window.ccAuth && ccAuth.getAuth();
  if (!auth || !auth.token) {
    document.getElementById('content').innerHTML = '<div class="error-msg">Please <a href="/learner/login.html?redirect=/learner/my-data.html">log in</a> to view your data.</div>';
    return;
  }

  fetch('/api/learner?action=export-data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + auth.token }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { document.getElementById('content').innerHTML = '<div class="error-msg">' + data.error + '</div>'; return; }
    renderData(data);
  })
  .catch(function() {
    document.getElementById('content').innerHTML = '<div class="error-msg">Failed to load your data. Please try again later.</div>';
  });

  function renderData(d) {
    var html = '';

    // Profile
    var p = d.profile || {};
    html += '<h2>Profile</h2><div class="data-section">';
    html += row('Name', p.name);
    html += row('Email', p.email);
    html += row('Phone', p.phone);
    html += row('Pickup address', p.pickup_address);
    html += row('Test date', formatDate(p.test_date));
    html += row('Test time', p.test_time);
    html += row('Contact before lessons', p.prefer_contact_before ? 'Yes' : 'No');
    html += row('Account created', formatDateTime(p.created_at));
    html += row('Last active', formatDateTime(p.last_activity_at));
    html += '</div>';

    // Onboarding
    if (d.onboarding) {
      var o = d.onboarding;
      html += '<h2>Onboarding</h2><div class="data-section">';
      html += row('Professional hours', o.prior_hours_pro);
      html += row('Private practice hours', o.prior_hours_private);
      html += row('Previous tests', o.previous_tests);
      html += row('Transmission', o.transmission);
      html += row('Test date', formatDate(o.test_date));
      html += row('Main concerns', o.main_concerns);
      html += '</div>';
    }

    // Bookings
    html += '<h2>Bookings (' + (d.bookings || []).length + ')</h2>';
    if (d.bookings && d.bookings.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Date</th><th>Time</th><th>Instructor</th><th>Type</th><th>Status</th><th>Pickup</th></tr></thead><tbody>';
      d.bookings.forEach(function(b) {
        html += '<tr><td>' + formatDate(b.scheduled_date) + '</td><td>' + (b.start_time || '') + ' - ' + (b.end_time || '') + '</td><td>' + (b.instructor_name || '-') + '</td><td>' + (b.lesson_type || '-') + '</td><td>' + (b.status || '') + '</td><td>' + (b.pickup_address || '-') + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No bookings</div>'; }

    // Transactions
    html += '<h2>Credit Transactions (' + (d.transactions || []).length + ')</h2>';
    if (d.transactions && d.transactions.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Date</th><th>Type</th><th>Credits</th><th>Minutes</th><th>Amount</th><th>Method</th></tr></thead><tbody>';
      d.transactions.forEach(function(t) {
        html += '<tr><td>' + formatDateTime(t.created_at) + '</td><td>' + (t.type || '') + '</td><td>' + (t.credits || 0) + '</td><td>' + (t.minutes || 0) + '</td><td>' + formatPence(t.amount_pence) + '</td><td>' + (t.payment_method || '-') + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No transactions</div>'; }

    // Driving Sessions
    html += '<h2>Driving Sessions (' + (d.driving_sessions || []).length + ')</h2>';
    if (d.driving_sessions && d.driving_sessions.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Date</th><th>Duration</th><th>Type</th><th>Notes</th></tr></thead><tbody>';
      d.driving_sessions.forEach(function(s) {
        html += '<tr><td>' + formatDate(s.session_date) + '</td><td>' + (s.duration_minutes || 0) + ' min</td><td>' + (s.session_type || '') + '</td><td>' + (s.notes || '-') + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No sessions logged</div>'; }

    // Skill Ratings
    html += '<h2>Skill Ratings (' + (d.skill_ratings || []).length + ')</h2>';
    if (d.skill_ratings && d.skill_ratings.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Skill</th><th>Rating</th><th>Note</th><th>Date</th></tr></thead><tbody>';
      d.skill_ratings.forEach(function(s) {
        html += '<tr><td>' + (s.skill_key || '') + '</td><td>' + (s.rating || '') + '</td><td>' + (s.note || '-') + '</td><td>' + formatDateTime(s.created_at) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No skill ratings</div>'; }

    // Quiz Results
    html += '<h2>Quiz Results (' + (d.quiz_results || []).length + ')</h2>';
    if (d.quiz_results && d.quiz_results.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th><th>Date</th></tr></thead><tbody>';
      d.quiz_results.forEach(function(q) {
        html += '<tr><td>' + (q.question_id || '') + '</td><td>' + (q.learner_answer || '-') + '</td><td>' + (q.correct_answer || '-') + '</td><td>' + (q.correct ? 'Correct' : 'Incorrect') + '</td><td>' + formatDateTime(q.answered_at) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No quiz results</div>'; }

    // Mock Tests
    html += '<h2>Mock Tests (' + (d.mock_tests || []).length + ')</h2>';
    if (d.mock_tests && d.mock_tests.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Date</th><th>Result</th><th>Driving</th><th>Serious</th><th>Dangerous</th><th>Notes</th></tr></thead><tbody>';
      d.mock_tests.forEach(function(m) {
        html += '<tr><td>' + formatDateTime(m.started_at) + '</td><td>' + (m.result || '-') + '</td><td>' + (m.total_driving_faults || 0) + '</td><td>' + (m.total_serious_faults || 0) + '</td><td>' + (m.total_dangerous_faults || 0) + '</td><td>' + (m.notes || '-') + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No mock tests</div>'; }

    // Q&A
    html += '<h2>Questions (' + (d.qa_questions || []).length + ')</h2>';
    if (d.qa_questions && d.qa_questions.length) {
      html += '<div class="data-section"><table class="data-table"><thead><tr><th>Title</th><th>Status</th><th>Date</th></tr></thead><tbody>';
      d.qa_questions.forEach(function(q) {
        html += '<tr><td>' + (q.title || '') + '</td><td>' + (q.status || '') + '</td><td>' + formatDateTime(q.created_at) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += '<div class="data-empty">No questions asked</div>'; }

    // Metadata
    html += '<h2>Export Information</h2><div class="data-section">';
    html += row('Exported at', formatDateTime(d._metadata.exported_at));
    html += row('Data categories', (d._metadata.data_categories || []).join(', '));
    html += '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function row(label, value) {
    return '<div class="data-row"><span class="data-label">' + label + '</span><span class="data-value">' + (value || '-') + '</span></div>';
  }
  function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  function formatDateTime(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  function formatPence(p) { if (!p) return '-'; return '\u00A3' + (p / 100).toFixed(2); }
})();
</script>

</body>
</html>
