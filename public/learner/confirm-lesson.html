<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>
  <title>Confirm Lesson — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/learner.css">
  <style>
    main { max-width: 500px; margin: 0 auto; padding: 24px 16px 100px; }
    h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }

    .lesson-info-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    }
    .lesson-info-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      font-size: 0.88rem;
    }
    .lesson-info-label { color: var(--muted); font-weight: 600; }
    .lesson-info-val { font-weight: 700; color: var(--primary); }

    .confirm-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px;
    }
    .confirm-card-title {
      font-family: var(--font-head); font-size: 1rem; font-weight: 700;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    select, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--primary); font-family: var(--font-body);
      font-size: 0.9rem; padding: 10px 13px; outline: none; transition: border-color 0.2s;
    }
    select:focus, textarea:focus { border-color: var(--accent); background: var(--white); }
    textarea { resize: vertical; min-height: 80px; }

    .btn-submit {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: 8px; font-family: var(--font-head); font-size: 1rem;
      font-weight: 700; padding: 13px; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: var(--accent-dk); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .success-card {
      text-align: center; padding: 40px 20px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .success-card h2 { font-family: var(--font-head); font-size: 1.3rem; margin-bottom: 8px; }
    .success-card p { color: var(--muted); font-size: 0.9rem; }
    .success-card a {
      display: inline-block; margin-top: 20px; background: var(--accent);
      color: white; text-decoration: none; padding: 10px 24px; border-radius: 8px;
      font-weight: 700; font-size: 0.9rem;
    }

    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="/sidebar.js"></script>
  <script src="/shared/learner-auth.js"></script>
</head>
<body>

<nav class="site-nav">
  <a class="site-nav-logo" href="/">
    <img src="/Logo.png" alt="CoachCarter">
    <span>Coach<em>Carter</em></span>
  </a>
  <div class="site-nav-links">
    <a class="site-nav-link" href="/learner-journey.html">Pricing</a>
    <a class="site-nav-link" href="/classroom.html">Free Videos</a>
    <a class="site-nav-link" href="/learner/login.html">Learner Login</a>
    <a class="site-nav-link primary" href="/learner/login.html?redirect=/learner/book.html">Book Free Trial</a>
  </div>
</nav>

<main>
  <h1>Confirm Your Lesson</h1>
  <p class="subtitle">Let us know how your lesson went.</p>

  <div id="content">
    <div class="loading"><div class="spinner"></div><p>Loading lesson details...</p></div>
  </div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('booking_id');
  let token = null;

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function formatTime(timeStr) {
    const parts = timeStr.split(':');
    const h = parseInt(parts[0]);
    const m = parts[1];
    const ampm = h >= 12 ? 'pm' : 'am';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return h12 + ':' + m + ampm;
  }

  async function init() {
    if (window.ccAuth && !window.ccAuth.requireAuth()) return;

    const stored = localStorage.getItem('cc_learner');
    if (!stored) {
      window.location.href = '/learner/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
      return;
    }
    const parsed = JSON.parse(stored);
    token = parsed.token;

    if (!bookingId) {
      // No booking_id — show list of pending confirmations
      await loadPendingList();
      return;
    }

    await loadBooking();
  }

  async function loadPendingList() {
    try {
      const res = await fetch('/api/learner?action=pending-confirmations', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      if (data.bookings.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="success-card">
            <h2>All caught up!</h2>
            <p>You have no lessons to confirm right now.</p>
            <a href="/learner/book.html">Back to dashboard</a>
          </div>`;
        return;
      }

      let html = '';
      for (const b of data.bookings) {
        html += `
          <div class="lesson-info-card" style="cursor:pointer" onclick="window.location.href='?booking_id=${b.id}'">
            <div class="lesson-info-row">
              <span class="lesson-info-label">Date</span>
              <span class="lesson-info-val">${formatDate(b.scheduled_date)}</span>
            </div>
            <div class="lesson-info-row">
              <span class="lesson-info-label">Time</span>
              <span class="lesson-info-val">${formatTime(b.start_time)} - ${formatTime(b.end_time)}</span>
            </div>
            <div class="lesson-info-row">
              <span class="lesson-info-label">Instructor</span>
              <span class="lesson-info-val">${b.instructor_name}</span>
            </div>
            <div style="text-align:right;margin-top:8px;">
              <span style="color:var(--accent);font-weight:700;font-size:0.85rem;">Confirm &rarr;</span>
            </div>
          </div>`;
      }
      document.getElementById('content').innerHTML = html;
    } catch (err) {
      document.getElementById('content').innerHTML = `<p style="color:red;">Failed to load: ${err.message}</p>`;
    }
  }

  async function loadBooking() {
    // We need to fetch this booking's details via pending-confirmations
    // and show the confirm form
    try {
      const res = await fetch('/api/learner?action=pending-confirmations', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const booking = data.bookings.find(b => b.id === parseInt(bookingId));

      if (!booking) {
        document.getElementById('content').innerHTML = `
          <div class="success-card">
            <h2>Already confirmed</h2>
            <p>This lesson has already been confirmed or is no longer pending.</p>
            <a href="/learner/book.html">Back to dashboard</a>
          </div>`;
        return;
      }

      document.getElementById('content').innerHTML = `
        <div class="lesson-info-card">
          <div class="lesson-info-row">
            <span class="lesson-info-label">Date</span>
            <span class="lesson-info-val">${formatDate(booking.scheduled_date)}</span>
          </div>
          <div class="lesson-info-row">
            <span class="lesson-info-label">Time</span>
            <span class="lesson-info-val">${formatTime(booking.start_time)} - ${formatTime(booking.end_time)}</span>
          </div>
          <div class="lesson-info-row">
            <span class="lesson-info-label">Instructor</span>
            <span class="lesson-info-val">${booking.instructor_name}</span>
          </div>
        </div>

        <div class="confirm-card">
          <div class="confirm-card-title">Your confirmation</div>

          <div class="form-group">
            <label>Did this lesson take place?</label>
            <select id="cf-happened">
              <option value="true">Yes, it happened</option>
              <option value="false">No, it didn't happen</option>
            </select>
          </div>

          <div class="form-group">
            <label>Was anyone late?</label>
            <select id="cf-late" onchange="document.getElementById('cf-mins-row').style.display = this.value ? 'block' : 'none'">
              <option value="">No one was late</option>
              <option value="instructor">My instructor was late</option>
              <option value="learner">I was late</option>
            </select>
          </div>

          <div class="form-group" id="cf-mins-row" style="display:none">
            <label>How many minutes late?</label>
            <select id="cf-mins">
              <option value="5">5 minutes</option>
              <option value="10">10 minutes</option>
              <option value="15">15 minutes</option>
              <option value="20">20 minutes</option>
              <option value="30">30 minutes</option>
              <option value="45">45 minutes</option>
              <option value="60">60 minutes</option>
            </select>
          </div>

          <div class="form-group">
            <label>Any notes about the lesson? (optional)</label>
            <textarea id="cf-notes" placeholder="Anything you'd like to share about the lesson..."></textarea>
          </div>

          <button class="btn-submit" id="btn-submit" onclick="submitConfirmation()">Submit confirmation</button>
        </div>`;

    } catch (err) {
      document.getElementById('content').innerHTML = `<p style="color:red;">Failed to load: ${err.message}</p>`;
    }
  }

  async function submitConfirmation() {
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const happened = document.getElementById('cf-happened').value === 'true';
    const lateParty = document.getElementById('cf-late').value || null;
    const lateMinutes = lateParty ? parseInt(document.getElementById('cf-mins').value) : null;
    const notes = document.getElementById('cf-notes').value.trim() || null;

    try {
      const res = await fetch('/api/learner?action=confirm-lesson', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          booking_id: parseInt(bookingId),
          lesson_happened: happened,
          late_party: lateParty,
          late_minutes: lateMinutes,
          notes: notes
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      document.getElementById('content').innerHTML = `
        <div class="success-card">
          <div style="font-size:3rem;margin-bottom:12px;">✓</div>
          <h2>Lesson confirmed!</h2>
          <p>Thanks for confirming. Your feedback helps us keep things running smoothly.</p>
          <a href="/learner/book.html">Back to dashboard</a>
        </div>`;

    } catch (err) {
      alert('Failed to submit: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Submit confirmation';
    }
  }

  init();
</script>
</body>
</html>
