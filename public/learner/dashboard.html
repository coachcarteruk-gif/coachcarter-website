<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Progress — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #13161f;
      --surface2: #191c27;
      --border: #1e2230;
      --text: #e8eaf2;
      --muted: #6b7280;
      --blue: #4f6ef7;
      --green: #22c55e;
      --lime: #86efac;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-brand img { height: 36px; width: auto; }
    .header-brand-text { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .header-brand-sub { font-size: 0.7rem; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-name { font-size: 0.85rem; color: var(--muted); }
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* MAIN LAYOUT */
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

    /* WELCOME */
    .welcome { margin-bottom: 28px; }
    .welcome h1 { font-size: 1.5rem; font-weight: 700; }
    .welcome p { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-pill .num { font-size: 1.3rem; font-weight: 700; }
    .stat-pill .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    /* LOG SESSION BUTTON */
    .log-btn {
      display: block;
      width: 100%;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 28px;
      transition: background 0.2s;
    }
    .log-btn:hover { background: #3b5ce6; }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* PROGRESS GROUPS */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .progress-header-left { display: flex; align-items: center; gap: 12px; }
    .progress-group-name { font-size: 0.95rem; font-weight: 700; }
    .progress-group-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .chevron {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .chevron.open { transform: rotate(180deg); }

    .progress-body { display: none; padding: 0 18px 18px; }
    .progress-body.open { display: block; }

    /* QUESTION ROWS */
    .q-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .q-row:last-child { border-bottom: none; }
    .q-num {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      width: 22px;
    }
    .q-text { font-size: 0.88rem; color: var(--text); flex: 1; line-height: 1.4; }
    .q-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .badge-always    { background: rgba(34,197,94,0.15);  color: #86efac; }
    .badge-usually   { background: rgba(134,239,172,0.15);color: #86efac; }
    .badge-sometimes { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .badge-never     { background: rgba(239,68,68,0.15);  color: #fca5a5; }
    .badge-none      { background: var(--surface2); color: var(--muted); }

    /* GROUP SCORE BAR */
    .group-score {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 12px;
    }
    .group-score-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    .group-score-label .title { color: var(--muted); }
    .group-score-label .pct { font-weight: 700; }
    .score-bar-bg {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--green);
      transition: width 0.6s ease;
    }
    .score-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* SESSIONS LIST */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .session-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .session-date { font-size: 0.88rem; font-weight: 600; }
    .session-chip {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
    }
    .chip-instructor { background: rgba(79,110,247,0.15); color: var(--blue); }
    .chip-private { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .chip-duration { background: var(--surface2); color: var(--muted); }
    .session-ratings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .session-skill-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .session-skill-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .session-notes {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    /* PER-QUESTION NOTES IN SESSION HISTORY */
    .q-notes-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .q-note-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .q-note-item .q-note-label {
      font-weight: 600;
      color: var(--blue);
      flex-shrink: 0;
      font-size: 0.72rem;
    }
    .q-note-item .q-note-text {
      font-style: italic;
      line-height: 1.4;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 2rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.9rem; }

    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-brand">
    <img src="/Logo.png" alt="CoachCarter">
    <div>
      <div class="header-brand-text">CoachCarter</div>
      <div class="header-brand-sub">Learner Portal</div>
    </div>
  </a>
  <div class="header-right">
    <span class="header-name" id="header-name"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</header>

<main>
  <div class="welcome">
    <h1 id="welcome-msg">Loading…</h1>
    <p id="welcome-sub"></p>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-pill">
      <div class="num" id="stat-sessions">—</div>
      <div class="lbl">Sessions</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-hours">—</div>
      <div class="lbl">Hours logged</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-instructor">—</div>
      <div class="lbl">With instructor</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-private">—</div>
      <div class="lbl">Private practice</div>
    </div>
  </div>

  <!-- LOG SESSION BUTTON -->
  <a href="/learner/log-session.html" class="log-btn">+ Log a Session</a>

  <!-- PROGRESS -->
  <div class="section-title">Your Progress</div>
  <div id="progress-cards"></div>

  <!-- RECENT SESSIONS -->
  <div class="section-title" style="margin-top: 28px;">Recent Sessions</div>
  <div id="sessions-list"></div>
</main>

<script>
const QUESTIONS = [
  { key: 'q1_speed_react',     group: 'speed-control',  num: 1,  text: 'I drove at a safe speed and had enough time to react' },
  { key: 'q2_speed_lane',      group: 'speed-control',  num: 2,  text: 'I slowed down in time to choose the right lane before roundabouts and junctions' },
  { key: 'q3_mirrors_routine', group: 'speed-control',  num: 3,  text: 'I checked my mirrors every time before moving, stopping, slowing down or turning' },
  { key: 'q4_mirrors_unexp',   group: 'looking-around', num: 4,  text: 'When something unexpected came up, I still checked my mirrors first' },
  { key: 'q5_awareness',       group: 'looking-around', num: 5,  text: 'I always knew what was going on around me — not just what was straight ahead' },
  { key: 'q6_mice_order',      group: 'junctions',      num: 6,  text: 'I checked mirrors, signalled, got in position and adjusted my speed — in the right order' },
  { key: 'q7_lane_choice',     group: 'junctions',      num: 7,  text: 'I got in the right lane before roundabouts and junctions' },
  { key: 'q8_safe_to_go',      group: 'junctions',      num: 8,  text: 'I decided early enough whether it was safe to go — so I didn\'t feel rushed' },
  { key: 'q9_roundabout_space',group: 'junctions',      num: 9,  text: 'I kept enough space and stayed in my lane all the way around roundabouts' },
  { key: 'q10_reversing',      group: 'reversing',      num: 10, text: 'I reversed slowly, accurately and kept looking all around me' }
];

const GROUPS = [
  { key: 'speed-control',  label: 'Speed & Control',          sub: 'Questions 1–3' },
  { key: 'looking-around', label: 'Looking Around',            sub: 'Questions 4–5' },
  { key: 'junctions',      label: 'Junctions & Roundabouts',  sub: 'Questions 6–9' },
  { key: 'reversing',      label: 'Reversing',                 sub: 'Question 10'  }
];

const RATING_LABELS = {
  always:    'Always',
  usually:   'Usually',
  sometimes: 'Sometimes',
  never:     'Never'
};

// Score weighting: always=2, usually=1, sometimes=0, never=-1
const SCORE_WEIGHT = { always: 2, usually: 1, sometimes: 0, never: -1 };

let AUTH, PROGRESS, SESSIONS_DATA;

window.addEventListener('DOMContentLoaded', async () => {
  AUTH = JSON.parse(localStorage.getItem('cc_learner') || 'null');
  if (!AUTH?.token) { window.location.href = '/learner/'; return; }

  document.getElementById('header-name').textContent = AUTH.user.name;

  await Promise.all([loadProgress(), loadSessions()]);
  render();
});

function logout() {
  localStorage.removeItem('cc_learner');
  window.location.href = '/learner/';
}

async function loadProgress() {
  try {
    const res = await fetch('/api/learner?action=progress', {
      headers: { 'Authorization': `Bearer ${AUTH.token}` }
    });
    if (res.status === 401) { logout(); return; }
    PROGRESS = await res.json();
  } catch (e) { console.error(e); }
}

async function loadSessions() {
  try {
    const res = await fetch('/api/learner?action=sessions', {
      headers: { 'Authorization': `Bearer ${AUTH.token}` }
    });
    if (res.ok) SESSIONS_DATA = (await res.json()).sessions;
  } catch (e) { console.error(e); }
}

function render() {
  if (!PROGRESS) return;

  // Welcome message
  const s = PROGRESS.stats;
  document.getElementById('welcome-msg').textContent = `Hi, ${PROGRESS.name} 👋`;

  const alwaysCount = (PROGRESS.latest_ratings || []).filter(r => r.rating === 'always').length;
  const rated = (PROGRESS.latest_ratings || []).length;
  if (rated === 0) {
    document.getElementById('welcome-sub').textContent = 'Log your first session to start tracking progress.';
  } else {
    document.getElementById('welcome-sub').textContent =
      `${alwaysCount} of ${QUESTIONS.length} areas rated Always — keep going!`;
  }

  // Stats
  document.getElementById('stat-sessions').textContent = s.total_sessions;
  document.getElementById('stat-hours').textContent = (s.total_minutes / 60).toFixed(1);
  document.getElementById('stat-instructor').textContent = s.instructor_sessions;
  document.getElementById('stat-private').textContent = s.private_sessions;

  // Build ratings lookup
  const ratingsMap = {};
  (PROGRESS.latest_ratings || []).forEach(r => { ratingsMap[r.skill_key] = r.rating; });

  // Render progress cards
  const container = document.getElementById('progress-cards');
  container.innerHTML = '';
  GROUPS.forEach((group, i) => renderProgressCard(group, ratingsMap, container, i === 0));

  // Render sessions
  renderSessions();
}

function renderProgressCard(group, ratingsMap, container, expanded) {
  const questions = QUESTIONS.filter(q => q.group === group.key);

  // Calculate score (always/usually count toward "on track")
  const onTrackCount = questions.filter(q => {
    const r = ratingsMap[q.key];
    return r === 'always' || r === 'usually';
  }).length;
  const ratedCount = questions.filter(q => ratingsMap[q.key]).length;
  const pct = ratedCount > 0 ? Math.round((onTrackCount / questions.length) * 100) : 0;

  const questionsHTML = questions.map(q => {
    const rating = ratingsMap[q.key];
    const label = rating ? RATING_LABELS[rating] : 'Not rated';
    const badgeClass = rating ? `badge-${rating}` : 'badge-none';
    return `
      <div class="q-row">
        <span class="q-num">Q${q.num}</span>
        <span class="q-text">${q.text}</span>
        <span class="q-badge ${badgeClass}">${label}</span>
      </div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'progress-card';
  const bodyId = `pg-body-${group.key}`;
  const chevId = `pg-chev-${group.key}`;

  card.innerHTML = `
    <div class="progress-header" onclick="toggleGroup('${group.key}')">
      <div class="progress-header-left">
        <div>
          <div class="progress-group-name">${group.label}</div>
          <div class="progress-group-sub">${group.sub}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        ${ratedCount > 0 ? `<span style="font-size:0.8rem;font-weight:700;color:${pct >= 75 ? '#86efac' : pct >= 40 ? '#fcd34d' : '#fca5a5'}">${pct}%</span>` : ''}
        <span class="chevron${expanded ? ' open' : ''}" id="${chevId}">▼</span>
      </div>
    </div>
    <div class="progress-body${expanded ? ' open' : ''}" id="${bodyId}">
      ${questionsHTML}
      ${ratedCount > 0 ? `
      <div class="group-score">
        <div class="group-score-label">
          <span class="title">On track (Usually or Always)</span>
          <span class="pct" style="color:${pct >= 75 ? '#86efac' : pct >= 40 ? '#fcd34d' : '#fca5a5'}">${pct}%</span>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${pct}%;background:${pct >= 75 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444'}"></div>
        </div>
        <div class="score-note">${onTrackCount} of ${questions.length} questions at Usually or Always</div>
      </div>` : `
      <div class="group-score">
        <div class="score-note" style="text-align:center;padding:4px 0;">Log a session to see your progress here.</div>
      </div>`}
    </div>`;

  container.appendChild(card);
}

function toggleGroup(key) {
  const body = document.getElementById(`pg-body-${key}`);
  const chev = document.getElementById(`pg-chev-${key}`);
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

function renderSessions() {
  const el = document.getElementById('sessions-list');
  if (!SESSIONS_DATA || SESSIONS_DATA.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📋</div>
        <p>No sessions logged yet.<br>Hit the button above after your first drive!</p>
      </div>`;
    return;
  }

  el.innerHTML = SESSIONS_DATA.map(s => {
    const date = new Date(s.session_date);
    const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const typeChip = s.session_type === 'private'
      ? `<span class="session-chip chip-private">Private Practice</span>`
      : `<span class="session-chip chip-instructor">With Instructor</span>`;
    const durationChip = s.duration_minutes
      ? `<span class="session-chip chip-duration">${s.duration_minutes} min</span>` : '';

    const ratingsHTML = (s.ratings || []).map(r => {
      const dotColor = r.rating === 'always' ? '#22c55e'
        : r.rating === 'usually'   ? '#86efac'
        : r.rating === 'sometimes' ? '#f59e0b'
        : '#ef4444';
      const qLabel = findQuestionLabel(r.skill_key);
      const noteIcon = r.note ? ` <span style="opacity:0.7">📝</span>` : '';
      return `<div class="session-skill-pill">
        <div class="dot" style="background:${dotColor}"></div>
        ${qLabel}${noteIcon}
      </div>`;
    }).join('');

    // Per-question notes list
    const qNotesWithContent = (s.ratings || []).filter(r => r.note);
    const qNotesHTML = qNotesWithContent.length > 0
      ? `<div class="q-notes-list">
          ${qNotesWithContent.map(r => {
            const q = QUESTIONS.find(q => q.key === r.skill_key);
            const label = q ? `Q${q.num}` : r.skill_key;
            return `<div class="q-note-item">
              <span class="q-note-label">${label}</span>
              <span class="q-note-text">${r.note}</span>
            </div>`;
          }).join('')}
        </div>` : '';

    const notesHTML = s.notes
      ? `<div class="session-notes">"${s.notes}"</div>` : '';

    return `
      <div class="session-card">
        <div class="session-meta">
          <span class="session-date">📅 ${dateStr}</span>
          ${typeChip}
          ${durationChip}
        </div>
        ${ratingsHTML ? `<div class="session-ratings">${ratingsHTML}</div>` : ''}
        ${qNotesHTML}
        ${notesHTML}
      </div>`;
  }).join('');
}

function findQuestionLabel(key) {
  const q = QUESTIONS.find(q => q.key === key);
  if (q) {
    // Shorten to first 4 words for pill display
    const words = q.text.split(' ');
    return words.slice(0, 4).join(' ') + (words.length > 4 ? '…' : '');
  }
  return key;
}
</script>
</body>
</html>
