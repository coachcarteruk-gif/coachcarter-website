<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Progress — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #13161f;
      --surface2: #191c27;
      --border: #1e2230;
      --text: #e8eaf2;
      --muted: #6b7280;
      --blue: #4f6ef7;
      --t1: #4f6ef7;
      --t2: #8b5cf6;
      --t3: #10b981;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-brand img { height: 36px; width: auto; }
    .header-brand-text { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .header-brand-sub { font-size: 0.7rem; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-name { font-size: 0.85rem; color: var(--muted); }
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* MAIN LAYOUT */
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

    /* WELCOME */
    .welcome {
      margin-bottom: 28px;
    }
    .welcome h1 { font-size: 1.5rem; font-weight: 700; }
    .welcome p { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-pill .num { font-size: 1.3rem; font-weight: 700; }
    .stat-pill .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    /* LOG SESSION BUTTON */
    .log-btn {
      display: block;
      width: 100%;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 28px;
      transition: background 0.2s;
    }
    .log-btn:hover { background: #3b5ce6; }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* TIER CARDS */
    .tier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .tier-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .tier-header-left { display: flex; align-items: center; gap: 12px; }
    .tier-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tier-name { font-size: 0.95rem; font-weight: 700; }
    .tier-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .tier-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .badge-current { background: rgba(79,110,247,0.15); color: var(--blue); }
    .badge-locked { background: rgba(107,114,128,0.15); color: var(--muted); }
    .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
    .chevron {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.2s;
      margin-left: 8px;
    }
    .chevron.open { transform: rotate(180deg); }

    .tier-body { display: none; padding: 0 18px 18px; }
    .tier-body.open { display: block; }

    /* SKILLS LIST */
    .skill-list { margin-bottom: 16px; }
    .skill-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .skill-row:last-child { border-bottom: none; }
    .skill-name { font-size: 0.88rem; color: var(--text); }
    .skill-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .rating-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .rating-habitual .rating-dot { background: var(--green); }
    .rating-habitual .rating-text { color: var(--green); }
    .rating-developing .rating-dot { background: var(--amber); }
    .rating-developing .rating-text { color: var(--amber); }
    .rating-not_yet .rating-dot { background: var(--red); }
    .rating-not_yet .rating-text { color: var(--red); }
    .rating-none .rating-dot { background: var(--border); }
    .rating-none .rating-text { color: var(--muted); }

    /* READINESS BAR */
    .readiness {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .readiness-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    .readiness-label .title { color: var(--muted); }
    .readiness-label .pct { font-weight: 700; }
    .readiness-bar-bg {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .readiness-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .readiness-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* SESSIONS LIST */
    .sessions-list { }
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .session-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .session-date { font-size: 0.88rem; font-weight: 600; }
    .session-chip {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
    }
    .chip-instructor { background: rgba(79,110,247,0.15); color: var(--blue); }
    .chip-private { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .chip-duration { background: var(--surface2); color: var(--muted); }
    .session-ratings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .session-skill-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .session-skill-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .session-notes {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 2rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.9rem; }

    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-brand">
    <img src="/Logo.png" alt="CoachCarter">
    <div>
      <div class="header-brand-text">CoachCarter</div>
      <div class="header-brand-sub">Learner Portal</div>
    </div>
  </a>
  <div class="header-right">
    <span class="header-name" id="header-name"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</header>

<main>
  <div class="welcome">
    <h1 id="welcome-msg">Loading…</h1>
    <p id="welcome-sub"></p>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-pill">
      <div class="num" id="stat-sessions">—</div>
      <div class="lbl">Sessions</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-hours">—</div>
      <div class="lbl">Hours logged</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-instructor">—</div>
      <div class="lbl">With instructor</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="stat-private">—</div>
      <div class="lbl">Private practice</div>
    </div>
  </div>

  <!-- LOG SESSION BUTTON -->
  <a href="/learner/log-session.html" class="log-btn">+ Log a Session</a>

  <!-- TIER PROGRESS -->
  <div class="section-title">Your Progress</div>
  <div id="tier-cards"></div>

  <!-- RECENT SESSIONS -->
  <div class="section-title" style="margin-top: 28px;">Recent Sessions</div>
  <div id="sessions-list"></div>
</main>

<script>
const CURRICULUM = {
  1: {
    title: 'Tier 1', subtitle: 'Foundations', weeks: 'Weeks 1–6', color: '#4f6ef7',
    skills: [
      { key: 't1_move',    label: 'Moving the car' },
      { key: 't1_stop',    label: 'Stopping & slowing' },
      { key: 't1_steer',   label: 'Steering' },
      { key: 't1_mirrors', label: 'Mirror checks' },
      { key: 't1_mice',    label: 'MICE for junctions' },
      { key: 't1_eval',    label: 'Junction evaluation' }
    ],
    passChecklist: [
      'Habitually moves off with appropriate checks',
      'Habitually slows/stops with appropriate checks',
      'Habitually steers with appropriate checks',
      'Habitually approaches junctions with correct use and timing of MICE',
      'Habitually chooses the correct speeds'
    ]
  },
  2: {
    title: 'Tier 2', subtitle: 'Building Complexity', weeks: 'Weeks 7–11', color: '#8b5cf6',
    skills: [
      { key: 't2_speed',      label: 'Speed management' },
      { key: 't2_roundabout', label: 'Roundabout clearance & lane discipline' },
      { key: 't2_reverse',    label: 'Reversing' },
      { key: 't2_mirrors',    label: 'Mirror checks for unexpected hazards' },
      { key: 't2_mice',       label: 'MICE for roundabouts' },
      { key: 't2_eval',       label: 'Roundabout & junction evaluation' }
    ],
    passChecklist: [
      'Habitually moves off/slows/stops/steers with appropriate checks',
      'Habitually chooses the correct speed',
      'Habitually keeps car safe throughout reversing',
      'Habitually approaches junctions & roundabouts with correct MICE',
      'Habitually evaluates go/stop decisions in good time'
    ]
  },
  3: {
    title: 'Tier 3', subtitle: 'Test Ready', weeks: 'Weeks 12–18', color: '#10b981',
    skills: [
      { key: 't3_faults',    label: 'Understanding driving faults' },
      { key: 't3_lanes',     label: 'Lane changing & discipline' },
      { key: 't3_parking',   label: 'Parking' },
      { key: 't3_stop_move', label: 'Stopping, moving off & emergency stop' },
      { key: 't3_mice',      label: 'MICE for all junction types' },
      { key: 't3_eval',      label: 'Junction & roundabout evaluation' }
    ],
    passChecklist: [
      'Habitually moves off/slows/stops/steers with appropriate checks',
      'Habitually chooses correct speed and position',
      'Habitually keeps car safe throughout any reversing',
      'Habitually approaches all junctions/roundabouts with correct MICE',
      'Habitually evaluates go/stop decisions in good time'
    ]
  }
};

const RATING_LABELS = { habitual: 'Habitual', developing: 'Developing', not_yet: 'Not Yet' };

let AUTH, PROGRESS, SESSIONS_DATA;

window.addEventListener('DOMContentLoaded', async () => {
  AUTH = JSON.parse(localStorage.getItem('cc_learner') || 'null');
  if (!AUTH?.token) { window.location.href = '/learner/'; return; }

  document.getElementById('header-name').textContent = AUTH.user.name;

  await Promise.all([loadProgress(), loadSessions()]);
  render();
});

function logout() {
  localStorage.removeItem('cc_learner');
  window.location.href = '/learner/';
}

async function loadProgress() {
  try {
    const res = await fetch('/api/learner/progress', {
      headers: { 'Authorization': `Bearer ${AUTH.token}` }
    });
    if (res.status === 401) { logout(); return; }
    PROGRESS = await res.json();
    // Keep user tier in sync
    AUTH.user.tier = PROGRESS.current_tier;
    localStorage.setItem('cc_learner', JSON.stringify(AUTH));
  } catch (e) { console.error(e); }
}

async function loadSessions() {
  try {
    const res = await fetch('/api/learner/sessions', {
      headers: { 'Authorization': `Bearer ${AUTH.token}` }
    });
    if (res.ok) SESSIONS_DATA = (await res.json()).sessions;
  } catch (e) { console.error(e); }
}

function render() {
  if (!PROGRESS) return;
  const tier = PROGRESS.current_tier;
  const tierInfo = CURRICULUM[tier];

  document.getElementById('welcome-msg').textContent = `Hi, ${PROGRESS.name} 👋`;
  document.getElementById('welcome-sub').textContent =
    `You're currently on ${tierInfo.title} — ${tierInfo.subtitle}`;

  // Stats
  const s = PROGRESS.stats;
  document.getElementById('stat-sessions').textContent = s.total_sessions;
  document.getElementById('stat-hours').textContent =
    s.total_minutes >= 60
      ? (s.total_minutes / 60).toFixed(1)
      : (s.total_minutes / 60).toFixed(1);
  document.getElementById('stat-instructor').textContent = s.instructor_sessions;
  document.getElementById('stat-private').textContent = s.private_sessions;

  // Build lookup: { skill_key: rating }
  const ratingsMap = {};
  (PROGRESS.latest_ratings || []).forEach(r => { ratingsMap[r.skill_key] = r.rating; });

  // Render tier cards
  const container = document.getElementById('tier-cards');
  container.innerHTML = '';
  [1, 2, 3].forEach(t => renderTierCard(t, tier, ratingsMap, container));

  // Render sessions
  renderSessions();
}

function renderTierCard(t, currentTier, ratingsMap, container) {
  const info = CURRICULUM[t];
  const isCurrentTier = t === currentTier;
  const isPast = t < currentTier;

  // Work out badge
  let badgeClass, badgeText;
  if (isCurrentTier) { badgeClass = 'badge-current'; badgeText = 'Current Tier'; }
  else if (isPast)   { badgeClass = 'badge-done';    badgeText = 'Complete'; }
  else               { badgeClass = 'badge-locked';  badgeText = 'Upcoming'; }

  // Count habitual skills for this tier
  const habitualCount = info.skills.filter(sk => ratingsMap[sk.key] === 'habitual').length;
  const pct = Math.round((habitualCount / info.skills.length) * 100);

  // Skills HTML
  const skillsHTML = info.skills.map(sk => {
    const rating = ratingsMap[sk.key] || 'none';
    const labelText = rating === 'none' ? 'Not rated' : RATING_LABELS[rating];
    return `
      <div class="skill-row">
        <span class="skill-name">${sk.label}</span>
        <div class="skill-rating rating-${rating}">
          <div class="rating-dot"></div>
          <span class="rating-text">${labelText}</span>
        </div>
      </div>`;
  }).join('');

  // Bar color
  const fillColor = info.color;

  const card = document.createElement('div');
  card.className = 'tier-card';
  card.innerHTML = `
    <div class="tier-header" onclick="toggleTier(${t})">
      <div class="tier-header-left">
        <div class="tier-dot" style="background:${info.color}"></div>
        <div>
          <div class="tier-name">${info.title} — ${info.subtitle}</div>
          <div class="tier-sub">${info.weeks}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="tier-badge ${badgeClass}">${badgeText}</span>
        <span class="chevron${isCurrentTier ? ' open' : ''}" id="chevron-${t}">▼</span>
      </div>
    </div>
    <div class="tier-body${isCurrentTier ? ' open' : ''}" id="tier-body-${t}">
      <div class="skill-list">${skillsHTML}</div>
      <div class="readiness">
        <div class="readiness-label">
          <span class="title">Habitual level</span>
          <span class="pct" style="color:${fillColor}">${pct}%</span>
        </div>
        <div class="readiness-bar-bg">
          <div class="readiness-bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
        <div class="readiness-note">${habitualCount} of ${info.skills.length} skills at habitual standard</div>
      </div>
    </div>`;
  container.appendChild(card);
}

function toggleTier(t) {
  const body = document.getElementById(`tier-body-${t}`);
  const chev = document.getElementById(`chevron-${t}`);
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

function renderSessions() {
  const el = document.getElementById('sessions-list');
  if (!SESSIONS_DATA || SESSIONS_DATA.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📋</div>
        <p>No sessions logged yet.<br>Hit the button above after your first drive!</p>
      </div>`;
    return;
  }

  el.innerHTML = SESSIONS_DATA.map(s => {
    const date = new Date(s.session_date);
    const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const typeChip = s.session_type === 'private'
      ? `<span class="session-chip chip-private">Private Practice</span>`
      : `<span class="session-chip chip-instructor">With Instructor</span>`;
    const durationChip = s.duration_minutes
      ? `<span class="session-chip chip-duration">${s.duration_minutes} min</span>` : '';

    const ratingsHTML = (s.ratings || []).map(r => {
      const dotColor = r.rating === 'habitual' ? '#22c55e' : r.rating === 'developing' ? '#f59e0b' : '#ef4444';
      const skillLabel = findSkillLabel(r.skill_key);
      return `<div class="session-skill-pill">
        <div class="dot" style="background:${dotColor}"></div>
        ${skillLabel}
      </div>`;
    }).join('');

    const notesHTML = s.notes
      ? `<div class="session-notes">"${s.notes}"</div>` : '';

    return `
      <div class="session-card">
        <div class="session-meta">
          <span class="session-date">📅 ${dateStr}</span>
          ${typeChip}
          ${durationChip}
        </div>
        ${ratingsHTML ? `<div class="session-ratings">${ratingsHTML}</div>` : ''}
        ${notesHTML}
      </div>`;
  }).join('');
}

function findSkillLabel(key) {
  for (const tier of Object.values(CURRICULUM)) {
    const skill = tier.skills.find(s => s.key === key);
    if (skill) return skill.label;
  }
  return key;
}
</script>
</body>
</html>
