<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Ask the Examiner — AI Driving Test Help | Coach Carter Reading</title>
  <meta name="description" content="Ask any question about the UK driving test marking scheme and get instant, accurate answers powered by AI. Grounded in real DVSA examiner guidance. Free from Coach Carter Driving School.">
<script src="/cookie-consent.js"></script>
<script src="/posthog-loader.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" data-swap-media>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/learner.css">
  <script src="/shared/dark-mode.js"></script>
  <script src="/shared/font-swap.js"></script>
  <style>
    body { display: flex; flex-direction: column; }

    /* ── CHAT LAYOUT ── */
    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      max-width: 720px; width: 100%; margin: 0 auto;
      padding-top: 16px; padding-bottom: 200px;
    }

    .chat-header {
      padding: 20px 16px 16px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .chat-header h1 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .chat-header h1 em { font-style: normal; color: var(--accent); }
    .chat-header p { color: var(--muted); font-size: 0.82rem; line-height: 1.5; }

    /* ── MESSAGES ── */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .msg.assistant .msg-avatar { background: var(--accent-lt); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface); color: var(--muted); }

    .msg-bubble {
      padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.6;
      word-wrap: break-word;
    }
    /* ── MARKDOWN IN CHAT BUBBLES ── */
    .msg-bubble h4 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin: 8px 0 4px; }
    .msg-bubble h4:first-child { margin-top: 0; }
    .msg-bubble h5 { font-family: var(--font-head); font-size: 0.92rem; font-weight: 700; margin: 6px 0 3px; }
    .msg-bubble h5:first-child { margin-top: 0; }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code { background: var(--surface); padding: 1px 5px; border-radius: 4px; font-size: 0.84rem; }
    .msg-bubble ul, .msg-bubble ol { margin: 4px 0 4px 20px; }
    .msg-bubble li { margin-bottom: 2px; }
    .msg-bubble p { margin-bottom: 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble {
      background: var(--white); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-bottom-left-radius: 4px;
    }

    /* ── TYPING INDICATOR ── */
    .typing-indicator { display: none; align-self: flex-start; padding: 0 16px; }
    .typing-indicator.show { display: flex; }
    .typing-indicator .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-lt); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .typing-dots { display: flex; gap: 4px; padding: 14px 16px; background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 16px; border-bottom-left-radius: 4px; margin-left: 10px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── STARTER CHIPS ── */
    .starter-chips {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 16px;
      justify-content: center;
    }
    .starter-chip {
      padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--white); font-family: var(--font-body); font-size: 0.8rem;
      color: var(--muted); cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .starter-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* ── INPUT AREA ── */
    .chat-input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 16px max(12px, env(safe-area-inset-bottom)); z-index: 998;
    }
    /* Sit above the bottom nav bar on mobile */
    body.cc-has-bottom-bar .chat-input-area {
      bottom: calc(60px + env(safe-area-inset-bottom, 0px));
      padding-bottom: 12px;
    }
    .chat-input-wrap {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 12px 16px; border-radius: 100px;
      border: 1px solid var(--border); font-family: var(--font-body);
      font-size: 0.9rem; outline: none; transition: border-color 0.18s;
      background: var(--surface);
    }
    .chat-input:focus { border-color: var(--accent); background: var(--white); }
    .chat-input::placeholder { color: #aaa; }
    .chat-send {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; flex-shrink: 0;
    }
    .chat-send:hover { background: var(--accent-dk); transform: scale(1.05); }
    .chat-send:disabled { background: var(--border); cursor: default; transform: none; }
    .chat-send svg { width: 20px; height: 20px; fill: currentColor; }

    .chat-hint { text-align: center; font-size: 0.7rem; color: #bbb; margin-top: 6px; }

    .error-msg { color: var(--red); font-size: 0.82rem; text-align: center; padding: 8px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>Ask the <em>Examiner</em></h1>
    <p>AI-powered answers based on real DVSA examiner marking guidelines</p>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="starter-chips" id="starter-chips">
      <button class="starter-chip" data-action="ask-chip">What happens if I stall?</button>
      <button class="starter-chip" data-action="ask-chip">How are manoeuvres marked?</button>
      <button class="starter-chip" data-action="ask-chip">Can I fail for driving too slowly?</button>
      <button class="starter-chip" data-action="ask-chip">What does the examiner look for at junctions?</button>
      <button class="starter-chip" data-action="ask-chip">How many minors can I get?</button>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="msg-avatar">CC</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<div class="chat-input-area">
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="chat-input" placeholder="Ask about the driving test marking scheme..." autocomplete="off">
    <button class="chat-send" id="chat-send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="chat-hint">Press Enter to send</div>
</div>

<script src="/learner/ask-examiner.js"></script>
</body>
</html>
