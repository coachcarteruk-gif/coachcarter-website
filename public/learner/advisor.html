  <link rel="stylesheet" href="/shared/learner.css">
  <style>
    body { display: flex; flex-direction: column; }

    /* ── CHAT LAYOUT ── */
    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      max-width: 720px; width: 100%; margin: 0 auto;
      padding-top: 16px; padding-bottom: 130px;
    }

    .chat-header {
      padding: 20px 16px 16px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .chat-header h1 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .chat-header h1 em { font-style: normal; color: var(--accent); }
    .chat-header p { color: var(--muted); font-size: 0.82rem; line-height: 1.5; }
    .chat-header .auth-hint {
      display: inline-block; margin-top: 8px; font-size: 0.75rem;
      color: var(--accent); background: var(--accent-lt);
      padding: 4px 12px; border-radius: 100px;
    }

    /* ── MESSAGES ── */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .msg.assistant .msg-avatar { background: var(--accent-lt); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface); color: var(--muted); }

    .msg-bubble {
      padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.6;
      word-wrap: break-word;
    }
    /* ── MARKDOWN IN CHAT BUBBLES ── */
    .msg-bubble h4 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin: 8px 0 4px; }
    .msg-bubble h4:first-child { margin-top: 0; }
    .msg-bubble h5 { font-family: var(--font-head); font-size: 0.92rem; font-weight: 700; margin: 6px 0 3px; }
    .msg-bubble h5:first-child { margin-top: 0; }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code { background: var(--surface); padding: 1px 5px; border-radius: 4px; font-size: 0.84rem; }
    .msg-bubble ul, .msg-bubble ol { margin: 4px 0 4px 20px; }
    .msg-bubble li { margin-bottom: 2px; }
    .msg-bubble p { margin-bottom: 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble {
      background: var(--white); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-bottom-left-radius: 4px;
    }

    /* ── CHECKOUT CARD ── */
    .checkout-card {
      background: var(--white); border: 2px solid var(--green);
      border-radius: var(--radius); padding: 20px; margin: 8px 16px;
      animation: fadeIn 0.4s ease; max-width: 400px;
    }
    .checkout-card-title {
      font-family: var(--font-head); font-weight: 700; font-size: 1rem;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .checkout-card-title::before { content: '\1F9FE'; }
    .checkout-detail {
      display: flex; justify-content: space-between; padding: 6px 0;
      font-size: 0.88rem; border-bottom: 1px solid var(--surface);
    }
    .checkout-detail:last-of-type { border-bottom: none; }
    .checkout-detail .label { color: var(--muted); }
    .checkout-detail .value { font-weight: 700; }
    .checkout-detail .value.green { color: var(--green); }
    .checkout-btn {
      display: block; width: 100%; margin-top: 16px; padding: 14px;
      background: var(--green); color: #fff; border: none; border-radius: 10px;
      font-family: var(--font-head); font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: all 0.18s; text-align: center;
      text-decoration: none;
    }
    .checkout-btn:hover { background: #1aad51; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .checkout-footer { text-align: center; margin-top: 10px; font-size: 0.72rem; color: #aaa; }

    /* ── AUTH PROMPT CARD ── */
    .auth-card {
      background: var(--accent-lt); border: 1px solid rgba(245,131,33,0.2);
      border-radius: var(--radius); padding: 20px; margin: 8px 16px;
      text-align: center; animation: fadeIn 0.4s ease; max-width: 400px;
    }
    .auth-card p { font-size: 0.9rem; margin-bottom: 14px; color: var(--primary); }
    .auth-card a {
      display: inline-block; background: var(--accent); color: #fff;
      padding: 12px 28px; border-radius: 100px; font-weight: 700;
      text-decoration: none; font-family: var(--font-head);
      transition: all 0.18s;
    }
    .auth-card a:hover { background: var(--accent-dk); }
    .auth-card .hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

    /* ── TYPING INDICATOR ── */
    .typing-indicator { display: none; align-self: flex-start; padding: 0 16px; }
    .typing-indicator.show { display: flex; }
    .typing-indicator .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-lt); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .typing-dots { display: flex; gap: 4px; padding: 14px 16px; background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 16px; border-bottom-left-radius: 4px; margin-left: 10px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── STARTER CHIPS ── */
    .starter-chips {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 16px;
      justify-content: center;
    }
    .starter-chip {
      padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--white); font-family: var(--font-body); font-size: 0.8rem;
      color: var(--muted); cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .starter-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* ── INPUT AREA ── */
    .chat-input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 16px max(12px, env(safe-area-inset-bottom)); z-index: 50;
    }
    .chat-input-wrap {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 12px 16px; border-radius: 100px;
      border: 1px solid var(--border); font-family: var(--font-body);
      font-size: 0.9rem; outline: none; transition: border-color 0.18s;
      background: var(--surface);
    }
    .chat-input:focus { border-color: var(--accent); background: var(--white); }
    .chat-input::placeholder { color: #aaa; }
    .chat-send {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; flex-shrink: 0;
    }
    .chat-send:hover { background: var(--accent-dk); transform: scale(1.05); }
    .chat-send:disabled { background: var(--border); cursor: default; transform: none; }
    .chat-send svg { width: 20px; height: 20px; fill: currentColor; }

    .chat-hint { text-align: center; font-size: 0.7rem; color: #bbb; margin-top: 6px; }

    .error-msg { color: var(--red); font-size: 0.82rem; text-align: center; padding: 8px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>Lesson <em>Advisor</em></h1>
    <p>Find the right lesson package for your budget and experience level</p>
    <span class="auth-hint" id="auth-hint" style="display:none"></span>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="starter-chips" id="starter-chips">
      <button class="starter-chip" onclick="askChip(this)">I'm a complete beginner</button>
      <button class="starter-chip" onclick="askChip(this)">How many lessons do I need?</button>
      <button class="starter-chip" onclick="askChip(this)">What's the best value package?</button>
      <button class="starter-chip" onclick="askChip(this)">I have a test booked soon</button>
      <button class="starter-chip" onclick="askChip(this)">Show me the pricing</button>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="msg-avatar">CC</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<div class="chat-input-area">
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="chat-input" placeholder="Ask about lessons, pricing, or how many hours you need..." autocomplete="off">
    <button class="chat-send" id="chat-send" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="chat-hint">Press Enter to send</div>
</div>

<script>
const STORAGE_KEY = 'cc_advisor_conversation';
let AUTH;
let conversationHistory = [];
let isSending = false;

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  AUTH = JSON.parse(localStorage.getItem('cc_learner') || 'null');

  // Show auth status hint
  const hint = document.getElementById('auth-hint');
  if (AUTH?.token) {
    hint.style.display = 'inline-block';
    hint.textContent = 'Signed in as ' + (AUTH.user?.name || 'learner') + ' — personalised recommendations active';
  } else {
    hint.style.display = 'inline-block';
    hint.textContent = 'Sign in for personalised recommendations based on your progress';
  }

  // Restore conversation from localStorage
  restoreConversation();

  // Enter key to send
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // Check if returned from cancelled checkout
  const params = new URLSearchParams(window.location.search);
  if (params.get('cancelled') === 'true') {
    appendMessage('assistant', "No worries — the checkout was cancelled. You can change your mind anytime. Would you like to explore a different package, or is there anything else I can help with?");
    window.history.replaceState({}, '', window.location.pathname);
  }
});

// ── Conversation persistence ──
function saveConversation() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
  } catch (e) { /* quota exceeded — clear old data */ }
}

function restoreConversation() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && saved.length > 0) {
      // Hide starter chips
      const chips = document.getElementById('starter-chips');
      if (chips) chips.remove();

      conversationHistory = saved;
      for (const msg of conversationHistory) {
        appendMessage(msg.role, msg.content, true);
      }
      scrollToBottom();
    }
  } catch (e) { /* corrupted — start fresh */ }
}

function clearConversation() {
  localStorage.removeItem(STORAGE_KEY);
  conversationHistory = [];
}

// ── Starter chip click ──
function askChip(btn) {
  const text = btn.textContent;
  document.getElementById('starter-chips').remove();
  sendMessage(text);

  if (typeof posthog !== 'undefined') {
    posthog.capture('advisor_chip_clicked', { chip_text: text });
  }
}

// ── Handle send ──
function handleSend() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isSending) return;
  input.value = '';

  const chips = document.getElementById('starter-chips');
  if (chips) chips.remove();

  sendMessage(text);
}

// ── Send message ──
async function sendMessage(text) {
  if (isSending) return;
  isSending = true;

  const sendBtn = document.getElementById('chat-send');
  sendBtn.disabled = true;
  hideError();

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  saveConversation();

  const typing = document.getElementById('typing-indicator');
  typing.classList.add('show');
  scrollToBottom();

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (AUTH?.token) {
      headers['Authorization'] = 'Bearer ' + AUTH.token;
    }

    const res = await fetch('/api/advisor', {
      method: 'POST',
      headers,
      body: JSON.stringify({ messages: conversationHistory })
    });

    typing.classList.remove('show');

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || 'Something went wrong');
    }

    const data = await res.json();

    if (data.type === 'checkout') {
      // AI created a checkout — show the card
      const summary = data.price_summary;
      appendMessage('assistant', data.reply || "Great choice! Here's your checkout:");
      conversationHistory.push({ role: 'assistant', content: data.reply || "Here's your checkout." });
      renderCheckoutCard(summary, data.checkout_url);

      if (typeof posthog !== 'undefined') {
        posthog.capture('advisor_checkout_created', {
          lessons: summary.qty,
          total: summary.totalPounds,
          discount_pct: summary.discountPct
        });
      }
    } else if (data.type === 'auth_required') {
      // Needs login to buy
      appendMessage('assistant', data.reply || "You'll need to sign in first to complete your purchase.");
      conversationHistory.push({ role: 'assistant', content: data.reply || "Sign in to purchase." });
      renderAuthCard();
    } else {
      // Normal text response
      appendMessage('assistant', data.reply);
      conversationHistory.push({ role: 'assistant', content: data.reply });
    }

    saveConversation();

    if (typeof posthog !== 'undefined') {
      posthog.capture('advisor_message_sent', {
        message_length: text.length,
        conversation_length: conversationHistory.length,
        is_authenticated: !!AUTH?.token
      });
    }
  } catch (err) {
    typing.classList.remove('show');
    showError(err.message || 'Something went wrong. Please try again.');
  }

  isSending = false;
  sendBtn.disabled = false;
  document.getElementById('chat-input').focus();
}

// ── Render checkout card ──
function renderCheckoutCard(summary, checkoutUrl) {
  const messages = document.getElementById('chat-messages');
  const card = document.createElement('div');
  card.className = 'checkout-card';

  const hours = (summary.qty * 1.5).toFixed(1).replace('.0', '');
  let savings = '';
  if (parseFloat(summary.savingsPounds) > 0) {
    savings = '<div class="checkout-detail"><span class="label">You save</span><span class="value green">\u00A3' + summary.savingsPounds + ' (' + summary.discountPct + '% off)</span></div>';
  }

  card.innerHTML =
    '<div class="checkout-card-title">' + summary.qty + ' Driving Lesson' + (summary.qty > 1 ? 's' : '') + '</div>' +
    '<div class="checkout-detail"><span class="label">Lessons</span><span class="value">' + summary.qty + ' \u00D7 1.5hr</span></div>' +
    '<div class="checkout-detail"><span class="label">Total hours</span><span class="value">' + hours + ' hours</span></div>' +
    '<div class="checkout-detail"><span class="label">Per lesson</span><span class="value">\u00A3' + summary.perLessonPounds + '</span></div>' +
    savings +
    '<div class="checkout-detail" style="border-top:2px solid var(--surface);padding-top:10px;margin-top:4px;"><span class="label" style="font-weight:700;">Total</span><span class="value" style="font-size:1.15rem;">\u00A3' + summary.totalPounds + '</span></div>' +
    '<a href="' + checkoutUrl + '" class="checkout-btn">Pay Now \u2014 Secure Checkout \u2192</a>' +
    '<div class="checkout-footer">Powered by Stripe \u00B7 Card &amp; Klarna accepted</div>';

  messages.appendChild(card);
  scrollToBottom();
}

// ── Render auth-required card ──
function renderAuthCard() {
  const messages = document.getElementById('chat-messages');
  const card = document.createElement('div');
  card.className = 'auth-card';
  card.innerHTML =
    '<p>To complete your purchase, please sign in or create a free account first.</p>' +
    '<a href="/learner/login.html?redirect=/learner/advisor.html">Sign In / Create Account</a>' +
    '<div class="hint">Your conversation will be saved and waiting for you when you return.</div>';
  messages.appendChild(card);
  scrollToBottom();
}

// ── Lightweight markdown → HTML (XSS-safe) ──
function renderMarkdown(text) {
  // Escape HTML first to prevent XSS
  let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Split into lines for block-level processing
  const lines = s.split('\n');
  const out = [];
  let inUl = false, inOl = false;
  for (const line of lines) {
    const trimmed = line.trim();
    // Headings
    if (/^### (.+)/.test(trimmed)) { closeList(); out.push('<h5>' + RegExp.$1 + '</h5>'); continue; }
    if (/^## (.+)/.test(trimmed))  { closeList(); out.push('<h4>' + RegExp.$1 + '</h4>'); continue; }
    // Unordered list
    if (/^[-*] (.+)/.test(trimmed)) {
      if (!inUl) { closeList(); out.push('<ul>'); inUl = true; }
      out.push('<li>' + inline(RegExp.$1) + '</li>'); continue;
    }
    // Ordered list
    if (/^\d+\. (.+)/.test(trimmed)) {
      if (!inOl) { closeList(); out.push('<ol>'); inOl = true; }
      out.push('<li>' + inline(RegExp.$1) + '</li>'); continue;
    }
    // Empty line → close lists, add break
    if (trimmed === '') { closeList(); out.push('<br>'); continue; }
    // Normal paragraph line
    closeList();
    out.push('<p>' + inline(trimmed) + '</p>');
  }
  closeList();
  return out.join('');

  function closeList() {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  }
  function inline(t) {
    return t
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }
}

// ── Append message to chat ──
function appendMessage(role, text, isRestore) {
  const messages = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (isRestore) div.style.animation = 'none';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'assistant' ? 'CC' : (AUTH?.user?.name?.[0]?.toUpperCase() || 'U');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  messages.appendChild(div);

  if (!isRestore) scrollToBottom();
}

// ── Scroll to bottom ──
function scrollToBottom() {
  const messages = document.getElementById('chat-messages');
  requestAnimationFrame(() => {
    messages.scrollTop = messages.scrollHeight;
  });
}

// ── Error handling ──
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}
</script>
