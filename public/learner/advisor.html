  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" data-swap-media>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>

  <link rel="stylesheet" href="/shared/learner.css">
  <script src="/shared/dark-mode.js"></script>
  <script src="/shared/font-swap.js"></script>
  <style>
    body { display: flex; flex-direction: column; }

    /* â”€â”€ CHAT LAYOUT â”€â”€ */
    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      max-width: 720px; width: 100%; margin: 0 auto;
      padding-top: 16px; padding-bottom: 130px;
    }

    .chat-header {
      padding: 20px 16px 16px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .chat-header h1 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .chat-header h1 em { font-style: normal; color: var(--accent); }
    .chat-header p { color: var(--muted); font-size: 0.82rem; line-height: 1.5; }
    .chat-header .auth-hint {
      display: inline-block; margin-top: 8px; font-size: 0.75rem;
      color: var(--accent); background: var(--accent-lt);
      padding: 4px 12px; border-radius: 100px;
    }

    /* â”€â”€ MESSAGES â”€â”€ */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .msg.assistant .msg-avatar { background: var(--accent-lt); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface); color: var(--muted); }

    .msg-bubble {
      padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.6;
      word-wrap: break-word;
    }
    /* â”€â”€ MARKDOWN IN CHAT BUBBLES â”€â”€ */
    .msg-bubble h4 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin: 8px 0 4px; }
    .msg-bubble h4:first-child { margin-top: 0; }
    .msg-bubble h5 { font-family: var(--font-head); font-size: 0.92rem; font-weight: 700; margin: 6px 0 3px; }
    .msg-bubble h5:first-child { margin-top: 0; }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code { background: var(--surface); padding: 1px 5px; border-radius: 4px; font-size: 0.84rem; }
    .msg-bubble ul, .msg-bubble ol { margin: 4px 0 4px 20px; }
    .msg-bubble li { margin-bottom: 2px; }
    .msg-bubble p { margin-bottom: 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble {
      background: var(--white); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-bottom-left-radius: 4px;
    }

    /* â”€â”€ CHECKOUT CARD â”€â”€ */
    .checkout-card {
      background: var(--white); border: 2px solid var(--green);
      border-radius: var(--radius); padding: 20px; margin: 8px 16px;
      animation: fadeIn 0.4s ease; max-width: 400px;
    }
    .checkout-card-title {
      font-family: var(--font-head); font-weight: 700; font-size: 1rem;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .checkout-card-title::before { content: '\1F9FE'; }
    .checkout-detail {
      display: flex; justify-content: space-between; padding: 6px 0;
      font-size: 0.88rem; border-bottom: 1px solid var(--surface);
    }
    .checkout-detail:last-of-type { border-bottom: none; }
    .checkout-detail .label { color: var(--muted); }
    .checkout-detail .value { font-weight: 700; }
    .checkout-detail .value.green { color: var(--green); }
    .checkout-btn {
      display: block; width: 100%; margin-top: 16px; padding: 14px;
      background: var(--green); color: #fff; border: none; border-radius: 10px;
      font-family: var(--font-head); font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: all 0.18s; text-align: center;
      text-decoration: none;
    }
    .checkout-btn:hover { background: #1aad51; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .checkout-footer { text-align: center; margin-top: 10px; font-size: 0.72rem; color: #aaa; }

    /* â”€â”€ AUTH PROMPT CARD â”€â”€ */
    .auth-card {
      background: var(--accent-lt); border: 1px solid rgba(245,131,33,0.2);
      border-radius: var(--radius); padding: 20px; margin: 8px 16px;
      text-align: center; animation: fadeIn 0.4s ease; max-width: 400px;
    }
    .auth-card p { font-size: 0.9rem; margin-bottom: 14px; color: var(--primary); }
    .auth-card a {
      display: inline-block; background: var(--accent); color: #fff;
      padding: 12px 28px; border-radius: 100px; font-weight: 700;
      text-decoration: none; font-family: var(--font-head);
      transition: all 0.18s;
    }
    .auth-card a:hover { background: var(--accent-dk); }
    .auth-card .hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

    /* â”€â”€ TYPING INDICATOR â”€â”€ */
    .typing-indicator { display: none; align-self: flex-start; padding: 0 16px; }
    .typing-indicator.show { display: flex; }
    .typing-indicator .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-lt); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .typing-dots { display: flex; gap: 4px; padding: 14px 16px; background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 16px; border-bottom-left-radius: 4px; margin-left: 10px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* â”€â”€ STARTER CHIPS â”€â”€ */
    .starter-chips {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 16px;
      justify-content: center;
    }
    .starter-chip {
      padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--white); font-family: var(--font-body); font-size: 0.8rem;
      color: var(--muted); cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .starter-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* â”€â”€ INPUT AREA â”€â”€ */
    .chat-input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 16px max(12px, env(safe-area-inset-bottom)); z-index: 50;
    }
    .chat-input-wrap {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 12px 16px; border-radius: 100px;
      border: 1px solid var(--border); font-family: var(--font-body);
      font-size: 0.9rem; outline: none; transition: border-color 0.18s;
      background: var(--surface);
    }
    .chat-input:focus { border-color: var(--accent); background: var(--white); }
    .chat-input::placeholder { color: #aaa; }
    .chat-send {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; flex-shrink: 0;
    }
    .chat-send:hover { background: var(--accent-dk); transform: scale(1.05); }
    .chat-send:disabled { background: var(--border); cursor: default; transform: none; }
    .chat-send svg { width: 20px; height: 20px; fill: currentColor; }

    .chat-hint { text-align: center; font-size: 0.7rem; color: #bbb; margin-top: 6px; }

    .error-msg { color: var(--red); font-size: 0.82rem; text-align: center; padding: 8px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>Lesson <em>Advisor</em></h1>
    <p>Find the right lesson package for your budget and experience level</p>
    <span class="auth-hint" id="auth-hint" style="display:none"></span>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="starter-chips" id="starter-chips">
      <button class="starter-chip" data-action="ask-chip">I'm a complete beginner</button>
      <button class="starter-chip" data-action="ask-chip">How many lessons do I need?</button>
      <button class="starter-chip" data-action="ask-chip">What's the best value package?</button>
      <button class="starter-chip" data-action="ask-chip">I have a test booked soon</button>
      <button class="starter-chip" data-action="ask-chip">Show me the pricing</button>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="msg-avatar">CC</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<div class="chat-input-area">
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="chat-input" placeholder="Ask about lessons, pricing, or how many hours you need..." autocomplete="off">
    <button class="chat-send" id="chat-send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="chat-hint">Press Enter to send</div>
</div>

<script src="/learner/advisor.js"></script>
</body>
</html>
