<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#262626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="/cookie-consent.js"></script>
  <script src="/posthog-loader.js"></script>
  <title>My Lessons — CoachCarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/learner.css">
  <script src="/shared/dark-mode.js"></script>
  <style>
    .page { max-width: 640px; margin: 0 auto; padding: 20px 16px 100px; }
    .page-title {
      font-family: var(--font-head); font-size: 1.3rem; font-weight: 800;
      color: var(--primary); margin-bottom: 16px; letter-spacing: -0.02em;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 10px 0; text-align: center;
      font-family: var(--font-head); font-size: 0.85rem; font-weight: 700;
      color: var(--muted); background: none; border: none;
      cursor: pointer; position: relative; transition: color 0.15s;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; background: transparent; transition: background 0.15s;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after { background: var(--accent); }

    /* ── Date headers ── */
    .date-header {
      font-family: var(--font-head); font-size: 0.82rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
      padding: 18px 0 6px;
    }
    .date-header:first-child { padding-top: 4px; }

    /* ── Lesson card ── */
    .lesson-card {
      display: flex; align-items: stretch; gap: 0;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 8px; transition: border-color 0.15s;
    }
    .lesson-card:hover { border-color: var(--muted); }
    .lesson-accent {
      width: 4px; flex-shrink: 0;
      background: var(--lt-colour, var(--accent));
    }
    .lesson-body {
      flex: 1; min-width: 0; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .lesson-time {
      font-family: var(--font-head); font-size: 1rem; font-weight: 800;
      color: var(--primary);
    }
    .lesson-meta {
      font-size: 0.8rem; color: var(--muted);
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    }
    .lesson-meta-dot::before { content: '\00B7'; }
    .lesson-type-badge {
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; display: inline-block;
    }
    .lesson-address {
      font-size: 0.78rem; color: var(--muted); margin-top: 2px;
    }
    .lesson-actions {
      display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .btn-lesson {
      font-size: 0.78rem; font-weight: 600; padding: 6px 14px;
      border-radius: 7px; cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border); background: none; color: var(--primary);
    }
    .btn-lesson:hover { background: var(--surface); }
    .btn-lesson.cancel { color: var(--red); }
    .btn-lesson.cancel:hover { border-color: var(--red); background: var(--red-lt, #fef2f2); }
    .btn-lesson.reschedule { color: var(--accent); }
    .btn-lesson.reschedule:hover { border-color: var(--accent); background: var(--accent-lt); }
    .btn-lesson.calendar { color: var(--accent); }
    .btn-lesson.calendar:hover { border-color: var(--accent); background: var(--accent-lt); }

    /* ── Series group ── */
    .series-group {
      background: var(--surface); border-radius: var(--radius);
      padding: 10px; margin-bottom: 8px;
    }
    .series-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      padding: 4px 6px 8px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .series-header button {
      font-size: 0.72rem; font-weight: 600; padding: 4px 12px;
      border: 1px solid var(--red); border-radius: 6px;
      background: none; color: var(--red); cursor: pointer;
    }
    .series-header button:hover { background: var(--red-lt, #fef2f2); }
    .series-group .lesson-card { margin-bottom: 6px; }
    .series-group .lesson-card:last-child { margin-bottom: 0; }

    /* ── Past lesson card adjustments ── */
    .lesson-card.past { opacity: 0.6; }
    .lesson-card.past .lesson-time { text-decoration: line-through; }
    .lesson-status {
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .status-completed { background: var(--surface); color: var(--muted); }
    .status-cancelled { background: var(--red-lt, #fef2f2); color: var(--red, #ef4444); }
    .status-awaiting { background: var(--accent-lt, #fff4ec); color: var(--accent); }

    /* ── Loading / Empty ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state h3 {
      font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
      color: var(--primary); margin-bottom: 6px;
    }
    .empty-state p { font-size: 0.85rem; margin-bottom: 16px; }
    .btn-book-link {
      display: inline-block; padding: 12px 28px; border-radius: 10px;
      background: var(--accent); color: white; text-decoration: none;
      font-family: var(--font-head); font-size: 0.9rem; font-weight: 700;
      transition: background 0.15s;
    }
    .btn-book-link:hover { background: var(--accent-dk); }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white); border-radius: var(--radius);
      padding: 28px; max-width: 420px; width: 100%;
      transform: translateY(20px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 {
      font-family: var(--font-head); font-size: 1.2rem; font-weight: 800;
      margin-bottom: 16px;
    }
    .cancel-modal h2 { color: var(--red); }
    .modal-detail {
      background: var(--surface); border-radius: 10px; padding: 14px;
      margin-bottom: 16px; font-size: 0.88rem;
      display: flex; flex-direction: column; gap: 6px;
    }
    .modal-detail-row { display: flex; justify-content: space-between; }
    .modal-detail-row span:first-child { color: var(--muted); }
    .modal-detail-row span:last-child { font-weight: 700; }
    .cancel-policy {
      font-size: 0.82rem; padding: 10px 14px; border-radius: 8px;
      margin-bottom: 14px; line-height: 1.5;
    }
    .cancel-policy { background: var(--red-lt, #fef2f2); color: var(--red); }
    .cancel-policy.safe { background: rgba(34,197,94,0.08); color: #15803d; }
    .cancel-ack {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; margin-bottom: 14px; cursor: pointer;
    }
    .cancel-ack input { width: 16px; height: 16px; accent-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; }
    .btn-modal-cancel {
      padding: 12px 20px; background: none; border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.88rem; cursor: pointer; color: var(--muted);
    }
    .btn-modal-cancel:hover { background: var(--surface); }
    .btn-confirm-cancel {
      flex: 1; padding: 12px; background: var(--red); color: white; border: none;
      border-radius: 10px; font-family: var(--font-head); font-size: 0.88rem;
      font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-confirm-cancel:hover { background: #dc2626; }
    .btn-confirm-cancel:disabled { background: var(--border); cursor: not-allowed; }
    .modal-credit-note {
      font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5;
    }
    .btn-confirm {
      flex: 1; padding: 12px; background: var(--accent); color: white; border: none;
      border-radius: 10px; font-family: var(--font-head); font-size: 0.88rem;
      font-weight: 700; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-confirm:hover { background: var(--accent-dk); }
    .btn-confirm:disabled { background: var(--border); cursor: not-allowed; }
    .modal-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary); color: white;
      padding: 14px 24px; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600;
      transition: transform 0.3s; z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error { background: var(--red); }
  </style>
  <script src="/sidebar.js"></script>
  <script src="/shared/learner-auth.js"></script>
  <script src="/auth-gate.js"></script>
</head>
<body>

<div class="page">
  <div class="page-title">My Lessons</div>

  <!-- Tab bar: Upcoming / Past -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabUpcoming" onclick="switchTab('upcoming')">Upcoming</button>
    <button class="tab-btn" id="tabPast" onclick="switchTab('past')">Past</button>
  </div>

  <!-- Content area -->
  <div id="lessonContent">
    <div class="loading"><div class="spinner"></div><p>Loading lessons...</p></div>
  </div>
</div>

<!-- ── Cancel confirmation modal ── -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal cancel-modal">
    <h2>Cancel lesson?</h2>
    <div class="modal-detail">
      <div class="modal-detail-row"><span>Date</span><span id="cmDate">—</span></div>
      <div class="modal-detail-row"><span>Time</span><span id="cmTime">—</span></div>
      <div class="modal-detail-row"><span>Instructor</span><span id="cmInstructor">—</span></div>
    </div>
    <div class="cancel-policy" id="cancelPolicyNote"></div>
    <div id="cancelSeriesOption" style="display:none;margin:10px 0;padding:10px;background:var(--surface);border-radius:8px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;font-weight:600;cursor:pointer;">
        <input type="checkbox" id="cancelSeriesCheck" onchange="toggleCancelSeriesInfo()" style="width:16px;height:16px;accent-color:var(--accent);">
        <span>Cancel all remaining lessons in this series</span>
      </label>
      <p id="cancelSeriesInfo" style="display:none;margin:6px 0 0 26px;font-size:0.78rem;color:var(--muted);"></p>
    </div>
    <label class="cancel-ack" id="cancelAckLabel" style="display:none">
      <input type="checkbox" id="cancelAckCheck" onchange="toggleCancelBtn()">
      <span>I understand my lesson will be forfeited and not returned</span>
    </label>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="cancelModalClose">Keep lesson</button>
      <button class="btn-confirm-cancel" id="btnConfirmCancel">
        <span id="cancelBtnLabel">Cancel lesson</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Reschedule info modal ── -->
<div class="modal-overlay" id="rescheduleModal">
  <div class="modal">
    <h2>Reschedule lesson</h2>
    <p class="modal-credit-note">To reschedule, you'll be taken to the booking page where you can pick a new time slot.</p>
    <div class="modal-detail">
      <div class="modal-detail-row"><span>Current</span><span id="rmCurrentDateTime">—</span></div>
      <div class="modal-detail-row"><span>Instructor</span><span id="rmInstructor">—</span></div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeRescheduleModal()">Cancel</button>
      <button class="btn-confirm" id="btnGoReschedule">Go to booking page</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var token = null;
var upcomingBookings = [];
var pastBookings = [];
var activeTab = 'upcoming';
var pendingCancel = null;

function init() {
  var session = ccAuth.getAuth();
  token = session?.token;
  if (!token) { window.location.href = '/learner/login.html'; return; }

  document.getElementById('cancelModal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('cancelModal'))
      document.getElementById('cancelModal').classList.remove('open');
  });
  document.getElementById('cancelModalClose').onclick = function() {
    document.getElementById('cancelModal').classList.remove('open');
  };
  document.getElementById('btnConfirmCancel').onclick = confirmCancel;

  document.getElementById('rescheduleModal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('rescheduleModal')) closeRescheduleModal();
  });

  loadBookings();
}

async function loadBookings() {
  try {
    var res = await fetch('/api/slots?action=my-bookings', {
      headers: { Authorization: 'Bearer ' + token }
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);

    upcomingBookings = data.upcoming || [];
    pastBookings = data.past || [];

    // Update tab labels with counts
    document.getElementById('tabUpcoming').textContent = 'Upcoming' + (upcomingBookings.length ? ' (' + upcomingBookings.length + ')' : '');
    document.getElementById('tabPast').textContent = 'Past' + (pastBookings.length ? ' (' + pastBookings.length + ')' : '');

    renderTab();
  } catch (err) {
    document.getElementById('lessonContent').innerHTML =
      '<div class="empty-state"><div class="empty-icon">&#x26A0;&#xFE0F;</div>' +
      '<p>' + esc(err.message || 'Failed to load lessons') + '</p></div>';
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabUpcoming').classList.toggle('active', tab === 'upcoming');
  document.getElementById('tabPast').classList.toggle('active', tab === 'past');
  renderTab();
}

function renderTab() {
  if (activeTab === 'upcoming') renderUpcoming();
  else renderPast();
}

function renderUpcoming() {
  var container = document.getElementById('lessonContent');
  if (upcomingBookings.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">&#x1F4C5;</div>' +
        '<h3>No upcoming lessons</h3>' +
        '<p>Book your next driving lesson to get started.</p>' +
        '<a href="/learner/book.html" class="btn-book-link">Book a Lesson</a>' +
      '</div>';
    return;
  }

  // Group series bookings
  var seriesMap = {};
  var standalone = [];
  for (var i = 0; i < upcomingBookings.length; i++) {
    var b = upcomingBookings[i];
    if (b.series_id) {
      if (!seriesMap[b.series_id]) seriesMap[b.series_id] = [];
      seriesMap[b.series_id].push(b);
    } else {
      standalone.push(b);
    }
  }

  var html = '';

  // Render series groups first
  var seriesIds = Object.keys(seriesMap);
  for (var s = 0; s < seriesIds.length; s++) {
    var sid = seriesIds[s];
    var bookings = seriesMap[sid];
    html += '<div class="series-group">' +
      '<div class="series-header">' +
        '<span>Weekly series — ' + bookings.length + ' remaining</span>' +
        '<button onclick="openCancelModal(' + bookings[0].id + ', \'' + bookings[0].scheduled_date + '\', \'' +
          bookings[0].start_time.slice(0,5) + '\', \'' + bookings[0].end_time.slice(0,5) + '\', \'' +
          esc(bookings[0].instructor_name) + '\', 999, \'' + sid + '\')">Cancel series</button>' +
      '</div>';
    html += groupByDate(bookings, false);
    html += '</div>';
  }

  // Standalone grouped by date
  html += groupByDate(standalone, false);
  container.innerHTML = html;
}

function renderPast() {
  var container = document.getElementById('lessonContent');
  if (pastBookings.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">&#x1F552;</div>' +
        '<h3>No past lessons</h3>' +
        '<p>Your completed and cancelled lessons will appear here.</p>' +
      '</div>';
    return;
  }

  container.innerHTML = groupByDate(pastBookings, true);
}

function groupByDate(bookings, isPast) {
  var html = '';
  var lastDate = '';
  for (var i = 0; i < bookings.length; i++) {
    var b = bookings[i];
    if (b.scheduled_date !== lastDate) {
      lastDate = b.scheduled_date;
      var d = new Date(b.scheduled_date + 'T00:00:00Z');
      var dateStr = d.toLocaleDateString('en-GB', {
        weekday: 'short', day: 'numeric', month: 'short', timeZone: 'UTC'
      });
      // Check if today
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      if (b.scheduled_date === todayStr) dateStr = 'Today — ' + dateStr;
      html += '<div class="date-header">' + dateStr + '</div>';
    }
    html += renderLessonCard(b, isPast);
  }
  return html;
}

function renderLessonCard(b, isPast) {
  var start = b.start_time.slice(0,5);
  var end = b.end_time.slice(0,5);
  var ltColour = b.lesson_type_colour || 'var(--accent)';
  var ltName = b.lesson_type_name || '';
  var addr = b.pickup_address || '';
  var isCancelled = b.status === 'cancelled';
  var isCompleted = b.status === 'completed';
  var isAwaiting = b.status === 'awaiting_confirmation';

  // Calculate hours until lesson
  var lessonMs = new Date(b.scheduled_date + 'T' + b.start_time + 'Z').getTime();
  var hoursUntil = (lessonMs - Date.now()) / 3600000;
  var canAct = !isPast && hoursUntil > 0;
  var canReschedule = canAct && hoursUntil >= 48 && (b.reschedule_count || 0) < 2;

  var cardClass = 'lesson-card';
  if (isPast) cardClass += ' past';

  var html = '<div class="' + cardClass + '">' +
    '<div class="lesson-accent" style="background:' + ltColour + '"></div>' +
    '<div class="lesson-body">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">' +
        '<div class="lesson-time">' + start + ' — ' + end + '</div>';

  // Status badge for past
  if (isCancelled) {
    html += '<span class="lesson-status status-cancelled">Cancelled</span>';
  } else if (isCompleted) {
    html += '<span class="lesson-status status-completed">Completed</span>';
  } else if (isAwaiting) {
    html += '<span class="lesson-status status-awaiting">Pending</span>';
  }

  html += '</div>' +
    '<div class="lesson-meta">' +
      '<span>' + esc(b.instructor_name) + '</span>';

  if (ltName) {
    html += '<span class="lesson-meta-dot"></span>' +
      '<span class="lesson-type-badge" style="background:color-mix(in srgb,' + ltColour + ' 12%,white);color:' + ltColour + '">' + esc(ltName) + '</span>';
  }

  if (b.duration_minutes) {
    var hrs = b.duration_minutes / 60;
    var durStr = hrs % 1 === 0 ? hrs + 'hr' : hrs.toFixed(1) + 'hr';
    html += '<span class="lesson-meta-dot"></span><span>' + durStr + '</span>';
  }

  html += '</div>';

  if (addr) {
    html += '<div class="lesson-address">' + esc(addr) + '</div>';
  }

  // Action buttons (only for upcoming)
  if (canAct) {
    html += '<div class="lesson-actions">';
    html += '<button class="btn-lesson calendar" onclick="downloadCalendar(' + b.id + ')">Add to Calendar</button>';
    if (canReschedule) {
      html += '<button class="btn-lesson reschedule" onclick="openRescheduleModal(' + b.id + ', \'' +
        b.scheduled_date + '\', \'' + start + '\', \'' + end + '\', \'' + esc(b.instructor_name) + '\', ' +
        b.instructor_id + ')">Reschedule</button>';
    }
    html += '<button class="btn-lesson cancel" onclick="openCancelModal(' + b.id + ', \'' +
      b.scheduled_date + '\', \'' + start + '\', \'' + end + '\', \'' + esc(b.instructor_name) + '\', ' +
      hoursUntil.toFixed(1) + ', \'' + (b.series_id || '') + '\')">Cancel</button>';
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

// ── Calendar download ──
async function downloadCalendar(bookingId) {
  try {
    var res = await fetch('/api/calendar?action=download&booking_id=' + bookingId, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Failed');
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'coachcarter-lesson.ics';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Calendar file downloaded', 'success');
  } catch (e) { showToast('Could not download calendar file', 'error'); }
}
window.downloadCalendar = downloadCalendar;

// ── Cancel modal ──
function openCancelModal(bookingId, date, start, end, instructorName, hoursUntil, seriesId) {
  pendingCancel = { bookingId: bookingId, date: date, start: start, end: end, instructorName: instructorName, hoursUntil: hoursUntil, seriesId: seriesId || null };
  var dateDisplay = new Date(date + 'T00:00:00Z')
    .toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'UTC' });
  document.getElementById('cmDate').textContent = dateDisplay;
  document.getElementById('cmTime').textContent = start + ' — ' + end;
  document.getElementById('cmInstructor').textContent = instructorName;

  var willGet = hoursUntil >= 48;
  var policyEl = document.getElementById('cancelPolicyNote');
  policyEl.className = 'cancel-policy' + (willGet ? ' safe' : '');
  policyEl.innerHTML = willGet
    ? '&#x2713; You are cancelling more than 48 hours before the lesson. <strong>Your lesson will be returned automatically.</strong>'
    : '&#x26A0; This lesson is within 48 hours. <strong>Your lesson will be forfeited</strong> in line with the cancellation policy.';

  var ackLabel = document.getElementById('cancelAckLabel');
  var ackCheck = document.getElementById('cancelAckCheck');
  ackCheck.checked = false;
  ackLabel.style.display = willGet ? 'none' : 'flex';

  var seriesOption = document.getElementById('cancelSeriesOption');
  var seriesCheck = document.getElementById('cancelSeriesCheck');
  seriesCheck.checked = false;
  document.getElementById('cancelSeriesInfo').style.display = 'none';
  if (seriesId) {
    seriesOption.style.display = 'block';
    if (hoursUntil === 999) {
      seriesCheck.checked = true;
      toggleCancelSeriesInfo();
      policyEl.className = 'cancel-policy safe';
      policyEl.innerHTML = '&#x2713; Each lesson in the series will be assessed individually. Lessons 48+ hours away will be refunded.';
    }
  } else {
    seriesOption.style.display = 'none';
  }

  document.getElementById('cancelBtnLabel').textContent = seriesCheck.checked ? 'Cancel series' : 'Cancel lesson';
  document.getElementById('btnConfirmCancel').disabled = !willGet && !seriesCheck.checked;
  document.getElementById('cancelModal').classList.add('open');
}
window.openCancelModal = openCancelModal;

function toggleCancelSeriesInfo() {
  var checked = document.getElementById('cancelSeriesCheck').checked;
  document.getElementById('cancelSeriesInfo').style.display = checked ? 'block' : 'none';
  document.getElementById('cancelBtnLabel').textContent = checked ? 'Cancel series' : 'Cancel lesson';
  if (checked) {
    document.getElementById('cancelSeriesInfo').textContent = 'All remaining lessons in this weekly series will be cancelled. Refunds apply per the 48-hour policy.';
    document.getElementById('btnConfirmCancel').disabled = false;
  }
}
window.toggleCancelSeriesInfo = toggleCancelSeriesInfo;

function toggleCancelBtn() {
  var ackCheck = document.getElementById('cancelAckCheck');
  document.getElementById('btnConfirmCancel').disabled = !ackCheck.checked;
}
window.toggleCancelBtn = toggleCancelBtn;

async function confirmCancel() {
  if (!pendingCancel) return;
  var btn = document.getElementById('btnConfirmCancel');
  var cancelSeries = document.getElementById('cancelSeriesCheck').checked && pendingCancel.seriesId;
  btn.disabled = true;
  document.getElementById('cancelBtnLabel').textContent = cancelSeries ? 'Cancelling series...' : 'Cancelling...';

  try {
    var body = { booking_id: pendingCancel.bookingId };
    if (cancelSeries) body.cancel_series = true;
    var res = await fetch('/api/slots?action=cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(body)
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);

    document.getElementById('cancelModal').classList.remove('open');
    showToast(data.message, data.credit_returned !== false ? 'success' : '');
    loadBookings();
  } catch (err) {
    showToast(err.message || 'Cancellation failed.', 'error');
    btn.disabled = false;
    document.getElementById('cancelBtnLabel').textContent = cancelSeries ? 'Cancel series' : 'Cancel lesson';
  }
}

// ── Reschedule ──
function openRescheduleModal(bookingId, date, start, end, instructorName, instructorId) {
  var dateStr = new Date(date + 'T00:00:00Z')
    .toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'UTC' });
  document.getElementById('rmCurrentDateTime').textContent = dateStr + ' at ' + start;
  document.getElementById('rmInstructor').textContent = instructorName;
  document.getElementById('btnGoReschedule').onclick = function() {
    window.location.href = '/learner/book.html?reschedule=' + bookingId;
  };
  document.getElementById('rescheduleModal').classList.add('open');
}
window.openRescheduleModal = openRescheduleModal;

function closeRescheduleModal() {
  document.getElementById('rescheduleModal').classList.remove('open');
}
window.closeRescheduleModal = closeRescheduleModal;

// ── Helpers ──
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 4000);
}

init();
</script>
